<style>
/* ══════════════════════════════════════════════════════════════════
   AD FONTE DA SALVAÇÃO — DESIGN SYSTEM CINEMATIC PREMIUM v4
   Interface ultra-refinada com glassmorphism, gradientes e glows
══════════════════════════════════════════════════════════════════ */

/* ─────────────────────────────────────────────
   TOKENS — CINEMATIC DARK SYSTEM
───────────────────────────────────────────── */
:root {
  --bg:               #050B10;
  --bg2:              #08131A;
  --bg3:              #101C24;
  --bg4:              #162835;
  --bg5:              #1E3546;

  --bg-glass:         rgba(17, 27, 34, 0.55);
  --bg-glass-strong:  rgba(14, 24, 32, 0.85);
  --bg-elevated:      rgba(20, 32, 42, 0.98);

  --teal:             #00D9C6;
  --teal-light:       #00FFF0;
  --teal-dark:        #00A99C;
  --teal-dim:         rgba(0, 217, 198, 0.12);
  --teal-border:      rgba(0, 217, 198, 0.25);
  --teal-glow:        rgba(0, 217, 198, 0.3);
  --teal-glow-soft:   rgba(0, 217, 198, 0.08);

  --cyan:             #4DA3FF;
  --purple:           #9B7CFF;
  --purple-dim:       rgba(155, 124, 255, 0.12);
  --gold:             #D7B15B;
  --gold-dim:         rgba(215, 177, 91, 0.12);

  --success:          #36D399;
  --success-dim:      rgba(54, 211, 153, 0.12);
  --danger:           #FF5E7A;
  --danger-dim:       rgba(255, 94, 122, 0.12);
  --warning:          #FFC857;

  --text:             #F4FBFF;
  --text-soft:        #D8E5EA;
  --text-muted:       #88A2AE;
  --text-dim:         #55717D;

  --border:           rgba(255, 255, 255, 0.08);
  --border2:          rgba(255, 255, 255, 0.12);
  --border-strong:    rgba(255, 255, 255, 0.18);

  --glass-line:       rgba(255, 255, 255, 0.06);

  --shadow-sm:        0 4px 18px rgba(0, 0, 0, 0.3);
  --shadow:           0 12px 40px rgba(0, 0, 0, 0.5);
  --shadow-lg:        0 30px 100px rgba(0, 0, 0, 0.7);

  --shadow-glow:
    0 0 0 1px rgba(255, 255, 255, 0.03),
    0 12px 48px rgba(0, 0, 0, 0.5),
    0 0 40px rgba(0, 217, 198, 0.06);

  --radius-sm:        12px;
  --radius:           18px;
  --radius-lg:        24px;
  --radius-xl:        32px;

  --ease:             cubic-bezier(.25, .46, .45, .94);
  --ease-spring:      cubic-bezier(.16, 1, .3, 1);

  --noise-opacity:    0.04;
  --logo-filter:      drop-shadow(0 0 12px rgba(0, 217, 198, 0.2));
  --logo-filter2: #000000;
  --scrollbar:        rgba(255, 255, 255, 0.16);
}

/* ─────────────────────────────────────────────
   LIGHT MODE PREMIUM
───────────────────────────────────────────── */

[data-theme="light"] {
  --bg:               #F8FAFC; /* Slate 50 */
  --bg2:              #FFFFFF; /* Pure White */
  --bg3:              #F1F5F9; /* Slate 100 */
  --bg4:              #E2E8F0; /* Slate 200 */
  --bg5:              #CBD5E1; /* Slate 300 */

  --bg-glass:         rgba(255, 255, 255, 0.75);
  --bg-glass-strong:  rgba(255, 255, 255, 0.94);
  --bg-elevated:      #FFFFFF;

  /* Teais Saturação Enterprise */
  --teal:             #00897B; 
  --teal-light:       #00BFA5; 
  --teal-dark:        #00695C; 
  --teal-dim:         rgba(0, 137, 123, 0.08);
  --teal-border:      rgba(0, 137, 123, 0.2);
  --teal-glow:        rgba(0, 137, 123, 0.1);
  --teal-glow-soft:   rgba(0, 137, 123, 0.04);

  --cyan:             #0284C7; 
  --purple:           #4F46E5; 
  --purple-dim:       rgba(79, 70, 229, 0.08);
  --gold:             #B45309; 
  --gold-dim:         rgba(180, 83, 9, 0.08);

  --success:          #16A34A; 
  --success-dim:      rgba(22, 163, 74, 0.08);
  --danger:           #DC2626; 
  --danger-dim:       rgba(220, 38, 38, 0.08);
  --warning:          #D97706;

  /* Tipografia Ultra-Nítida */
  --text:             #0F172A; /* Slate 900 */
  --text-soft:        #334155; /* Slate 700 */
  --text-muted:       #475569; /* Slate 600 */
  --text-dim:         #64748B; /* Slate 500 */

  /* Bordas Cirúrgicas Estilo Stripe */
  --border:           #E2E8F0; 
  --border2:          #CBD5E1; 
  --border-strong:    #94A3B8; 

  --glass-line:       rgba(255, 255, 255, 0.8);

  --shadow-sm:        0 1px 2px 0 rgba(0, 0, 0, 0.05);
  --shadow:           0 1px 3px 0 rgba(0, 0, 0, 0.1);
  --shadow-lg:        0 10px 15px -3px rgba(15, 23, 42, 0.05);
  --shadow-glow:      0 4px 6px -1px rgba(15, 23, 42, 0.03);

  --logo-filter:      none;
  --scrollbar:        #CBD5E1;
}
/* Ajuste de Orbes de fundo para o Light Mode não parecer sujo */
[data-theme="light"] body::before {
  background:
    radial-gradient(circle at 0% 0%, rgba(0, 137, 123, 0.06), transparent 40%),
    radial-gradient(circle at 100% 0%, rgba(2, 132, 199, 0.05), transparent 40%),
    var(--bg);
}
[data-theme="light"] .orb { opacity: 0.03; }

/* ─────────────────────────────────────────────
   CONSTANTES
───────────────────────────────────────────── */
:root {
  --r-xs:  6px;
  --r-sm:  10px;
  --r:     14px;
  --r-lg:  20px;
  --r-xl:  28px;
  --r-2xl: 36px;
  --ease:  cubic-bezier(.25, .46, .45, .94);
  --ease-spring: cubic-bezier(.16, 1, .3, 1);
}

/* ─────────────────────────────────────────────
   BASE & BACKGROUNDS CINEMATOGRÁFICOS
───────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; -webkit-text-size-adjust: 100%; height: 100%; }

body {
  font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
  min-height: 100vh;
  min-height: 100dvh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
  position: relative;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  z-index: -3;
  pointer-events: none;
  background:
    radial-gradient(circle at 10% 10%, rgba(0, 217, 198, 0.12), transparent 35%),
    radial-gradient(circle at 90% 20%, rgba(84, 184, 255, 0.10), transparent 35%),
    radial-gradient(circle at 50% 80%, rgba(155, 124, 255, 0.08), transparent 40%),
    var(--bg);
}

body::after {
  content: '';
  position: fixed;
  inset: 0;
  z-index: -2;
  pointer-events: none;
  background-image:
    linear-gradient(rgba(255, 255, 255, var(--noise-opacity)) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255, 255, 255, var(--noise-opacity)) 1px, transparent 1px);
  background-size: 80px 80px;
  mask-image: radial-gradient(circle at center, black, transparent 90%);
  opacity: .35;
}

/* ── ORBES DE AMBIÊNCIA GLOW ── */
.orb {
  position: fixed;
  border-radius: 50%;
  filter: blur(140px);
  opacity: .15;
  pointer-events: none;
  z-index: -1;
  animation: orbFloat 22s ease-in-out infinite alternate;
}

.orb-1 {
  width: 460px;
  height: 460px;
  background: var(--teal);
  top: -160px;
  left: -120px;
}

.orb-2 {
  width: 380px;
  height: 380px;
  background: var(--cyan);
  bottom: -100px;
  right: -100px;
}

@keyframes orbFloat {
  from { transform: translate3d(0, 0, 0) scale(1); }
  to   { transform: translate3d(40px, -30px, 0) scale(1.1); }
}

::selection { background: var(--teal-border); color: var(--text); }

::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 6px; }

/* ─────────────────────────────────────────────
   LOGO COM FILTRO GLOW
───────────────────────────────────────────── */
.app-logo-img {
  display: block;
  filter: var(--logo-filter);
  transition: filter .3s var(--ease);
}

/* ─────────────────────────────────────────────
   LOADER CINEMÁTICO
───────────────────────────────────────────── */
#app-loader {
  position: fixed; inset: 0;
  background: var(--bg);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 24px;
  z-index: 9999;
  transition: opacity .45s var(--ease-spring), visibility .45s;
}
#app-loader.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

.loader-logo {
  width: 76px; height: 76px;
  border-radius: 22px;
  background: var(--teal-dim);
  border: 1.5px solid var(--teal-border);
  display: flex; align-items: center; justify-content: center;
  animation: loaderPulse 2.4s ease-in-out infinite;
}
@keyframes loaderPulse {
  0%,100% { box-shadow: 0 0 0 0 var(--teal-border), 0 0 24px var(--teal-glow-soft); }
  50%      { box-shadow: 0 0 0 16px transparent, 0 0 44px var(--teal-dim); }
}

.loader-spinner {
  width: 32px; height: 32px;
  border: 2.5px solid var(--border2);
  border-top-color: var(--teal);
  border-radius: 50%;
  animation: spin .75s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.loader-text {
  font-size: 11px; font-family: 'DM Mono', monospace;
  color: var(--text-dim); letter-spacing: 0.8px;
  text-transform: uppercase;
}

/* ─────────────────────────────────────────────
   APP ROOT
───────────────────────────────────────────── */
#app {
  min-height: 100vh; min-height: 100dvh;
  opacity: 0; transition: opacity .4s var(--ease);
  position: relative; z-index: 1;
}
#app.ready { opacity: 1; }

/* ─────────────────────────────────────────────
   TOAST NOTIFICATION (GLASS DESIGN)
───────────────────────────────────────────── */
#toast-container {
  position: fixed; bottom: 94px; right: 16px;
  display: flex; flex-direction: column; gap: 10px;
  z-index: 10000; pointer-events: none;
}
@media (min-width: 600px) { #toast-container { bottom: 24px; right: 24px; } }

.toast {
  background: var(--bg-glass-strong);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 14px 18px;
  font-size: 13px; color: var(--text);
  display: flex; align-items: center; gap: 12px;
  box-shadow: var(--shadow-lg), var(--shadow-glow);
  pointer-events: auto;
  backdrop-filter: blur(28px); -webkit-backdrop-filter: blur(28px);
  animation: toastIn .38s var(--ease-spring);
  max-width: 360px; min-width: 240px;
}
.toast.success { border-left: 3.5px solid var(--success); }
.toast.error   { border-left: 3.5px solid var(--danger);   }
.toast.info    { border-left: 3.5px solid var(--teal);  }
.toast.warning { border-left: 3.5px solid var(--gold);  }
.toast-icon { font-size: 16px; flex-shrink: 0; }
.toast-msg  { flex: 1; font-size: 13px; line-height: 1.45; font-weight: 600; }
.toast-close {
  background: none; border: none; cursor: pointer;
  color: var(--text-dim); font-size: 18px; padding: 0; line-height: 1;
  flex-shrink: 0; transition: color .15s;
}
.toast-close:hover { color: var(--text-muted); }
@keyframes toastIn {
  from { opacity: 0; transform: translateY(12px) scale(.95); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}
.toast.hiding { animation: toastOut .22s var(--ease) forwards; }
@keyframes toastOut { to { opacity: 0; transform: translateY(8px) scale(.95); } }

/* ─────────────────────────────────────────────
   MODAL — BOTTOM SHEET MOBILE & CENTERED DESKTOP
───────────────────────────────────────────── */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0, 0, 0, 0.72);
  backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
  display: flex; align-items: flex-end; justify-content: center;
  z-index: 5000;
  opacity: 0; visibility: hidden;
  transition: opacity .3s var(--ease), visibility .3s;
}
.modal-overlay.open { opacity: 1; visibility: visible; }

.modal-box {
  background: var(--bg3);
  border: 1.5px solid var(--border2);
  border-radius: var(--radius-lg) var(--radius-lg) 0 0;
  width: 100%; max-width: 520px;
  max-height: 90dvh; overflow-y: auto;
  padding: 36px 24px 40px;
  box-shadow: var(--shadow-lg), 0 -8px 48px rgba(0, 0, 0, 0.6);
  transform: translateY(32px);
  transition: transform .35s var(--ease-spring);
  position: relative;
}
/* Handle */
.modal-box::before {
  content: '';
  position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
  width: 42px; height: 4px; border-radius: 2px;
  background: var(--border2);
}
/* Teal accent line */
.modal-box::after {
  content: '';
  position: absolute; top: 0; left: 20%; right: 20%; height: 2.5px;
  background: linear-gradient(90deg, transparent, var(--teal), transparent);
  border-radius: 0 0 2px 2px;
}
.modal-overlay.open .modal-box { transform: translateY(0); }

@media (min-width: 600px) {
  .modal-overlay { align-items: center; padding: 18px; }
  .modal-box {
    border-radius: var(--radius-lg);
    transform: translateY(20px) scale(.97);
  }
  .modal-box::before { display: none; }
  .modal-overlay.open .modal-box { transform: translateY(0) scale(1); }
}

/* ─────────────────────────────────────────────
   BOTÕES GLOW PREMIUM (ESTILO STRIPE/LINEAR)
───────────────────────────────────────────── */
.btn {
  display: inline-flex; align-items: center; justify-content: center;
  gap: 8px; height: 48px; min-width: 48px; padding: 0 24px;
  border-radius: var(--radius);
  border: 1.5px solid transparent;
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 14px; font-weight: 700;
  cursor: pointer; transition: all .24s var(--ease);
  text-decoration: none; white-space: nowrap;
  position: relative; overflow: hidden; letter-spacing: .2px;
  isolation: isolate;
}
.btn::before {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(180deg, rgba(255,255,255,.15), transparent);
  opacity: .5; z-index: -1; transition: opacity .2s;
}
.btn:hover:not(:disabled) { transform: translateY(-2px); }
.btn:active:not(:disabled) { transform: scale(.97); }
.btn:disabled { opacity: .45; cursor: not-allowed; }

.btn-primary {
  background: linear-gradient(135deg, var(--teal-light) 0%, var(--teal-dark) 100%);
  color: #fff;
  box-shadow: 0 8px 24px var(--teal-glow-soft), inset 0 1px 0 rgba(255,255,255,.2);
}
.btn-primary:hover:not(:disabled) {
  box-shadow: 0 16px 48px var(--teal-glow), 0 0 25px rgba(0, 217, 198, 0.25);
}

.btn-secondary {
  background: var(--bg-glass);
  border-color: var(--border);
  backdrop-filter: blur(20px);
  color: var(--text);
  box-shadow: var(--shadow-sm);
}
.btn-secondary:hover:not(:disabled) {
  background: var(--bg-glass-strong);
  border-color: var(--border-strong);
}

.btn-ghost {
  background: transparent; color: var(--text-muted); border-color: transparent;
}
.btn-ghost:hover:not(:disabled) {
  background: var(--bg4); color: var(--text); border-color: var(--border);
}

.btn-danger {
  background: var(--danger-dim); color: var(--danger); border-color: rgba(255, 94, 122, 0.25);
}
.btn-danger:hover:not(:disabled) {
  background: var(--danger); color: #fff; border-color: transparent;
  box-shadow: 0 12px 32px rgba(255, 94, 122, 0.25);
}

.btn-full { width: 100%; }
.btn-lg { height: 54px; padding: 0 28px; font-size: 15px; border-radius: var(--radius-lg); }
.btn-sm { height: 38px; padding: 0 16px; font-size: 12px; border-radius: var(--radius-sm); }

.btn-spinner {
  width: 18px; height: 18px;
  border: 2px solid rgba(255, 255, 255, 0.3); border-top-color: #fff;
  border-radius: 50%; animation: spin .7s linear infinite; display: none;
}
.loading .btn-spinner { display: block; }
.loading .btn-text    { display: none; }

/* ─────────────────────────────────────────────
   INPUTS GLOW
───────────────────────────────────────────── */
.field { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
.field label {
  font-size: 11px; font-weight: 800; letter-spacing: 1px;
  text-transform: uppercase; color: var(--text-muted);
}
.field .input-wrap { position: relative; }
.field .input-wrap .input-icon {
  position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
  color: var(--teal); opacity: 0.75; display: flex; align-items: center; pointer-events: none;
  transition: opacity .2s;
  z-index: 2;
}
.field .input-wrap:focus-within .input-icon { opacity: 1; }

input[type="text"], input[type="email"], input[type="password"],
input[type="tel"], input[type="date"], input[type="number"],
select, textarea {
  width: 100%; height: 52px;
  background: var(--bg-glass);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-family: 'Plus Jakarta Sans', sans-serif; font-size: 16px !important;
  padding: 0 18px;
  transition: border-color .24s, box-shadow .24s, background-color .24s;
  appearance: none; -webkit-appearance: none;
  backdrop-filter: blur(14px);
}
input.has-icon-left  { padding-left: 48px; }
input.has-icon-right { padding-right: 48px; }
input:focus, select:focus, textarea:focus {
  outline: none; border-color: rgba(0, 217, 198, 0.45);
  background: var(--bg-glass-strong);
  box-shadow: 0 0 0 4px var(--teal-glow-soft), 0 0 24px rgba(0, 217, 198, 0.06);
}
input::placeholder { color: var(--text-dim); }
textarea { height: auto; min-height: 110px; padding: 16px 18px; resize: vertical; }

.field .field-error { font-size: 12px; color: var(--danger); display: none; margin-top: 4px; font-weight: 600; }
.field.has-error input, .field.has-error select { border-color: var(--danger); }
.field.has-error .field-error { display: block; }

/* ─────────────────────────────────────────────
   CARDS GLASSMORPHISM (STRIPE STYLE)
───────────────────────────────────────────── */
.card {
  background: var(--glass-bg-premium);
  border: var(--glass-border-premium);
  border-radius: var(--radius-lg);
  padding: 24px;
  backdrop-filter: blur(28px); -webkit-backdrop-filter: blur(28px);
  transition: border-color .24s, box-shadow .24s;
  box-shadow: var(--shadow-glow);
}
.card:hover { border-color: var(--border-strong); box-shadow: 0 15px 45px rgba(0, 217, 198, 0.05), var(--shadow-glow); }

.card::after {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(circle at top right, rgba(255, 255, 255, 0.06), transparent 45%);
  pointer-events: none;
}

/* ─────────────────────────────────────────────
   BADGES & AVATARS
───────────────────────────────────────────── */
.badge {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 4px 12px; border-radius: 100px;
  font-size: 11px; font-weight: 800;
  font-family: 'DM Mono', monospace; letter-spacing: .4px;
}
.badge-teal   { background: var(--teal-dim);   color: var(--teal);   border: 1px solid var(--teal-border); }
.badge-gold   { background: var(--gold-dim);   color: var(--gold);   border: 1px solid rgba(215, 177, 91, 0.25); }
.badge-green  { background: var(--success-dim);  color: var(--success);  border: 1px solid rgba(54, 211, 153, 0.25); }
.badge-red    { background: var(--danger-dim);    color: var(--danger);    border: 1px solid rgba(255, 94, 122, 0.25); }
.badge-muted  { background: var(--bg4);        color: var(--text-muted); }
.badge-purple { background: var(--purple-dim); color: var(--purple); border: 1px solid rgba(155, 124, 255, 0.25); }

.avatar {
  width: 42px; height: 42px; border-radius: 50%;
  background: linear-gradient(135deg, var(--teal-dim), rgba(0, 217, 198, 0.2));
  border: 2px solid var(--teal-border);
  display: flex; align-items: center; justify-content: center;
  font-weight: 800; font-size: 14px; color: var(--teal);
  flex-shrink: 0;
}
.avatar-lg { width: 54px; height: 54px; font-size: 18px; }
.avatar-xl { width: 76px; height: 76px; font-size: 26px; border-width: 2.5px; }

/* ─────────────────────────────────────────────
   EMPTY STATES
───────────────────────────────────────────── */
.empty-state {
  display: flex; flex-direction: column; align-items: center;
  padding: 64px 24px; text-align: center; gap: 14px;
}
.empty-state-icon  { font-size: 48px; opacity: .25; color: var(--text-muted); }

.empty-state-desc  { font-size: 14px; color: var(--text-muted); max-width: 280px; line-height: 1.65; }

/* ─────────────────────────────────────────────
   VIEW TRANSITION (CINEMATIC REVEAL)
───────────────────────────────────────────── */
.view-container { animation: cinematicIn .68s var(--ease-spring); }
@keyframes cinematicIn {
  from { opacity: 0; transform: translateY(20px) scale(.985); filter: blur(6px); }
  to   { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
}

/* ─────────────────────────────────────────────
   SKELETON SHIMMER EFFECT
───────────────────────────────────────────── */
.skeleton {
  background: linear-gradient(90deg, var(--bg3) 25%, var(--bg4) 50%, var(--bg3) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.5s infinite;
  border-radius: var(--radius-sm);
}
@keyframes shimmer { to { background-position: -200% 0; } }

.divider { border: none; border-top: 1px solid var(--border); margin: 24px 0; }

/* ── BOTTOM DOCK NAV INTEGRATED ── */
.bottom-nav {
  background: var(--bg-glass-strong);
  backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
  border: 1px solid var(--border);
  box-shadow: 0 15px 45px rgba(0,0,0,0.45), 0 0 35px rgba(0, 217, 198, 0.06);
  border-radius: 24px;
}

/* ─────────────────────────────────────────────
   LIGHT MODE BACKGROUND — INSPIRAÇÃO SaaS
───────────────────────────────────────────── */
[data-theme="light"] body::before {
  background:
    radial-gradient(ellipse at 5% 0%, rgba(0,217,198,0.13) 0%, transparent 40%),
    radial-gradient(ellipse at 95% 5%, rgba(47,128,237,0.10) 0%, transparent 40%),
    radial-gradient(ellipse at 50% 100%, rgba(139,110,255,0.07) 0%, transparent 45%),

}

/* ─────────────────────────────────────────────

───────────────────────────────────────────── */

<div id="app-loader">

<div id="toast-container" aria-live="polite"></div>

<script>
// ══════════════════════════════════════════════════════════
//  APP SHELL · Roteamento, Estado Global, Utilitários UI
//  ATENÇÃO: Zero backticks — ES5 only
// ══════════════════════════════════════════════════════════

// ── ESTADO GLOBAL ────────────────────────────────────────
var App = {
  session: null,        // { token, nome, email, perfil, primeiroAcesso }
  currentView: null,
  TOKEN_KEY: 'ad_sess_token'
};

// ── ROTEAMENTO ───────────────────────────────────────────
var VIEWS = {
  login:             'renderLogin',
  'primeiro-acesso': 'renderPrimeiroAcesso',
  'recuperar-senha': 'renderRecuperarSenha',
  home:              'renderHome',
  'escola-dominical':'renderEscolaDominical',
  'membros':         'renderMembros',
  'usuarios':        'renderUsuarios'
};

// ── PERMISSÕES POR ROTA ───────────────────────────────────
// Define quais perfis podem acessar cada view protegida.
// 'admin' sempre tem acesso total — não precisa ser listado
// explicitamente; a regra abaixo já contempla.
var ROUTE_PERMISSIONS = {
  'home':              ['admin'],
  'escola-dominical':  ['admin', 'secretaria', 'professor'],
  'membros':           ['admin', 'secretaria'],
  'usuarios':          ['admin', 'secretaria']
};

// Retorna a view de destino padrão para cada perfil após login
function _homeViewForPerfil(perfil) {
  if (perfil === 'secretaria') return 'escola-dominical';
  if (perfil === 'professor')  return 'escola-dominical';
  return 'home'; // admin
}

function navigateTo(view, params) {
  App.currentView = view;

  var authRequired = ['home', 'escola-dominical', 'membros', 'usuarios'];

  // 1. Sem sessão → login
  if (authRequired.indexOf(view) !== -1 && !App.session) {
    navigateTo('login');
    return;
  }

  // 2. Com sessão → checar permissão de perfil para a rota
  if (App.session && ROUTE_PERMISSIONS[view]) {
    var perfil   = App.session.perfil || '';
    var allowed  = ROUTE_PERMISSIONS[view];
    if (allowed.indexOf(perfil) === -1) {
      showToast('Acesso restrito ao seu perfil.', 'error');
      // Redireciona para a home correta do perfil sem criar loop
      var fallback = _homeViewForPerfil(perfil);
      if (fallback !== view) navigateTo(fallback);
      return;
    }
  }

  var fn = VIEWS[view];
  if (!fn || typeof window[fn] !== 'function') {
    showToast('Visualização "' + view + '" não encontrada.', 'error');
    return;
  }
  window[fn](params);
}

// ── RENDER HELPER ────────────────────────────────────────
function renderView(html) {
  var app = document.getElementById('app');
  app.innerHTML = '<div class="view-container">' + html + '</div>';
  applyLogoSrc();
  if (window.lucide) lucide.createIcons();
}

// ── SESSION STORAGE ──────────────────────────────────────
function saveSession(sessao) {
  App.session = sessao;
  try { sessionStorage.setItem(App.TOKEN_KEY, sessao.token); } catch(e) {}
}

function clearSession() {
  App.session = null;
  try { sessionStorage.removeItem(App.TOKEN_KEY); } catch(e) {}
}

function getSavedToken() {
  try { return sessionStorage.getItem(App.TOKEN_KEY); } catch(e) { return null; }
}

// ── TOAST NOTIFICATIONS ───────────────────────────────────
function showToast(msg, type, duration) {
  type     = type     || 'info';
  duration = duration || 4000;

  var icons = { success: '✓', error: '✕', info: 'ℹ', warning: '!' };
  var container = document.getElementById('toast-container');

  var el = document.createElement('div');
  el.className = 'toast ' + type;
  el.innerHTML =
    '<span class="toast-icon">' + (icons[type] || 'ℹ') + '</span>' +
    '<span class="toast-msg">' + msg + '</span>' +
    '<button class="toast-close" onclick="dismissToast(this.parentElement)">×</button>';

  container.appendChild(el);

  setTimeout(function() { dismissToast(el); }, duration);
}

function dismissToast(el) {
  if (!el || !el.parentElement) return;
  el.classList.add('hiding');
  setTimeout(function() { if (el.parentElement) el.parentElement.removeChild(el); }, 250);
}

// ── BTN LOADING ──────────────────────────────────────────
function setBtnLoading(btn, loading) {
  if (!btn) return;
  if (loading) {
    btn.disabled = true;
    btn.classList.add('loading');
  } else {
    btn.disabled = false;
    btn.classList.remove('loading');
  }
}

// ── SHA-256 CLIENT-SIDE ──────────────────────────────────
function sha256(str) {
  var msgBuffer = new TextEncoder().encode(str);
  return crypto.subtle.digest('SHA-256', msgBuffer).then(function(hashBuffer) {
    var hashArray = Array.from(new Uint8Array(hashBuffer));
    return hashArray.map(function(b) {
      var h = b.toString(16);
      return h.length === 1 ? '0' + h : h;
    }).join('');
  });
}

// ── AVATAR INICIAIS ──────────────────────────────────────
function getInitials(nome) {
  if (!nome) return '?';
  var parts = nome.trim().split(' ');
  if (parts.length === 1) return parts[0][0].toUpperCase();
  return (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
}

// ── VALIDAÇÕES ───────────────────────────────────────────
function validateEmail(email) {
  return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
}

function validatePassword(pwd) {
  return pwd.length >= 8 &&
         /[A-Z]/.test(pwd) &&
         /[0-9]/.test(pwd) &&
         /[^A-Za-z0-9]/.test(pwd);
}

function getPasswordStrength(pwd) {
  var score = 0;
  if (pwd.length >= 8)           score++;
  if (pwd.length >= 12)          score++;
  if (/[A-Z]/.test(pwd))         score++;
  if (/[0-9]/.test(pwd))         score++;
  if (/[^A-Za-z0-9]/.test(pwd))  score++;
  if (score <= 1) return { level: 'weak',   label: 'Fraca',  color: '#FF5E7A' };
  if (score <= 3) return { level: 'medium', label: 'Média',  color: '#D7B15B' };
  return                { level: 'strong', label: 'Forte',  color: '#36D399' };
}

// ── FORMATAR DATA BR ──────────────────────────────────────
function formatDateBR(dateStr) {
  if (!dateStr) return '';
  var d = new Date(dateStr);
  if (isNaN(d)) return dateStr;
  return d.toLocaleDateString('pt-BR');
}

// ── INICIALIZAÇÃO ─────────────────────────────────────────
function initApp() {
  var savedToken = getSavedToken();

  if (savedToken) {
    google.script.run
      .withSuccessHandler(function(res) {
        if (res && res.success) {
          App.session = res.data;
          if (res.data.primeiroAcesso) {
            navigateTo('primeiro-acesso');
          } else {
            navigateTo(_homeViewForPerfil(res.data.perfil || ''));
          }
        } else {
          clearSession();
          navigateTo('login');
        }
        hideLoader();
        document.getElementById('app').classList.add('ready');
      })
      .withFailureHandler(function() {
        clearSession();
        navigateTo('login');
        hideLoader();
        document.getElementById('app').classList.add('ready');
      })
      .getSession(savedToken);
  } else {
    var urlParams   = new URLSearchParams(window.location.search);
    var recovToken  = '<?= recovToken ?>' || urlParams.get('token') || '';
    var view        = urlParams.get('view') || '<?= view ?>';

    if ((view === 'recuperar-senha') && recovToken) {
      navigateTo('recuperar-senha', { token: recovToken });
    } else {
      navigateTo('login');
    }
    hideLoader();
    document.getElementById('app').classList.add('ready');
  }
}

function hideLoader() {
  var loader = document.getElementById('app-loader');
  if (loader) loader.classList.add('hidden');
}

// ── USER DROPDOWN ────────────────────────────────────────
function toggleUserDropdown() {
  var dd = document.getElementById('user-dropdown');
  if (dd) dd.classList.toggle('open');
}
function closeDropdown() {
  var dd = document.getElementById('user-dropdown');
  if (dd) dd.classList.remove('open');
}
document.addEventListener('click', function(e) {
  var btn = document.getElementById('avatar-btn');
  var dd  = document.getElementById('user-dropdown');
  if (!dd || !dd.classList.contains('open')) return;
  if (btn && btn.contains(e.target)) return;
  if (!dd.contains(e.target)) dd.classList.remove('open');
});

// ── TEMA ─────────────────────────────────────────────────
var THEME_KEY = 'ad_theme';

function initTheme() {
  var saved = localStorage.getItem(THEME_KEY) || 'dark';
  document.documentElement.setAttribute('data-theme', saved);
  applyLogoSrc();
  var icon = saved === 'dark' ? 'moon' : 'sun';
  var btns = document.querySelectorAll('.theme-toggle-btn');
  btns.forEach(function(btn) {
    btn.innerHTML = '<i data-lucide="'+icon+'" style="width:18px;height:18px"></i>';
  });
  if (window.lucide) lucide.createIcons();
}

function toggleTheme() {
  var current = document.documentElement.getAttribute('data-theme') || 'dark';
  var next = current === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem(THEME_KEY, next);

  var btns = document.querySelectorAll('.theme-toggle-btn');
  btns.forEach(function(btn) {
    btn.innerHTML = next === 'dark' 
      ? '<i data-lucide="sun" style="width:18px;height:18px"></i>' 
      : '<i data-lucide="moon" style="width:18px;height:18px"></i>';
  });

  if (window.lucide) {
    lucide.createIcons();
  }
  applyLogoSrc();
}

// ── START ─────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', function() {
  initTheme();
  setTimeout(initApp, 300);
});

// ── APPLY LOGO SRC ────────────────────────────────────────
function applyLogoSrc() {
  var loaderImg = document.getElementById('loader-logo-img');
  if (loaderImg) loaderImg.src = LOGO_SRC;

  var appImgs = document.querySelectorAll('.app-logo-img');
  for (var i = 0; i < appImgs.length; i++) {
    appImgs[i].src = LOGO_SRC;
  }
}

// ── BOOTSTRAP ─────────────────────────────────────────────
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', function() {
    applyLogoSrc();
    initApp();
  });
} else {
  applyLogoSrc();
  initApp();
}
