function _edIniciarChamada() {
  var aulaId   = document.getElementById('chamada-aula-sel').value;
  var classeId = document.getElementById('chamada-classe-sel').value;
  if (!aulaId)   { showToast('Selecione a aula.','error'); return; }
  if (!classeId) { showToast('Selecione a turma.','error'); return; }
  ED.chamada.aulaId   = aulaId;
  ED.chamada.classeId = classeId;
  ED.chamada.registros = {};
  var body = document.getElementById('chamada-body');
  body.innerHTML = '<div style="padding:32px;text-align:center"><div class="loader-spinner" style="margin:0 auto"></div></div>';
  google.script.run
    .withFailureHandler(function(e){ showToast(e.message,'error'); body.innerHTML=''; })
    .withSuccessHandler(function(r) {
      if (!_handleResponse(r,'getChamada')) { body.innerHTML=''; return; }
      var d = r.data;
      ED.chamada.extras = d.extras || ED.extras || [];
      d.alunos.forEach(function(a) {
        ED.chamada.registros[a.alunoId] = {
          presente:     a.presente,
          biblia:       a.biblia,
          revista:      a.revista,
          pontosExtras: a.pontosExtras||[],
          totalOfertas: a.totalOfertas||0
        };
      });
      _edRenderChamadaForm(d.alunos, d.jaLancada);
    })
    .ed_getChamada(App.session.token, aulaId, classeId);
}

function _edRenderChamadaForm(alunos, jaLancada) {
  var body = document.getElementById('chamada-body');
  if (!body) return;
  if (!alunos.length) {
    body.innerHTML = '<div class="ed-empty"><div class="ed-empty-title">Sem alunos nesta turma</div></div>';
    return;
  }
  var html = (jaLancada?
    '<div style="background:var(--teal-dim);border:1px solid rgba(0,196,181,0.2);border-radius:var(--radius);padding:12px 16px;margin-bottom:16px;font-size:13px;color:var(--teal)">'+
      '✓ Chamada já lançada — editando.</div>':'');

  alunos.forEach(function(a) {
    var reg = ED.chamada.registros[a.alunoId]||{presente:false,biblia:false,revista:false,pontosExtras:[],totalOfertas:0};
    var cor = _avatarColor(a.nome);
    html += '<div class="ed-aluno-card'+(reg.presente?' presente':' ausente')+'" id="card-'+a.alunoId+'">'+
      '<div class="ed-aluno-top">'+
        '<div class="ed-item-avatar" style="background:'+cor.bg+';color:'+cor.fg+';width:36px;height:36px;font-size:13px">'+_initials(a.nome)+'</div>'+
        '<div class="ed-aluno-name">'+_esc(a.nome)+'</div>'+
        '<div class="ed-aluno-pontos" id="pts-'+a.alunoId+'">'+_calcPontos(a.alunoId)+' pts</div>'+
      '</div>'+
      '<div class="ed-checks">'+
        '<button class="ed-check-btn'+(reg.presente?' on':'')+'" onclick="edTogglePresenca(\''+a.alunoId+'\')">'+
          (reg.presente?'✓ Presente':'Ausente')+
        '</button>'+
        '<button class="ed-check-btn biblia'+(reg.biblia?' on':'')+'" id="btn-bib-'+a.alunoId+'" onclick="edToggleBiblia(\''+a.alunoId+'\')"'+(reg.presente?'':' disabled')+'>'+
          '📖 Bíblia'+
        '</button>'+
        '<button class="ed-check-btn revista'+(reg.revista?' on':'')+'" id="btn-rev-'+a.alunoId+'" onclick="edToggleRevista(\''+a.alunoId+'\')"'+(reg.presente?'':' disabled')+'>'+
          '📰 Revista'+
        '</button>'+
      '</div>'+
      (function() {
        var allExtras = ED.chamada.extras || [];
        if (!allExtras.length) return '';
        var row = '<div class="ed-extras-row" id="extras-'+a.alunoId+'">';
        allExtras.forEach(function(ex) {
          var on = (reg.pontosExtras||[]).some(function(e){ return e.id === ex.ID; });
          row += '<button class="ed-extra-btn'+(on?' on':'')+'"'+(reg.presente?'':' disabled')+
            ' onclick="edToggleExtra(\''+a.alunoId+'\',\''+ex.ID+'\')">'+
            '⭐ +'+ex.Pontos+' '+_esc(ex.Nome)+
          '</button>';
        });
        return row + '</div>';
      })()+
    '</div>';
  });

  html += '<div style="margin-top:16px;display:flex;align-items:center;gap:12px">'+
    '<div id="chamada-bar-info" style="flex:1;font-size:12px;color:var(--text-muted)">'+_chamadaBarInfo()+'</div>'+
    '<button class="btn btn-primary" id="btn-salvar-chamada" onclick="edSalvarChamada()">'+
      '<span class="btn-text">Salvar Chamada</span><div class="btn-spinner"></div>'+
    '</button>'+
  '</div>';

  body.innerHTML = html;
  if (window.lucide) lucide.createIcons();
}

function edTogglePresenca(id) {
  var reg = ED.chamada.registros[id]; if(!reg) return;
  reg.presente = !reg.presente;
  if (!reg.presente) { reg.biblia=false; reg.revista=false; reg.pontosExtras=[]; reg.totalOfertas=0; }
  _edAtualizarCardAluno(id);
  var bi = document.getElementById('chamada-bar-info');
  if (bi) bi.innerHTML = _chamadaBarInfo();
}
function edToggleBiblia(id) {
  var reg = ED.chamada.registros[id]; if(!reg||!reg.presente) return;
  reg.biblia = !reg.biblia; _edAtualizarCardAluno(id);
}
function edToggleRevista(id) {
  var reg = ED.chamada.registros[id]; if(!reg||!reg.presente) return;
  reg.revista = !reg.revista; _edAtualizarCardAluno(id);
}
function edToggleExtra(alunoId, extraId) {
  var reg = ED.chamada.registros[alunoId]; if(!reg||!reg.presente) return;
  var extras = reg.pontosExtras||[];
  var idx = -1;
  for (var i=0;i<extras.length;i++) { if(extras[i].id===extraId){idx=i;break;} }
  if (idx>=0) {
    extras.splice(idx,1);
  } else {
    var allExtras = ED.chamada.extras||[];
    var ex = null;
    for (var j=0;j<allExtras.length;j++) { if(allExtras[j].ID===extraId){ex=allExtras[j];break;} }
    if (ex) extras.push({id:ex.ID, nome:ex.Nome, pontos:Number(ex.Pontos)||0});
  }
  reg.pontosExtras = extras;
  _edAtualizarCardAluno(alunoId);
}

function _edAtualizarCardAluno(id) {
  var reg = ED.chamada.registros[id]; if(!reg) return;
  var card = document.getElementById('card-'+id);
  if (card) { card.className = 'ed-aluno-card'+(reg.presente?' presente':' ausente'); }
  var ptsEl = document.getElementById('pts-'+id);
  if (ptsEl) ptsEl.textContent = _calcPontos(id)+' pts';
  var presBtn = card ? card.querySelector('.ed-check-btn') : null;
  if (presBtn) { presBtn.className='ed-check-btn'+(reg.presente?' on':''); presBtn.textContent=reg.presente?'✓ Presente':'Ausente'; }
  var bibBtn = document.getElementById('btn-bib-'+id);
  if (bibBtn) { bibBtn.className='ed-check-btn biblia'+(reg.biblia?' on':''); bibBtn.disabled=!reg.presente; }
  var revBtn = document.getElementById('btn-rev-'+id);
  if (revBtn) { revBtn.className='ed-check-btn revista'+(reg.revista?' on':''); revBtn.disabled=!reg.presente; }
  var extrasRow = document.getElementById('extras-'+id);
  if (extrasRow) {
    var allExtras = ED.chamada.extras||[];
    var html = '';
    allExtras.forEach(function(ex) {
      var on = (reg.pontosExtras||[]).some(function(e){ return e.id===ex.ID; });
      html += '<button class="ed-extra-btn'+(on?' on':'')+'"'+(reg.presente?'':' disabled')+
        ' onclick="edToggleExtra(\''+id+'\',\''+ex.ID+'\')">'+'⭐ +'+ex.Pontos+' '+_esc(ex.Nome)+'</button>';
    });
    extrasRow.innerHTML = html;
  }
}

function _calcPontos(id) {
  var reg = ED.chamada.registros[id]||{}; if(!reg.presente) return 0;
  var pts = 1;
  if (reg.biblia)  pts += 2;
  if (reg.revista) pts += 2;
  (reg.pontosExtras||[]).forEach(function(e){ pts += Number(e.pontos)||0; });
  return pts;
}
function _chamadaBarInfo() {
  var total=0, pres=0;
  Object.keys(ED.chamada.registros).forEach(function(k){ total++; if(ED.chamada.registros[k].presente) pres++; });
  return '<strong>'+pres+'</strong> de <strong>'+total+'</strong> presentes';
}

function edSalvarChamada() {
  var aulaId   = ED.chamada.aulaId;
  var classeId = ED.chamada.classeId;
  if (!aulaId||!classeId) { showToast('Selecione aula e turma.','error'); return; }
  var registros = Object.keys(ED.chamada.registros).map(function(id) {
    var r = ED.chamada.registros[id];
    return {alunoId:id, presente:r.presente, biblia:r.biblia, revista:r.revista, pontosExtras:r.pontosExtras||[], totalOfertas:r.totalOfertas||0};
  });
  var btn = document.getElementById('btn-salvar-chamada');
  if (btn) btn.classList.add('loading');
  google.script.run
    .withFailureHandler(function(e){ if(btn)btn.classList.remove('loading'); showToast(e.message,'error'); })
    .withSuccessHandler(function(r) {
      if(btn) btn.classList.remove('loading');
      if (!_handleResponse(r,'salvarChamada')) return;
      showToast('Chamada salva!','success');
    })
    .ed_salvarChamada(App.session.token, aulaId, classeId, registros);
}

// ══════════════════════════════════════════
//  RANKING
// ══════════════════════════════════════════
function _edRenderRanking(panel) {
  var classeOpts = '<option value="">Todas as turmas</option>';
  ED.classes.forEach(function(c) {
    classeOpts += '<option value="'+c.ID+'"'+(ED.filtroClasse===c.ID?' selected':'')+'>'+_esc(c.Nome)+'</option>';
  });
  panel.innerHTML =
    '<div class="ed-section-header">'+
      '<div><div class="ed-section-title">Ranking</div><div class="ed-section-sub">Por pontuação acumulada</div></div>'+
    '</div>'+
    '<div class="ed-filter-row">'+
      '<select class="ed-filter-select" id="ranking-classe-sel" onchange="ED.filtroClasse=this.value;_edCarregarRanking()">'+classeOpts+'</select>'+
    '</div>'+
    '<div id="ranking-lista"><div style="padding:32px;text-align:center"><div class="loader-spinner" style="margin:0 auto"></div></div></div>';
  _edCarregarRanking();
}

function _edCarregarRanking() {
  google.script.run
    .withFailureHandler(function(e){ showToast(e.message,'error'); })
    .withSuccessHandler(function(r) {
      var lista = document.getElementById('ranking-lista');
      if (!lista) return;
      if (!_handleResponse(r,'ranking')) { lista.innerHTML=''; return; }
      var alunos = r.data;
      if (!alunos.length) { lista.innerHTML='<div class="ed-empty"><div class="ed-empty-title">Nenhum aluno</div></div>'; return; }
      var html = '';
      alunos.forEach(function(a, i) {
        var pos = i===0?'🥇':i===1?'🥈':i===2?'🥉':(i+1)+'º';
        var cor = _avatarColor(a.Nome);
        var classe = _edFindById(ED.classes, a.ClasseID);
        html += '<div class="ed-ranking-item">'+
          '<div class="ed-rank-num">'+(i<3?pos:(i+1))+'</div>'+
          '<div class="ed-item-avatar" style="background:'+cor.bg+';color:'+cor.fg+'">'+_initials(a.Nome)+'</div>'+
          '<div class="ed-item-body">'+
            '<div class="ed-item-name">'+_esc(a.Nome)+'</div>'+
            '<div class="ed-item-meta">'+(classe?_esc(classe.Nome):'Sem turma')+'</div>'+
          '</div>'+
          '<div>'+
            '<div class="ed-rank-pts">'+(Number(a.TotalPontos)||0)+'</div>'+
            '<div class="ed-rank-pts-label">pontos</div>'+
          '</div>'+
        '</div>';
      });
      lista.innerHTML = html;
    })
    .ed_getRankingAlunos(App.session.token, ED.filtroClasse||null);
}

}
function edCloseModal(id) {
  var el = document.getElementById(id);
  if (el) el.classList.remove('open');
}
