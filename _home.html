<style>
/* ══════════════════════════════════════════════════
   HOME DASHBOARD PREMIUM v4 — COMPLETO E INTEGRADO
══════════════════════════════════════════════════ */

:root {
  --topnav-bg:       rgba(5, 11, 16, 0.90);
  --bg-glass2:       rgba(20, 32, 44, 0.72);
  --teal-dim2:       rgba(0, 217, 198, 0.20);
  --teal-glow2:      rgba(0, 217, 198, 0.22);
  --shadow-teal:     0 8px 32px rgba(0, 217, 198, 0.14), 0 0 0 1px rgba(0, 217, 198, 0.08);
  --shadow-teal2:    0 14px 44px rgba(0, 217, 198, 0.22), 0 0 0 1px rgba(0, 217, 198, 0.14);
  --red:             var(--danger);
  --red-dim:         var(--danger-dim);
  --green:           var(--success);
  --green-dim:       var(--success-dim);
  --glass-bg-premium:     linear-gradient(180deg, rgba(255,255,255,.05) 0%, rgba(255,255,255,.01) 100%);
  --glass-border-premium: 1px solid rgba(255, 255, 255, 0.08);
}

[data-theme="light"] {
  --topnav-bg:            rgba(255, 255, 255, 0.92);
  --bg-glass2:            #FFFFFF;
  --teal-dim2:            rgba(0, 137, 123, 0.12);
  --teal-glow2:           rgba(0, 137, 123, 0.05);
  --shadow-teal:          0 10px 25px -5px rgba(0, 137, 123, 0.08);
  --shadow-teal2:         0 20px 30px -10px rgba(0, 137, 123, 0.12);
  --glass-bg-premium:     linear-gradient(180deg, #FFFFFF 0%, #F8FAFC 100%);
  --glass-border-premium: 1px solid #E2E8F0;
}

/* ── TOP NAV ── */
.topnav {
  position: sticky; top: 0; z-index: 100;
  background: var(--topnav-bg);
  backdrop-filter: blur(32px) saturate(180%);
  -webkit-backdrop-filter: blur(32px) saturate(180%);
  border-bottom: 1px solid var(--border);
  padding: 0 20px; height: 62px;
  display: flex; align-items: center; gap: 12px;
  box-shadow: 0 1px 0 var(--border), 0 4px 24px rgba(0,0,0,.2);
}
[data-theme="light"] .topnav {
  box-shadow: 0 4px 20px -5px rgba(15, 23, 42, 0.05), 0 1px 0 0 #E2E8F0;
}
.topnav::before {
  content: ''; position: absolute; top: 0; left: 10%; right: 10%; height: 1.5px;
  background: linear-gradient(90deg, transparent, var(--teal), transparent); opacity: .55;
}
.topnav-left  { display: flex; align-items: center; gap: 12px; flex: 1; min-width: 0; }
.topnav-right { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }

.topnav-logo-icon {
  width: 40px; height: 40px; border-radius: 12px;
  background: linear-gradient(135deg, rgba(0, 217, 198, 0.15), rgba(0, 217, 198, 0.06));
  border: 1px solid var(--teal-border); display: flex; align-items: center; justify-content: center;
  overflow: hidden; flex-shrink: 0; box-shadow: 0 0 20px rgba(0,217,198,.14);
}
.topnav-name { font-size: 14px; font-weight: 800; color: var(--text); letter-spacing: -.4px; line-height: 1.15; }
.topnav-sub { font-size: 10px; color: var(--text-dim); font-family: 'DM Mono', monospace; letter-spacing: .6px; text-transform: uppercase; }
.topnav-sep { width: 1px; height: 24px; background: var(--border); flex-shrink: 0; margin: 0 4px; }
.home-usr-label { display: inline; }
@media (max-width: 860px) { .home-usr-label { display: none; } }

.topnav-icon-btn {
  width: 36px; height: 36px; border-radius: 10px; background: transparent; border: 1px solid transparent;
  color: var(--text-muted); cursor: pointer; display: flex; align-items: center; justify-content: center;
}
.topnav-icon-btn:hover { background: var(--bg4); color: var(--text); }
.notif-dot { position: absolute; top: 5px; right: 5px; width: 7px; height: 7px; border-radius: 50%; background: var(--danger); }

/* ── Gear menu (mobile) ── */
.home-nav-cfg-wrap { position: relative; }
.home-nav-cfg-dd {
  position: fixed; right: 12px; top: 66px;
  background: var(--bg-elevated, var(--bg3)); border: 1px solid var(--border2, var(--border));
  border-radius: 14px; padding: 7px;
  box-shadow: 0 12px 40px rgba(0,0,0,0.32);
  z-index: 9998; min-width: 220px;
  display: none; flex-direction: column; gap: 2px;
}
.home-nav-cfg-dd.open { display: flex; }
.home-nav-cfg-dd button, .home-nav-cfg-dd .home-nav-cfg-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 13px; border-radius: 9px; border: none;
  background: none; cursor: pointer; font-size: 13px; font-weight: 600;
  color: var(--text); text-align: left; width: 100%;
  font-family: 'Plus Jakarta Sans', sans-serif;
  transition: background 0.15s;
}
.home-nav-cfg-dd button:hover, .home-nav-cfg-dd .home-nav-cfg-item:hover { background: var(--bg4); }
.home-nav-cfg-dd button.danger { color: var(--danger); }
.home-nav-cfg-dd button.danger:hover { background: var(--danger-dim); }
.home-nav-cfg-dd .cfg-divider { height: 1px; background: var(--border); margin: 4px 0; }
.home-nav-cfg-dd .cfg-label {
  font-size: 10px; font-weight: 800; color: var(--text-muted);
  text-transform: uppercase; letter-spacing: .07em;
  padding: 6px 13px 2px;
}

/* Desktop: mostrar botões individuais, esconder gear */
@media (min-width: 640px) {
  .home-nav-cfg-wrap { display: none; }
  .home-nav-desktop  { display: flex !important; }
}
/* Mobile: esconder botões individuais, mostrar gear */
@media (max-width: 639px) {
  .home-nav-desktop { display: none !important; }
}

.topnav-avatar-wrap { position: relative; }
.topnav-avatar-btn { background: none; border: none; cursor: pointer; padding: 2px; border-radius: 50%; }
.topnav-avatar-btn .avatar { width: 34px; height: 34px; font-size: 13px; }

/* ── USER DROPDOWN ── */
.user-dropdown {
  position: absolute; top: calc(100% + 10px); right: 0; background: var(--bg-elevated);
  border: 1px solid var(--border2); border-radius: var(--radius-lg); padding: 6px; min-width: 220px;
  box-shadow: var(--shadow-lg); z-index: 200; opacity: 0; visibility: hidden; transform: translateY(-8px) scale(.97); transition: all .2s var(--ease);
}
.user-dropdown.open { opacity: 1; visibility: visible; transform: translateY(0) scale(1); }
.user-dd-header { padding: 12px 12px 14px; border-bottom: 1px solid var(--border); margin-bottom: 4px; }
.user-dd-nome  { font-size: 14px; font-weight: 800; color: var(--text); }
.user-dd-email { font-size: 11px; color: var(--text-muted); margin-top: 2px; font-family: 'DM Mono',monospace; }
.user-dd-item {
  display: flex; align-items: center; gap: 10px; width: 100%; padding: 9px 12px;
  background: none; border: none; cursor: pointer; font-size: 13px; font-weight: 600; color: var(--text-muted);
  border-radius: var(--radius-sm); font-family: 'Plus Jakarta Sans',sans-serif; text-align: left;
}
.user-dd-item:hover { background: var(--bg4); color: var(--text); }
.user-dd-item.danger:hover { background: var(--danger-dim); color: var(--danger); }

/* ── HERO ── */
.home-hero {
  padding: 16px 18px 52px; position: relative; overflow: hidden;
  background: linear-gradient(175deg, #050e18 0%, #071825 55%, #050e18 100%);
}
[data-theme="light"] .home-hero {
  background: linear-gradient(135deg, #034840 0%, #096358 100%) !important;
}
.home-hero::before {
  content: ''; position: absolute; top: -80px; right: -60px; width: 340px; height: 340px;
  border-radius: 50%; background: radial-gradient(circle, rgba(0,217,198,.18) 0%, transparent 65%); pointer-events: none;
}
.hero-profile-badge {
  display: inline-flex; align-items: center; gap: 10px; background: rgba(0,217,198,.08);
  border: 1px solid rgba(0,217,198,.18); border-radius: 100px; padding: 5px 14px 5px 5px; margin-bottom: 20px; position: relative; z-index: 1;
}
.hero-badge-avatar {
  width: 30px; height: 30px; border-radius: 50%; background: var(--teal-dim);
  border: 1.5px solid var(--teal-border); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 800; color: var(--teal);
}
.hero-badge-name { font-size: 12px; font-weight: 700; color: #ffffff; }
.hero-badge-role { font-size: 10px; color: rgba(0,220,210,.7); font-family: 'DM Mono',monospace; }

.home-hero-greeting { font-size: 15px; color: #fff; font-weight: 700; letter-spacing: -.2px; margin-bottom: 2px; position: relative; z-index: 1; }
.home-hero-title { font-size: clamp(22px,5vw,30px); font-weight: 900; color: #fff; line-height: 1.1; letter-spacing: -.6px; margin-bottom: 8px; position: relative; z-index: 1; }
.home-hero-sub { font-size: 12px; color: rgba(255,255,255,.55); line-height: 1.4; position: relative; z-index: 1; }

/* Forçar cores claras no Hero durante o Light Mode (Garante o contraste) */
[data-theme="light"] .home-hero .hero-badge-name,
[data-theme="light"] .home-hero .home-hero-title { color: #FFFFFF !important; }
[data-theme="light"] .home-hero .home-hero-sub { color: rgba(255,255,255,0.7) !important; }
[data-theme="light"] .home-hero .home-hero-greeting,
[data-theme="light"] .home-hero .hero-badge-role { color: #00FFF0 !important; }

/* ── KPI GRID ── */
.kpi-grid-wrapper { padding: 0 14px; margin-top: -32px; position: relative; z-index: 10; margin-bottom: 28px; }
.kpi-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 10px; }
@media (min-width: 640px) { .kpi-grid { grid-template-columns: repeat(4,1fr); } }

.kpi-card {
  background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-lg);
  padding: 18px 16px 16px; display: flex; flex-direction: column; gap: 0;
  transition: border-color .22s, transform .22s, box-shadow .22s; cursor: default;
  position: relative; overflow: hidden; box-shadow: var(--shadow-sm);
}
[data-theme="light"] .kpi-card {
  background: #FFFFFF; border-color: #E2E8F0;
  box-shadow: 0 4px 6px -1px rgba(15, 23, 42, 0.03), 0 2px 4px -1px rgba(15, 23, 42, 0.02);
}

/* Linha pulsante na base */
.kpi-card::after {
  content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, transparent, var(--kpi-color), transparent);
  animation: kpi-pulse-line 2.4s ease-in-out infinite;
}
@keyframes kpi-pulse-line {
  0%,100% { opacity: .25; } 50% { opacity: .8; }
}

.kpi-card:hover { border-color: var(--kpi-border); transform: translateY(-4px); box-shadow: 0 16px 40px var(--kpi-shadow); }
[data-theme="light"] .kpi-card:hover { box-shadow: 0 12px 24px -8px rgba(15,23,42,0.10); }

/* Tokens por cor */
.kpi-card.kc-teal  {
  --kpi-color: var(--teal);
  --kpi-border: rgba(0,217,198,0.32);
  --kpi-shadow: rgba(0,217,198,0.14);
  --kpi-glow: rgba(0,217,198,0.35);
}
.kpi-card.kc-blue  {
  --kpi-color: var(--cyan);
  --kpi-border: rgba(77,179,255,0.32);
  --kpi-shadow: rgba(77,179,255,0.14);
  --kpi-glow: rgba(77,179,255,0.35);
}
.kpi-card.kc-gold  {
  --kpi-color: var(--gold);
  --kpi-border: rgba(215,177,91,0.32);
  --kpi-shadow: rgba(215,177,91,0.14);
  --kpi-glow: rgba(215,177,91,0.35);
}
.kpi-card.kc-green {
  --kpi-color: var(--success);
  --kpi-border: rgba(54,211,153,0.32);
  --kpi-shadow: rgba(54,211,153,0.14);
  --kpi-glow: rgba(54,211,153,0.35);
}
[data-theme="light"] .kpi-card.kc-teal  { --kpi-color: var(--teal);    --kpi-border: rgba(0,137,123,0.28);  --kpi-shadow: rgba(0,137,123,0.10);  --kpi-glow: rgba(0,137,123,0.2); }
[data-theme="light"] .kpi-card.kc-blue  { --kpi-color: var(--cyan);    --kpi-border: rgba(2,132,199,0.28);  --kpi-shadow: rgba(2,132,199,0.10);  --kpi-glow: rgba(2,132,199,0.2); }
[data-theme="light"] .kpi-card.kc-gold  { --kpi-color: var(--gold);    --kpi-border: rgba(180,83,9,0.28);   --kpi-shadow: rgba(180,83,9,0.10);   --kpi-glow: rgba(180,83,9,0.2); }
[data-theme="light"] .kpi-card.kc-green { --kpi-color: var(--success); --kpi-border: rgba(22,163,74,0.28);  --kpi-shadow: rgba(22,163,74,0.10);  --kpi-glow: rgba(22,163,74,0.2); }

/* Topo do card: ponto + tag */
.kpi-top { display: flex; align-items: center; gap: 7px; margin-bottom: 12px; }
.kpi-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--kpi-color); box-shadow: 0 0 8px var(--kpi-color); flex-shrink: 0; }
.kpi-tag { font-size: 8px; font-weight: 800; letter-spacing: 1.2px; font-family: 'DM Mono',monospace; color: var(--kpi-color); opacity: .8; text-transform: uppercase; }

/* Número oversized */
.kpi-value {
  font-size: 44px; font-weight: 900; font-family: 'DM Mono',monospace;
  color: var(--text); line-height: .9; letter-spacing: -3px;
  text-shadow: 0 0 40px var(--kpi-glow);
  position: relative; z-index: 1;
}
.kpi-label { font-size: 10.5px; font-weight: 700; color: var(--text-muted); margin-top: 8px; line-height: 1.3; position: relative; z-index: 1; }

/* Ghost / marca d'água */
.kpi-ghost {
  position: absolute; right: -12px; bottom: -12px;
  color: var(--kpi-color); opacity: 0.06; pointer-events: none; z-index: 0;
  transform: rotate(-8deg);
  transition: opacity .3s;
}
.kpi-card:hover .kpi-ghost { opacity: .11; }
.kpi-ghost i { width: 90px; height: 90px; display: block; }

/* ── MÓDULOS & SEÇÕES ── */
.home-section { padding: 0 16px; margin-bottom: 28px; }
.section-label { font-size: 10px; font-weight: 800; letter-spacing: 1.4px; text-transform: uppercase; color: var(--text-dim); font-family: 'DM Mono',monospace; margin-bottom: 14px; display: flex; align-items: center; gap: 10px; }
.section-label::after { content:''; flex:1; height:1px; background: var(--border); }

.modules-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 10px; }
@media (min-width: 600px) { .modules-grid { grid-template-columns: repeat(3,1fr); } }

.module-btn {
  background: var(--bg-glass); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 20px 16px 18px;
  cursor: pointer; display: flex; flex-direction: column; align-items: flex-start; gap: 10px; transition: all .22s var(--ease); position: relative; overflow: hidden; text-align: left;
}
[data-theme="light"] .module-btn { background: #FFFFFF; border-color: #E2E8F0; }
.module-btn:hover { background: var(--bg-glass2); border-color: var(--border2); transform: translateY(-3px); box-shadow: var(--shadow-teal); }
[data-theme="light"] .module-btn:hover { border-color: rgba(0,137,123,0.3); box-shadow: 0 10px 15px -3px rgba(15, 23, 42, 0.04); }

.module-btn-icon { width: 48px; height: 48px; border-radius: var(--radius-sm); background: var(--teal-dim); border: 1px solid var(--teal-border); display: flex; align-items: center; justify-content: center; color: var(--teal); }
.module-btn-name { font-size: 13px; font-weight: 800; color: var(--text); letter-spacing: -.2px; line-height: 1.2; }
.module-btn-desc { font-size: 11px; color: var(--text-muted); line-height: 1.4; }
.module-btn-badge { position: absolute; top: 12px; right: 12px; font-size: 9px; font-weight: 800; letter-spacing: .6px; text-transform: uppercase; font-family: 'DM Mono',monospace; color: var(--text-dim); background: var(--bg4); border: 1px solid var(--border); border-radius: 100px; padding: 2px 8px; }

/* ── ATIVIDADES ── */
.activity-list { display: flex; flex-direction: column; gap: 4px; }
.activity-item { display: flex; align-items: center; gap: 12px; padding: 12px 14px; background: var(--bg-glass); border: 1px solid transparent; border-radius: var(--radius-sm); transition: all .15s; cursor: pointer; }
[data-theme="light"] .activity-item { background: #FFFFFF; border-color: #E2E8F0; }
.activity-item:hover { background: var(--bg-glass2); border-color: var(--border); }
.activity-icon { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.activity-body { flex: 1; min-width: 0; }
.activity-text { font-size: 13px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.activity-time { font-size: 11px; color: var(--text-dim); margin-top: 1px; font-family: 'DM Mono',monospace; }
.activity-arrow { color: var(--text-dim); flex-shrink: 0; }

/* ── BOTTOM NAV ── */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg-glass-strong); backdrop-filter: blur(28px) saturate(200%);
  border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-around; padding: 8px 8px; z-index: 90; box-shadow: 0 -8px 40px rgba(0,0,0,.3);
}
.bnav-item { flex: 1; max-width: 80px; display: flex; flex-direction: column; align-items: center; gap: 3px; background: none; border: none; cursor: pointer; font-size: 10px; font-weight: 700; color: var(--text-dim); bnav-item.active { color: var(--teal); } }
.bnav-item i { width: 22px; height: 22px; display: block; }
</style>

<script>
// ═══════════════════════════════════════════════════
//  HOME DASHBOARD VIEW — v4
// ═══════════════════════════════════════════════════

var HomeState = {
  kpis: { membros: 0, alunos: 0, professores: 0, turmas: 0 }
};

function renderHome() {
  if (!App.session) { navigateTo('login'); return; }

  var nome   = App.session.nome || '';
  var perfil = App.session.perfil || '';

  var hora  = new Date().getHours();
  var sauda = hora < 12 ? 'Bom dia' : hora < 18 ? 'Boa tarde' : 'Boa noite';

  var perfilLabel = {
    admin:      'Administrador',
    secretaria: 'Secretaria',
    professor:  'Professor(a)'
  }[perfil] || perfil;

  var isAdmin = perfil === PERFIS_CLIENT.ADMIN;
  var isSec   = perfil === PERFIS_CLIENT.SECRETARIA || isAdmin;

  renderView(
    /* ══ TOP NAV IMPECÁVEL ══ */
    '<header class=\"topnav\">' +
      '<div class=\"topnav-left\">' +
        '<div class=\"topnav-logo-icon\">' +
          '<img src=\"\" alt=\"Logo AD\" class=\"app-logo-img\" style=\"width:28px;height:28px;object-fit:contain\">' +
        '</div>' +
        '<div>' +
          '<div class=\"topnav-name\">AD Fonte da Salvação</div>' +
          '<div class=\"topnav-sub\">gestão ministerial</div>' +
        '</div>' +
      '</div>' +
      '<div class=\"topnav-right\">' +

        /* ── Botões desktop ── */
        '<div class=\"home-nav-desktop\" style=\"display:flex;align-items:center;gap:6px\">' +
          '<button class=\"topnav-icon-btn\" style=\"position:relative\" onclick=\"showToast(\'Em breve: notificações!\', \'info\')\" title=\"Notificações\">' +
            '<div class=\"notif-dot\"></div>' +
            '<i data-lucide=\"bell\" style=\"width:17px;height:17px\"></i>' +
          '</button>' +
          '<button class=\"theme-toggle-btn topnav-icon-btn\" onclick=\"toggleTheme()\" title=\"Alternar tema\">' +
            '<i data-lucide=\"moon\" style=\"width:17px;height:17px\"></i>' +
          '</button>' +
          '<div class=\"topnav-sep\"></div>' +
          (isSec ? '<button class=\"topnav-icon-btn\" onclick=\"navigateTo(\'usuarios\')\" title=\"Gerenciar Usuários\" style=\"display:flex;align-items:center;gap:5px;padding:0 10px;font-size:12px;font-weight:700;color:var(--text-muted)\">' +
            '<i data-lucide=\"shield-check\" style=\"width:16px;height:16px;color:var(--teal)\"></i>' +
            '<span class=\"home-usr-label\">Usuários</span>' +
          '</button>' : '') +
          '<div class=\"topnav-avatar-wrap\">' +
            '<button class=\"topnav-avatar-btn\" onclick=\"toggleUserDropdown()\" id=\"avatar-btn\" title=\"' + nome + '\">' +
              '<div class=\"avatar\" style=\"width:34px;height:34px;font-size:12px\">' + getInitials(nome) + '</div>' +
            '</button>' +
            '<div class=\"user-dropdown\" id=\"user-dropdown\">' +
              '<div class=\"user-dd-header\">' +
                '<div class=\"user-dd-nome\">' + nome + '</div>' +
                '<div class=\"user-dd-email\">' + (App.session.email || '') + '</div>' +
                '<div style=\"margin-top:8px\">' +
                  '<span class=\"badge badge-teal\">' + perfilLabel + '</span>' +
                '</div>' +
              '</div>' +
              '<button class=\"user-dd-item\" onclick=\"closeDropdown(); navigateTo(\'home\')\">' +
                '<i data-lucide=\"layout-dashboard\" style=\"width:15px;height:15px\"></i> Dashboard' +
              '</button>' +
              '<button class=\"user-dd-item\" onclick=\"closeDropdown(); showTrocarSenha()\">' +
                '<i data-lucide=\"key\" style=\"width:15px;height:15px\"></i> Alterar senha' +
              '</button>' +
              '<hr class=\"divider\" style=\"margin:6px 0\">' +
              '<button class=\"user-dd-item danger\" onclick=\"handleLogout()\">' +
                '<i data-lucide=\"log-out\" style=\"width:15px;height:15px\"></i> Sair' +
              '</button>' +
            '</div>' +
          '</div>' +
        '</div>' +

        /* ── Engrenagem mobile ── */
        '<div class=\"home-nav-cfg-wrap\">' +
          '<button class=\"topnav-icon-btn\" onclick=\"homeToggleNavCfg(event)\" title=\"Menu\">' +
            '<i data-lucide=\"settings-2\" style=\"width:17px;height:17px\"></i>' +
          '</button>' +
          '<div class=\"home-nav-cfg-dd\" id=\"home-nav-cfg-dd\">' +
            '<div class=\"cfg-label\">Conta</div>' +

/* ── HELPERS ── */
var PERFIS_CLIENT = { ADMIN: 'admin', SECRETARIA: 'secretaria', PROFESSOR: 'professor' };

function _kpiSkeleton() {
  return '<div class="kpi-card kc-teal">' +
    '<div class="kpi-top">' +
      '<div class="skeleton" style="width:6px;height:6px;border-radius:50%;flex-shrink:0"></div>' +
      '<div class="skeleton" style="width:60px;height:9px;border-radius:4px"></div>' +
    '</div>' +
    '<div class="skeleton" style="width:70%;height:40px;border-radius:6px;margin-bottom:8px"></div>' +
    '<div class="skeleton" style="width:85%;height:10px;border-radius:4px"></div>' +
  '</div>';
}


function _kpiCard(icon, colorClass, value, label, tag) {
  var tagText = tag || label.split(' ')[0];
  return '<div class="kpi-card ' + colorClass + '">' +
    '<div class="kpi-top">' +
      '<div class="kpi-dot"></div>' +
      '<span class="kpi-tag">' + tagText + '</span>' +
    '</div>' +
    '<div class="kpi-value">' + value + '</div>' +
    '<div class="kpi-label">' + label + '</div>' +
    '<div class="kpi-ghost">' +
      '<i data-lucide="' + icon + '" style="width:90px;height:90px"></i>' +
    '</div>' +
  '</div>';
}


function _moduleBtn(icon, name, desc, view, locked, badgeText) {
  var lockedClass = locked ? ' locked' : '';
  var clickAttr   = (!locked && view) ? 'onclick=\"navigateTo(\'' + view + '\')\"' : '';
  return '<button class=\"module-btn' + lockedClass + '\" ' + clickAttr + '>' +
    (badgeText ? '<span class=\"module-btn-badge\">' + badgeText + '</span>' : '') +
    '<div class=\"module-btn-icon\"><i data-lucide=\"' + icon + '\" style=\"width:22px;height:22px\"></i></div>' +
    '<div class=\"module-btn-name\">' + name + '</div>' +
    '<div class=\"module-btn-desc\">' + desc + '</div>' +
  '</button>';
}

function _loadKpis() {
  google.script.run
    .withSuccessHandler(function(res) {
      if (!res || !res.success) return;
      var d    = res.data;
      var grid = document.getElementById('kpi-grid');
      if (!grid) return;

      grid.innerHTML =
        _kpiCard('users',        'kc-teal',  d.membros     || 0, 'Membros cadastrados', 'Membros') +
        _kpiCard('backpack',     'kc-blue',  d.alunos      || 0, 'Alunos na ED',        'Alunos ED') +
        _kpiCard('user-check',   'kc-gold',  d.professores || 0, 'Professores ativos',  'Professores') +
        _kpiCard('school',       'kc-green', d.turmas      || 0, 'Turmas ativas',       'Turmas');

      if (window.lucide) setTimeout(function(){ lucide.createIcons(); }, 0);
    })
    .withFailureHandler(function() {})
    .getKpisHome(App.session.token);
}

function _loadActivity() {
  google.script.run
    .withSuccessHandler(function(res) {
      var list = document.getElementById('activity-list');
      if (!list) return;
      if (!res || !res.success || !res.data || !res.data.length) {
        list.innerHTML =
          '<div class=\"empty-state\">' +
            '<div class=\"empty-state-icon\">📋</div>' +
            '<div class=\"empty-state-title\">Nenhuma atividade recente</div>' +
            '<div class=\"empty-state-desc\">As ações recentes aparecerão aqui.</div>' +
          '</div>';
        return;
      }
      var html = '';
      res.data.forEach(function(item) {
        html +=
          '<div class=\"activity-item\">' +
            '<div class=\"activity-icon\" style=\"background:var(--teal-dim);color:var(--teal)\">' +
              '<i data-lucide=\"' + (item.icon || 'file-text') + '\" style=\"width:18px;height:18px\"></i>' +
            '</div>' +
            '<div class=\"activity-body\">' +
              '<div class=\"activity-text\">' + item.texto + '</div>' +
              '<div class=\"activity-time\">' + (item.tempo || '') + '</div>' +
            '</div>' +
            '<i data-lucide=\"chevron-right\" class=\"activity-arrow\" style=\"width:15px;height:15px\"></i>' +
          '</div>';
      });
      list.innerHTML = html;
      if (window.lucide) setTimeout(function(){ lucide.createIcons(); }, 0);
    })
    .withFailureHandler(function() {})
    .getAtividadeRecente(App.session.token);
}

/* ── DROPDOWN ── */
function toggleUserDropdown() {
  var dd = document.getElementById('user-dropdown');
  if (dd) dd.classList.toggle('open');
}
function closeDropdown() {
  var dd = document.getElementById('user-dropdown');
  if (dd) dd.classList.remove('open');
}

function homeToggleNavCfg(e) {
  if (e) e.stopPropagation();
  var dd = document.getElementById('home-nav-cfg-dd');
  if (!dd) return;
  var opening = !dd.classList.contains('open');
  dd.classList.toggle('open');
  if (opening) {
    if (window.lucide) lucide.createIcons();
    setTimeout(function() {
      document.addEventListener('click', function _close(ev) {
        if (!dd.contains(ev.target)) {
          dd.classList.remove('open');
          document.removeEventListener('click', _close);
        }
      });
    }, 0);
  }
}

/* ── LOGOUT ── */
function handleLogout() {
  closeDropdown();
  if (!App.session) { navigateTo('login'); return; }
  google.script.run
    .withSuccessHandler(function() {
      clearSession();
      showToast('Sessão encerrada. Até logo!', 'info');
      navigateTo('login');
    })
    .withFailureHandler(function() {
      clearSession();
      navigateTo('login');
    })
    .logout(App.session.token);
}

function _modalTrocarSenha() {
  return '<div class=\"modal-overlay\" id=\"modal-troca-senha\">' +

      '<div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:20px\">' +
        '<h3 style=\"font-size:17px;font-weight:800;color:var(--text)\">Alterar senha</h3>' +
        '<button class=\"btn btn-ghost btn-sm\" style=\"width:36px;padding:0\" onclick=\"closeModalTrocarSenha()\">×</button>' +
      '</div>' +

      '<div class=\"login-error-msg\" id=\"ts-error\">' +
        '<span>⚠</span><span id=\"ts-error-text\"></span>' +
      '</div>' +

      '<div class=\"field\">' +
        '<label for=\"ts-atual\">Senha atual</label>' +
        '<div class=\"input-wrap\">' +
          '<span class=\"input-icon\"><i data-lucide=\"lock\" style=\"width:18px;height:18px\"></i></span>' +
          '<input type=\"password\" id=\"ts-atual\" class=\"has-icon-left has-icon-right\" placeholder=\"Sua senha atual\">' +
          '<button type=\"button\" class=\"pwd-toggle-btn\" onclick=\"togglePwdVisibility(\'ts-atual\', this)\" tabindex=\"-1\">' +
            '<i data-lucide=\"eye\" style=\"width:18px;height:18px\"></i>' +
          '</button>' +
        '</div>' +
      '</div>' +

      '<div class=\"field\">' +
        '<label for=\"ts-nova\">Nova senha</label>' +
        '<div class=\"input-wrap\">' +
          '<span class=\"input-icon\"><i data-lucide=\"lock\" style=\"width:18px;height:18px\"></i></span>' +
          '<input type=\"password\" id=\"ts-nova\" class=\"has-icon-left has-icon-right\" placeholder=\"Mínimo 8 caracteres\" oninput=\"tsCheckStrength()\">' +
          '<button type=\"button\" class=\"pwd-toggle-btn\" onclick=\"togglePwdVisibility(\'ts-nova\', this)\" tabindex=\"-1\">' +
            '<i data-lucide=\"eye\" style=\"width:18px;height:18px\"></i>' +
          '</button>' +
        '</div>' +
        '<div class=\"pwd-strength visible\">' +
          '<div class=\"pwd-strength-bar\"><div class=\"pwd-strength-fill\" id=\"ts-strength-fill\" style=\"width:0%\"></div></div>' +
          '<span class=\"pwd-strength-label\" id=\"ts-strength-label\"></span>' +
        '</div>' +
      '</div>' +

      '<div class=\"field\">' +
        '<label for=\"ts-confirma\">Confirmar nova senha</label>' +
        '<div class=\"input-wrap\">' +
          '<span class=\"input-icon\"><i data-lucide=\"lock-keyhole\" style=\"width:18px;height:18px\"></i></span>' +
          '<input type=\"password\" id=\"ts-confirma\" class=\"has-icon-left has-icon-right\" placeholder=\"Repita a nova senha\">' +
          '<button type=\"button\" class=\"pwd-toggle-btn\" onclick=\"togglePwdVisibility(\'ts-confirma\', this)\" tabindex=\"-1\">' +
            '<i data-lucide=\"eye\" style=\"width:18px;height:18px\"></i>' +
          '</button>' +
        '</div>' +
        '<span class=\"field-error\">As senhas não conferem.</span>' +
      '</div>' +

      '<div style=\"display:flex;gap:10px;margin-top:4px\">' +
        '<button class=\"btn btn-secondary btn-full\" onclick=\"closeModalTrocarSenha()\">Cancelar</button>' +
        '<button class=\"btn btn-primary btn-full\" id=\"btn-ts\" onclick=\"handleTrocarSenha()\">' +
          '<span class=\"btn-spinner\"></span>' +
          '<span class=\"btn-text\">Salvar</span>' +
        '</button>' +
      '</div>' +
    '</div>' +
  '</div>';
}

function showTrocarSenha() {
  closeDropdown();
  var m = document.getElementById('modal-troca-senha');
  if (m) {
    m.classList.add('open');
    ['ts-atual','ts-nova','ts-confirma'].forEach(function(id) {
      var el = document.getElementById(id);
      if (el) el.value = '';
    });
    var errBox = document.getElementById('ts-error');
    if (errBox) errBox.classList.remove('visible');
    if (window.lucide) lucide.createIcons();
  }
}
function closeModalTrocarSenha() {
  var m = document.getElementById('modal-troca-senha');
  if (m) m.classList.remove('open');
}

function tsCheckStrength() {
  var pwd   = document.getElementById('ts-nova').value;
  var fill  = document.getElementById('ts-strength-fill');
  var label = document.getElementById('ts-strength-label');
  var s     = getPasswordStrength(pwd);
  var pcts  = { weak: '25%', medium: '65%', strong: '100%' };
  fill.style.width      = pwd.length ? pcts[s.level] : '0%';
  fill.style.background = s.color;
  label.textContent     = pwd.length ? ('Senha ' + s.label) : '';
  label.style.color     = s.color;
}

function handleTrocarSenha() {
  var atualEl   = document.getElementById('ts-atual');
  var novaEl    = document.getElementById('ts-nova');
  var confirmEl = document.getElementById('ts-confirma');
  var btn       = document.getElementById('btn-ts');
  var errBox    = document.getElementById('ts-error');
  var errTxt    = document.getElementById('ts-error-text');

  errBox.classList.remove('visible');
  confirmEl.closest('.field').classList.remove('has-error');

  var atual    = atualEl.value;
  var nova     = novaEl.value;
  var confirma = confirmEl.value;

  if (!atual || !nova || !confirma) {
    errTxt.textContent = 'Preencha todos os campos.';
    errBox.classList.add('visible'); return;
  }
  if (!validatePassword(nova)) {
    errTxt.textContent = 'A nova senha não atende aos requisitos.';
    errBox.classList.add('visible'); return;
  }
  if (nova !== confirma) {
    confirmEl.closest('.field').classList.add('has-error'); return;
  }

  setBtnLoading(btn, true);

  Promise.all([sha256(atual), sha256(nova)]).then(function(hashes) {
    google.script.run
      .withSuccessHandler(function(res) {
        setBtnLoading(btn, false);
        if (res.success) {
          closeModalTrocarSenha();
          showToast('Senha alterada com sucesso! ✓', 'success');
        } else {
          errTxt.textContent = res.error;
          errBox.classList.add('visible');
        }
      })
      .withFailureHandler(function() {
        setBtnLoading(btn, false);
        errTxt.textContent = 'Erro de conexão. Tente novamente.';
        errBox.classList.add('visible');
      })
      .trocarSenha(App.session.token, hashes[0], hashes[1]);
  });
}
