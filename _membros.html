<script>
/* ══════════════════════════════════════════════════════════
   MÓDULO MEMBROS — lógica de frontend
   Prefixo MB / mb_ — nunca colide com ED / ed_
══════════════════════════════════════════════════════════ */

// ── Estado global do módulo ──────────────────────────────
var MB = {
  membros:  [],
  tab:      'lista',
  search:   '',
  filtroAtivo: 'todos',   // 'todos' | 'ativos' | 'inativos'

  fotoZoom: 1,
  fotoX:    50,
  fotoY:    50,
  fotoMimeType: 'image/jpeg',
  fotoNome:     'foto.jpg',
  fotoNova:     false,   // true quando usuário selecionou nova foto nesta sessão
  proximoRol: '0001',
  // Cache: fileId → 'data:<mime>;base64,...'
  // Evita CORS ao carregar fotos do Drive no iframe GAS.
  _fotoCache: {}
};

var _mbConfirmCb = null;

// ── Escape HTML ──────────────────────────────────────────
function _mbEsc(s) {
  if (s == null) return '';
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Trata resposta do servidor (igual ao _handleResponse da ED) ──
function _mbHandleResponse(r, ctx) {
  if (!r) { showToast('Sem resposta do servidor (' + ctx + ').','error'); return false; }
  if (!r.success) {
    var msg = r.error || 'Erro desconhecido';
    if (msg.indexOf('Sess') !== -1 || msg.indexOf('xpirada') !== -1 || msg.indexOf('utorizado') !== -1) {
      showToast('Sessão expirada. Faça login novamente.','error');
      setTimeout(function(){ navigateTo('login'); }, 1500);
      return false;
    }
    showToast(msg,'error');
    return false;
  }
  return true;
}

// ── Utilitários de data / máscara ────────────────────────
function _mbNomeProprio(texto) {
  if (!texto) return '';
  texto = String(texto).toLowerCase().trim();
  var palavras = texto.split(/\s+/);
  var excecoes = ['de', 'da', 'do', 'das', 'dos', 'e'];
  
  for (var i = 0; i < palavras.length; i++) {
    // Se for a primeira palavra ou não estiver na lista de exceções, capitaliza
    if (i === 0 || excecoes.indexOf(palavras[i]) === -1) {
      palavras[i] = palavras[i].charAt(0).toUpperCase() + palavras[i].substring(1);
    }
  }
  return palavras.join(' ');
}

function _mbAbreviarNome(nome) {
  if (!nome) return '';
  var partes = nome.trim().split(/\s+/);
  if (partes.length <= 2) return nome; // Não abrevia se tiver apenas 2 palavras
  
  var excecoes = ['de', 'da', 'do', 'das', 'dos', 'e'];
  var primeiro = partes[0];
  var ultimo = partes[partes.length - 1];
  var meio = '';
  
  for (var i = 1; i < partes.length - 1; i++) {
    var p = partes[i].toLowerCase();
    if (excecoes.indexOf(p) === -1) {
      meio += partes[i].charAt(0).toUpperCase() + '. ';
    }
  }
  
  return primeiro + ' ' + meio + ultimo;
}

function _mbMaskDate(v) {
  var d = v.replace(/\D/g,'').slice(0,8);
  if (d.length <= 2) return d;
  if (d.length <= 4) return d.slice(0,2)+'/'+d.slice(2);
  return d.slice(0,2)+'/'+d.slice(2,4)+'/'+d.slice(4);
}
function _mbMaskPhone(v) {
  var d = v.replace(/\D/g,'').slice(0,11);
  if (d.length <= 2) return d;
  if (d.length <= 7) return '('+d.slice(0,2)+') '+d.slice(2);
  return '('+d.slice(0,2)+') '+d.slice(2,7)+'-'+d.slice(7);
}
function _mbMaskCEP(v) {
  var d = v.replace(/\D/g,'').slice(0,8);
  if (d.length <= 5) return d;
  return d.slice(0,5)+'-'+d.slice(5);
}
function _mbParseDate(s) {
  if (!s) return null;
  var p = String(s).split('/');
  if (p.length < 3) return null;
  return new Date(p[2], p[1]-1, p[0]);
}
function _mbIsHoje(s) {
  var d = _mbParseDate(s); if (!d) return false;
  var t = new Date();
  return d.getDate()===t.getDate() && d.getMonth()===t.getMonth();
}
function _mbNesteMes(s) {
  var d = _mbParseDate(s); if (!d) return false;
  return d.getMonth() === new Date().getMonth();
}
function _mbDiasAniv(s) {
  var d = _mbParseDate(s); if (!d) return null;
  var t = new Date();
  var prox = new Date(t.getFullYear(), d.getMonth(), d.getDate());
  if (prox < t) prox.setFullYear(t.getFullYear()+1);
  return Math.ceil((prox - t) / 864e5);
}
function _mbIdade(s) {
  var d = _mbParseDate(s); if (!d) return null;
  var t = new Date(), a = t.getFullYear()-d.getFullYear();
  var m = t.getMonth()-d.getMonth();
  if (m < 0 || (m===0 && t.getDate()<d.getDate())) a--;
  return a;
}
function _mbInitials(nome) {
  if (!nome) return '?';
  var p = nome.trim().split(' ');
  if (p.length === 1) return p[0][0].toUpperCase();
  return (p[0][0]+p[p.length-1][0]).toUpperCase();
}

// ── Carregamento de dados do servidor ───────────────────
function _mbLoad(cb) {
  var token = App.session && App.session.token;
  if (!token) { showToast('Sessão inválida.','error'); navigateTo('login'); return; }
  var panel = document.getElementById('mb-panel');
  if (panel) panel.innerHTML = '<div style="padding:48px;text-align:center"><div class="loader-spinner" style="margin:0 auto"></div></div>';
  google.script.run
    .withFailureHandler(function(e){ showToast((e&&e.message)||'Erro ao carregar membros.','error'); })
    .withSuccessHandler(function(r) {
      if (!_mbHandleResponse(r,'listarMembros')) return;
      MB.membros = r.data || [];
      // Pré-carrega base64 das fotos que ainda não estão em cache
      _mbPreCarregarFotos(MB.membros, function(){ if (cb) cb(); });
    })
    .mb_listarMembros(token);
}

// Carrega base64 de todos os membros com foto (fileId) que ainda não estão no cache.
// Faz as chamadas em série para não sobrecarregar o GAS.
function _mbPreCarregarFotos(membros, done) {
  var token = App.session && App.session.token;
  // Coleta fileIds únicos que precisam ser buscados
  var pendentes = [];
  membros.forEach(function(m) {
    var fid = m.foto ? String(m.foto).trim() : '';
    // Considera fileId: não começa com 'data:' e não é URL http
    if (fid && fid.indexOf('data:') !== 0 && fid.indexOf('http') !== 0 && !MB._fotoCache[fid]) {
      // Evita duplicatas na fila
      var jaEsta = false;
      for (var pi = 0; pi < pendentes.length; pi++) { if (pendentes[pi] === fid) { jaEsta = true; break; } }
      if (!jaEsta) pendentes.push(fid);
    }
    // Migração: se foto é URL antiga do Drive, limpa para não tentar carregar
    if (fid && fid.indexOf('http') === 0) {
      m.foto = ''; // trata como sem foto até ser re-uploadada
    }
  });

  if (!pendentes.length) { if (done) done(); return; }

  var idx = 0;
  function next() {
    if (idx >= pendentes.length) { if (done) done(); return; }
    var fid = pendentes[idx];
    idx++;
    google.script.run
      .withFailureHandler(function() { next(); }) // falha silenciosa — continua
      .withSuccessHandler(function(res) {
        if (res && res.success && res.data && res.data.base64) {
          MB._fotoCache[fid] = 'data:' + (res.data.mimeType || 'image/jpeg') + ';base64,' + res.data.base64;
        }
        next();
      })
      .mb_getFotoMembro(token, fid);
  }
  next();
}

function _mbLoadProximoRol(cb) {
  var token = App.session && App.session.token;
  google.script.run
    .withFailureHandler(function(){ if(cb) cb('0001'); })
    .withSuccessHandler(function(r) {
      MB.proximoRol = (r && r.success && r.data) ? r.data : '0001';
      if (cb) cb(MB.proximoRol);
    })
    .mb_getProximoRol(token);
}

// ── setTab ───────────────────────────────────────────────
function mbSetTab(tab) {
  MB.tab = tab;
  document.querySelectorAll('.mb-tab').forEach(function(b){
    b.classList.toggle('active', b.getAttribute('onclick') === "mbSetTab('"+tab+"')");
  });
  if (tab === 'lista') {
    _mbLoad(function(){ _mbRenderPanel(); });
  } else if (tab === 'form') {
    MB.editId = null; MB.fotoData = ''; MB.fotoZoom = 1; MB.fotoX = 50; MB.fotoY = 50; MB.fotoNova = false;
    _mbLoadProximoRol(function(){ _mbRenderPanel(); });
  } else if (tab === 'carteirinha') {
    MB.cardSelected = null; MB.cardSelecionados = {}; MB.cardSearch = '';
    _mbLoad(function(){ _mbRenderPanel(); });
  }
}

// ── Despacha para o render certo ────────────────────────
function _mbRenderPanel() {
  var panel = document.getElementById('mb-panel');
  if (!panel) return;
  if (MB.tab === 'lista')       panel.innerHTML = _mbBuildLista();
  if (MB.tab === 'form')        panel.innerHTML = _mbBuildForm();
  if (MB.tab === 'detalhe')     panel.innerHTML = _mbBuildDetalhe();
  if (MB.tab === 'carteirinha') panel.innerHTML = _mbBuildCarteirinha();
  if (window.lucide) lucide.createIcons();
  if (MB.tab === 'lista') _mbAnimKpis();
  _mbBindSearchListeners();
}

(function _mbInitDelegation() {

    if (e.target && e.target.id === 'mb-search-input') {
      MB.search = e.target.value;
      mbAtualizarLista();
    }
    if (e.target && e.target.id === 'mb-card-search-input') {
      MB.cardSearch = e.target.value;
      mbAtualizarCardLista();
    }
  });
  document.addEventListener('change', function(e) {
    if (e.target && e.target.id === 'mb-filtro-select') {
      MB.filtroAtivo = e.target.value;
      mbAtualizarLista();
    }
  });
})();

function _mbBindSearchListeners() { /* delegação já cobre tudo — mantido para compatibilidade */ }

function _mbOnSearchCard(e)  { MB.cardSearch = e.target.value; mbAtualizarCardLista(); }

function _mbBuildLista() {
  var total    = MB.membros.length;
  var ativos   = MB.membros.filter(function(m){ return m.ativo !== false; }).length;
  var inativos = total - ativos;
  var aniv     = MB.membros.filter(function(m){ return _mbNesteMes(m.nascimento); }).length;
  var semFoto  = MB.membros.filter(function(m){ return !m.foto; }).length;
  var filtrado = _mbFiltrarLista();

  // KPIs
  var kpis =
    _mbKpiGroups(total, ativos, inativos, aniv, semFoto);

  // Toolbar
  var toolbar =
    '<div class="ed-section-header" id="mb-lista-header">'+
      '<div>'+
        '<div class="ed-section-title">Todos os Membros</div>'+
        '<div class="ed-section-sub" id="mb-lista-sub">'+filtrado.length+' resultado(s) de '+total+' cadastrado(s)</div>'+
      '</div>'+
      '<div style="display:flex;gap:8px;align-items:center">'+
        '<button class="btn btn-primary btn-sm" onclick="mbNovoMembro()">'+
          '<i data-lucide="user-plus" style="width:15px;height:15px"></i>'+
          '<span>Novo Membro</span>'+
        '</button>'+
        '<div class="mb-toolbar-more-wrap">'+
          '<button class="btn btn-ghost btn-sm" onclick="mbToggleToolbarMore(event)" title="Mais opções" style="width:34px;padding:0">'+
            '<i data-lucide="more-horizontal" style="width:15px;height:15px"></i>'+
          '</button>'+
          '<div class="mb-toolbar-more-dd" id="mb-toolbar-more-dd">'+
            '<div class="dd-label">Backup</div>'+
            '<button onclick="mbCloseToolbarMore();mbExportarJSON()">'+
              '<i data-lucide="download" style="width:14px;height:14px"></i> Exportar JSON'+
            '</button>'+
            '<label style="cursor:pointer">'+
              '<i data-lucide="upload" style="width:14px;height:14px"></i> Importar JSON'+
              '<input type="file" accept=".json" onchange="mbCloseToolbarMore();mbImportarJSON(event)" style="display:none">'+
            '</label>'+
          '</div>'+
        '</div>'+
      '</div>'+
    '</div>';

  // Busca + filtro — oninput atualiza SÓ o container da lista, sem recriar o input
  var busca =
    '<div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap">'+
      '<div class="ed-search-wrap" style="flex:1;min-width:180px">'+
        '<span class="ed-search-icon"><i data-lucide="search" style="width:15px;height:15px"></i></span>'+
        '<input class="ed-search" id="mb-search-input" type="text" placeholder="Buscar nome, ROL, função..." value="'+_mbEsc(MB.search)+'" oninput="_mbOnSearchLista(event)">'+
      '</div>'+
      '<select class="ed-filter-select" id="mb-filtro-select" onchange="_mbOnFiltroChange(event)">'+
        '<option value="todos"'   +(MB.filtroAtivo==='todos'   ?' selected':'')+'>Todos</option>'+
        '<option value="ativos"'  +(MB.filtroAtivo==='ativos'  ?' selected':'')+'>Ativos</option>'+
        '<option value="inativos"'+(MB.filtroAtivo==='inativos'?' selected':'')+'>Inativos</option>'+
      '</select>'+
    '</div>';

  return kpis + toolbar + busca + '<div id="mb-lista-container">'+_mbBuildListaItens(filtrado, total)+'</div>';
}

// ── Filtra membros conforme MB.search e MB.filtroAtivo ───
function _mbFiltrarLista() {
  return MB.membros.filter(function(m){
    var q = (MB.search || '').toLowerCase();
    var ok = !q ||
      String(m.nome||'').toLowerCase().indexOf(q) !== -1 ||
      String(m.rol||'').toLowerCase().indexOf(q) !== -1 ||
      String(m.funcao||'').toLowerCase().indexOf(q) !== -1 ||
      String(m.celular||'').indexOf(q) !== -1;
    if (MB.filtroAtivo === 'ativos')   return ok && m.ativo !== false;
    if (MB.filtroAtivo === 'inativos') return ok && m.ativo === false;
    return ok;
  });
}

// ── Constrói só os itens da lista (sem recriar busca/toolbar) ──
function _mbBuildListaItens(lista, total) {
  if (total === undefined) total = MB.membros.length;
  if (!lista.length) {
    return '<div class="mb-empty">'+
      '<span class="mb-empty-icon">📋</span>'+
      '<div class="mb-empty-title">'+(total===0?'Nenhum membro cadastrado':'Nenhum resultado encontrado')+'</div>'+
      '<div class="mb-empty-sub">'+(total===0?'Clique em "Novo Membro" para começar.':'Tente ajustar os filtros ou a busca.')+'</div>'+
    '</div>';
  }
  var html = '<div class="ed-list">';
  lista.forEach(function(m){
    var ativo   = m.ativo !== false;
    var bdHoje  = _mbIsHoje(m.nascimento);
    var inicial = (m.nome||'?')[0].toUpperCase();
    html +=
      '<div class="ed-list-item" onclick="mbVerDetalhe(\''+_mbEsc(m.id)+'\')">'+
        '<div class="ed-list-avatar">'+
          (m.foto ? '<img src="'+(MB._fotoCache[m.foto]||'')+'" alt="'+_mbEsc(m.nome)+'" style="transform:scale('+(m.fotoZoom||1)+');object-position:'+(m.fotoX||50)+'% '+(m.fotoY||50)+'%">' : _mbEsc(inicial))+
        '</div>'+
        '<div class="ed-list-info">'+
          '<div class="ed-list-name">'+
            _mbEsc(m.nome||'—')+
            (bdHoje ? ' 🎂' : '')+
            (!m.foto ? ' <span class="badge badge-purple" style="font-size:9px;padding:1px 6px">SEM FOTO</span>' : '')+
          '</div>'+
          '<div class="ed-list-meta">ROL '+_mbEsc(m.rol||'—')+' · '+_mbEsc(m.funcao||'Membro')+' · '+_mbEsc(m.cidade||'')+'/'+_mbEsc(m.estado||'')+'</div>'+
        '</div>'+
        '<span class="badge '+(ativo?'badge-green':'badge-red')+'">'+(ativo?'Ativo':'Inativo')+'</span>'+
        '<div class="ed-aula-actions">'+
          '<button class="ed-item-btn" onclick="event.stopPropagation();mbEditarMembro(\''+_mbEsc(m.id)+'\')" title="Editar">'+
            '<i data-lucide="pencil" style="width:13px;height:13px"></i>'+
          '</button>'+
        '</div>'+
      '</div>';
  });
  return html + '</div>';
}

// ── Filtra em realtime sem recriar o input ───────────────
function mbAtualizarLista() {
  var filtrado  = _mbFiltrarLista();
  var container = document.getElementById('mb-lista-container');
  var sub       = document.getElementById('mb-lista-sub');
  if (container) {
    container.innerHTML = _mbBuildListaItens(filtrado, MB.membros.length);
    if (window.lucide) lucide.createIcons();
  }
  if (sub) sub.textContent = filtrado.length+' resultado(s) de '+MB.membros.length+' cadastrado(s)';
}

function mbAtualizarCardLista() {
  var ativos = MB.membros.filter(function(m){ return m.ativo !== false; });
  var q = (MB.cardSearch||'').toLowerCase();
  var filtrados = ativos.filter(function(m){
    return !q || (m.nome||'').toLowerCase().indexOf(q)!==-1 || String(m.rol||'').indexOf(q)!==-1;
  });
  var grid = document.getElementById('mb-lote-grid');
  if (!grid) return;
  var html = '';
  filtrados.forEach(function(m){
    var sel      = !!(MB.cardSelecionados && MB.cardSelecionados[m.id]);
    var isActive = String(m.id) === String(MB.cardSelected);
    html +=
      '<div class="mb-lote-item'+(sel?' selected':'')+(isActive?' mb-lote-item-active':'')+'" id="lote-item-'+m.id+'">'+
        '<div class="mb-lote-check" onclick="event.stopPropagation();mbCard_toggleSel(\''+m.id+'\')">'+
          (sel?'✓':'')+
        '</div>'+
        '<div class="ed-list-avatar" onclick="mbCard_selecionarPreview(\''+m.id+'\')" style="cursor:pointer">'+
          (m.foto?'<img src="'+(MB._fotoCache[m.foto]||'')+'" style="width:100%;height:100%;object-fit:cover">':((m.nome||'?')[0].toUpperCase()))+
        '</div>'+
        '<div style="flex:1;min-width:0;cursor:pointer" onclick="mbCard_selecionarPreview(\''+m.id+'\')">'+
          '<div style="font-size:12px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+(m.nome||'—')+'</div>'+
          '<div style="font-size:10px;color:var(--text-muted)">ROL '+m.rol+' · '+(m.funcao||'Membro')+'</div>'+
        '</div>'+
        '<button class="btn btn-ghost btn-sm" style="padding:4px 8px;font-size:11px;flex-shrink:0" onclick="event.stopPropagation();mbCard_downloadPDF(\''+m.id+'\')" title="PDF Carteirinha">'+
          '<i data-lucide="file-down" style="width:13px;height:13px"></i> PDF'+
        '</button>'+
      '</div>';
  });
  grid.innerHTML = html || '<div style="text-align:center;padding:20px;font-size:12px;color:var(--text-muted)">Nenhum resultado.</div>';
  if (window.lucide) lucide.createIcons();
}

    check:         '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" class="kico"><circle cx="12" cy="12" r="9"/><path d="M8 12.5l2.5 2.5 5-5"/></svg>',

    cake:          '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" class="kico"><rect x="3" y="10" width="18" height="11" rx="2.5"/><path d="M3 13.5h18"/><path d="M12 10V21"/><path d="M8.5 6.5C8.5 4.8 10 3.5 12 3.5s3.5 1.3 3.5 3"/><path d="M12 3.5V2"/></svg>',
    imgoff:        '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" class="kico"><path d="M3 8.2C3 6.43 4.43 5 6.2 5h11.6C19.57 5 21 6.43 21 8.2v7.6C21 17.57 19.57 19 17.8 19H6.2C4.43 19 3 17.57 3 15.8V8.2z"/><circle cx="9" cy="10.5" r="1.5"/><path d="M3.5 17.5l4-4 3 3 2.5-2.5 4 4"/><line x1="4.5" y1="4.5" x2="19.5" y2="19.5"/></svg>'

  function card(cls, iconKey, val, label, isHero) {

        '<div class="kpi-card-value" id="mbkv-'+cls+'">'+val+'</div>' +
        '<div class="kpi-card-label">'+label+'</div>' +

  return (
    '<div class="kpi-groups">' +

      // Grupo A — Cadastro (Total hero + Ativos + Inativos)

function _mbSparkline(pts) {
  var w = 80, h = 28, pad = 3;
  var mn = Math.min.apply(null,pts), mx = Math.max.apply(null,pts);
  var rng = mx - mn || 1;
  var xs = pts.map(function(_,i){ return pad + i*(w-2*pad)/(pts.length-1); });
  var ys = pts.map(function(v){ return (h-pad) - (v-mn)/rng*(h-2*pad); });
  var d  = 'M'+xs[0]+','+ys[0]+xs.slice(1).map(function(x,i){ return 'L'+x+','+ys[i+1]; }).join('');
  return '<div class="ed-stat-sparkline">'+
    '<svg width="'+w+'" height="'+h+'" viewBox="0 0 '+w+' '+h+'">'+
      '<path d="'+d+'" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>'+
      '<circle cx="'+xs[xs.length-1]+'" cy="'+ys[ys.length-1]+'" r="2.5" fill="currentColor"/>'+
    '</svg>'+
  '</div>';
}

function _mbAnimKpis() {
  var els = document.querySelectorAll('[id^="mbkv-"]');
  els.forEach(function(el) {
    var target = parseFloat(el.textContent) || 0;
    if (!target || target < 2) return;
    var start = 0, dur = 600, t0 = performance.now();
    function step(now) {
      var p = Math.min((now - t0) / dur, 1);
      var ease = 1 - Math.pow(1 - p, 3); // easeOutCubic
      el.textContent = Math.round(ease * target);
      if (p < 1) requestAnimationFrame(step);
      else el.textContent = target;
    }
    requestAnimationFrame(step);
  });
}

function _mbBuildAniversariantes() {
  var lista = MB.membros.filter(function(m){ return _mbNesteMes(m.nascimento); })
    .sort(function(a,b){ return (_mbDiasAniv(a.nascimento)||999)-(_mbDiasAniv(b.nascimento)||999); });
  if (!lista.length) return '';
  var html =
    '<div style="background:var(--glass-bg-premium);border:var(--glass-border-premium);border-radius:16px;padding:16px;backdrop-filter:blur(14px);margin-bottom:16px">'+
    '<div class="ed-section-header" style="margin-bottom:10px">'+
      '<div><div class="ed-section-title">🎂 Aniversariantes do Mês</div></div>'+
      '<span class="badge badge-gold">'+lista.length+'</span>'+
    '</div>'+
    '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:8px">';
  lista.forEach(function(m){
    var dias = _mbDiasAniv(m.nascimento);
    var hoje = dias === 0;
    html +=
      '<div class="mb-bday-card'+(hoje?' hoje':'')+'\" onclick="mbVerDetalhe(\''+_mbEsc(m.id)+'\')">'+
        '<div class="ed-list-avatar">'+
          (m.foto ? '<img src="'+(MB._fotoCache[m.foto]||'')+'">' : _mbEsc((m.nome||'?')[0].toUpperCase()))+
        '</div>'+
        '<div style="flex:1;min-width:0">'+
          '<div style="font-size:13px;font-weight:700;color:var(--text)">'+_mbEsc(m.nome)+'</div>'+
          '<div style="font-size:11px;color:var(--text-muted)">'+_mbEsc(m.nascimento)+' · Fará '+(((_mbIdade(m.nascimento)||0)+1))+' anos</div>'+
        '</div>'+
        '<span class="badge '+(hoje?'badge-gold':'badge-teal')+'">'+
          (hoje?'🎉 HOJE!':dias+' dia'+(dias!==1?'s':''))+
        '</span>'+
      '</div>';
  });
  return html+'</div></div>';
}

// ── Navegação interna ────────────────────────────────────
function mbNovoMembro() {
  MB.tab = 'form'; MB.editId = null;
  MB.fotoData = ''; MB.fotoZoom = 1; MB.fotoX = 50; MB.fotoY = 50; MB.fotoNova = false;
  document.querySelectorAll('.mb-tab').forEach(function(b){
    b.classList.toggle('active', b.getAttribute('onclick') === "mbSetTab('form')");
  });
  _mbLoadProximoRol(function(){ _mbRenderPanel(); });
}

function mbEditarMembro(id) {
  var m = MB.membros.filter(function(x){ return String(x.id)===String(id); })[0];
  if (!m) return;
  MB.editId   = id;
  // Se a foto está no cache (base64), usa; senão deixa vazio
  var fid = m.foto ? String(m.foto).trim() : '';
  MB.fotoData = (fid && MB._fotoCache[fid]) ? MB._fotoCache[fid] : (fid.indexOf('data:') === 0 ? fid : '');
  MB.fotoZoom = parseFloat(m.fotoZoom) || 1;
  MB.fotoX    = parseFloat(m.fotoX)    || 50;
  MB.fotoY    = parseFloat(m.fotoY)    || 50;
  MB.fotoNova = false; // foto existente — não re-envia a menos que o usuário troque
  MB.tab = 'form';
  document.querySelectorAll('.mb-tab').forEach(function(b){
    b.classList.toggle('active', b.getAttribute('onclick') === "mbSetTab('form')");
  });
  _mbRenderPanel();
}

function mbVerDetalhe(id) {
  MB.selected = MB.membros.filter(function(m){ return String(m.id)===String(id); })[0] || null;
  if (!MB.selected) return;
  MB.tab = 'detalhe';
  _mbRenderPanel();
}

/* ── Foto handlers ── */
function mbFotoChange(e) {
  var file = e.target.files[0]; if (!file) return;
  // Preserva resolução alta (800x1066) para garantir qualidade na impressão de carteirinhas
  var reader = new FileReader();
  reader.onloadend = function(){
    var img = new Image();
    img.onload = function(){
      // ── Análise de qualidade mínima para impressão profissional ──────────────
      // Slot de foto no cartão: 68×90 px | SCALE 6 → precisa de 408×540 px na origem.
      // Definimos margem segura: mínimo 400×530 px e arquivo até 10 MB.
      var MIN_W = 400, MIN_H = 530, MAX_MB = 10;
      var problemas = [];
      if (img.width  < MIN_W) problemas.push('largura ' + img.width + 'px (mínimo ' + MIN_W + 'px)');
      if (img.height < MIN_H) problemas.push('altura '  + img.height + 'px (mínimo ' + MIN_H + 'px)');
      if (file.size > MAX_MB * 1024 * 1024) problemas.push('arquivo muito grande (' + (file.size / 1024 / 1024).toFixed(1) + ' MB — máximo ' + MAX_MB + ' MB)');

      if (problemas.length > 0) {
        // Limpa o input para permitir nova seleção imediata
        var inp = document.getElementById('mb-foto-input');
        if (inp) inp.value = '';
        // Alerta amigável — não prossegue (2 toasts: problema + orientação)
        showToast('Foto rejeitada: ' + problemas.join(' | '), 'error');
        setTimeout(function() {
          showToast('Use uma foto com pelo menos ' + MIN_W + '×' + MIN_H + ' pixels.', 'warning');
        }, 800);
        return; // ← bloqueia todo o processamento
      }
      // ── Qualidade aprovada — segue processamento normal ──────────────────────

      var MAX_W = 800, MAX_H = 1066;
      var w = img.width, h = img.height;
      // Redimensiona mantendo proporção apenas se exceder o limite
      if (w > MAX_W || h > MAX_H) {
        var ratioW = MAX_W / w, ratioH = MAX_H / h;
        var ratio  = Math.min(ratioW, ratioH);
        w = Math.round(w * ratio);
        h = Math.round(h * ratio);
      }
      var canvas  = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      MB.fotoData     = canvas.toDataURL('image/jpeg', 0.95); // qualidade 95% para impressão
      MB.fotoMimeType = 'image/jpeg';
      MB.fotoNome     = (file.name || 'foto.jpg').replace(/\.[^.]+$/, '') + '.jpg';
      MB.fotoNova     = true; // flag: usuário selecionou nova foto
      mbAtualizarFotoPreview();
      var zw = document.getElementById('mb-zoom-wrap');
      if (zw) zw.style.display = 'block';
    };
    img.src = reader.result;
  };
  reader.readAsDataURL(file);
}
function mbAtualizarFotoPreview() {
  var wrap = document.getElementById('mb-foto-preview');
  if (!wrap) return;
  if (MB.fotoData) {
    wrap.innerHTML =
      '<img id="mb-foto-img" src="'+MB.fotoData+'" style="transform:scale('+MB.fotoZoom+');object-position:'+MB.fotoX+'% '+MB.fotoY+'%">'+
      '<button class="mb-foto-remove" onclick="event.stopPropagation();mbRemoverFoto()">✕</button>';
    wrap.style.cursor = 'grab';
  } else {
    wrap.innerHTML = '<div class="mb-foto-placeholder">👤</div>';
    wrap.style.cursor = 'default';
  }
}
function mbRemoverFoto() {
  MB.fotoData = ''; MB.fotoZoom = 1; MB.fotoX = 50; MB.fotoY = 50; MB.fotoNova = false;
  mbAtualizarFotoPreview();
  var zw = document.getElementById('mb-zoom-wrap'); if (zw) zw.style.display = 'none';
}
function mbFotoMouseDown(e) {
  if (!MB.fotoData) return;
  var start = { x: e.clientX, y: e.clientY };
  var wrap  = document.getElementById('mb-foto-preview');
  if (wrap) wrap.style.cursor = 'grabbing';
  function move(ev) {
    var dx = (ev.clientX - start.x) * 0.4, dy = (ev.clientY - start.y) * 0.4;
    MB.fotoX = Math.max(0, Math.min(100, MB.fotoX + dx));
    MB.fotoY = Math.max(0, Math.min(100, MB.fotoY + dy));
    start = { x: ev.clientX, y: ev.clientY };
    var img = document.getElementById('mb-foto-img');
    if (img) img.style.objectPosition = MB.fotoX + '% ' + MB.fotoY + '%';
  }
  function up() {
    var w = document.getElementById('mb-foto-preview');
    if (w) w.style.cursor = 'grab';
    document.removeEventListener('mousemove', move);
    document.removeEventListener('mouseup', up);
  }
  document.addEventListener('mousemove', move);
  document.addEventListener('mouseup', up);
}

/* ── Salvar formulário ── */
function mbSalvarForm() {
  var campos = ['nome','sexo','nascimento','nomeMae','nomePai','estadoCivil',
                'batismo','Igreja','funcao','rua','numero','bairro','cidade','estado','cep','celular'];
  var valido = true;
  campos.forEach(function(k){
    var el  = document.getElementById('mbf-'+k);
    var err = document.getElementById('mbfe-'+k);
    var vl  = el ? el.value.trim() : '';
    if (!vl) {
      valido = false;
      if (el && el.closest) el.closest('.field').classList.add('has-error');
      if (err) err.style.display = 'block';
    } else {
      if (el && el.closest) el.closest('.field').classList.remove('has-error');
      if (err) err.style.display = 'none';
    }
  });
  if (!valido) { showToast('Preencha todos os campos obrigatórios.','warning'); return; }

  var btn = document.querySelector('button[onclick="mbSalvarForm()"]');
  if (btn) btn.classList.add('loading');

  var mAtual = MB.editId
    ? (MB.membros.filter(function(x){ return String(x.id)===String(MB.editId); })[0] || {})
    : {};

  var ativoEl = document.getElementById('mbf-ativo');
  var ativo   = MB.editId ? (ativoEl ? ativoEl.value !== 'false' : mAtual.ativo !== false) : true;

  // Foto: mantém fileId existente; substitui apenas se usuário escolheu nova foto
  var fotoAtual = MB.fotoNova ? null : (mAtual.foto || '');

  // ── Função interna que finaliza o salvamento com a URL da foto já resolvida ──
  function _doSalvar(fotoUrl) {
    var membro = {
      id:          MB.editId || '',
      rol:         (document.getElementById('mbf-rol').value || '').trim(),
      nome:        _mbNomeProprio(document.getElementById('mbf-nome').value),
      sexo:        document.getElementById('mbf-sexo').value,
      nascimento:  document.getElementById('mbf-nascimento').value.trim(),
      nomeMae:     _mbNomeProprio(document.getElementById('mbf-nomeMae').value),
      nomePai:     _mbNomeProprio(document.getElementById('mbf-nomePai').value),
      estadoCivil: document.getElementById('mbf-estadoCivil').value,
      batismo:     document.getElementById('mbf-batismo').value.trim(),
      Igreja:      document.getElementById('mbf-Igreja').value.trim(),
      funcao:      document.getElementById('mbf-funcao').value.trim(),
      rua:         _mbNomeProprio(document.getElementById('mbf-rua').value),
      numero:      document.getElementById('mbf-numero').value.trim(),
      bairro:      _mbNomeProprio(document.getElementById('mbf-bairro').value),
      cidade:      _mbNomeProprio(document.getElementById('mbf-cidade').value),
      estado:      document.getElementById('mbf-estado').value, // O select já devolve a UF em maiúsculas
      cep:         document.getElementById('mbf-cep').value.trim(),
      celular:     document.getElementById('mbf-celular').value.trim(),
      email:       document.getElementById('mbf-email').value.trim().toLowerCase(), // E-mail sempre em minúsculas
      rg:          document.getElementById('mbf-rg').value.trim(),
      cpf:         document.getElementById('mbf-cpf').value.trim(),
      foto:        fotoUrl || '',
      fotoZoom:    MB.fotoZoom,
      fotoX:       MB.fotoX,
      fotoY:       MB.fotoY,
      ativo:       ativo
    };

    var token = App.session && App.session.token;
    google.script.run
      .withFailureHandler(function(e){
        if (btn) btn.classList.remove('loading');
        showToast((e && e.message) || 'Erro ao salvar.', 'error');
      })
      .withSuccessHandler(function(r){
        if (btn) btn.classList.remove('loading');
        if (!_mbHandleResponse(r, 'salvarMembro')) return;
        showToast(MB.editId ? 'Membro atualizado!' : 'Membro cadastrado!', 'success');
        MB.editId = null; MB.fotoData = ''; MB.fotoZoom = 1; MB.fotoX = 50; MB.fotoY = 50; MB.fotoNova = false;
        MB.tab = 'lista';
        document.querySelectorAll('.mb-tab').forEach(function(b){
          b.classList.toggle('active', b.getAttribute('onclick') === "mbSetTab('lista')");
        });
        _mbLoad(function(){ _mbRenderPanel(); });
      })
      .mb_salvarMembro(token, membro);
  }

  // ── Se há nova foto, faz upload para o Drive primeiro ──
  if (MB.fotoNova && MB.fotoData) {
    showToast('Enviando foto para o Drive...', 'info');

    // Extrai o base64 puro (remove prefixo "data:image/jpeg;base64,")
    var base64Pure = MB.fotoData.replace(/^data:[^;]+;base64,/, '');

    // Gera ID temporário para o arquivo (usa editId se existir, senão um timestamp)
    var membroIdTemp = MB.editId || ('novo_' + Date.now());
    var token = App.session && App.session.token;

    google.script.run
      .withFailureHandler(function(e){
        if (btn) btn.classList.remove('loading');
        showToast('Erro ao enviar foto: ' + ((e && e.message) || 'falha no upload.'), 'error');
      })
      .withSuccessHandler(function(r){
        if (!r || !r.success) {
          if (btn) btn.classList.remove('loading');
          showToast('Erro no upload da foto: ' + (r && r.error ? r.error : 'resposta inválida.'), 'error');
          return;
        }
        // Upload ok — prossegue salvando o membro com o fileId do Drive
        var novoFileId = (r.data && r.data.fileId) ? r.data.fileId : '';
        // Popula cache com o base64 recém-recebido para uso imediato
        if (novoFileId && r.data.base64) {
          MB._fotoCache[novoFileId] = 'data:' + (r.data.mimeType || 'image/jpeg') + ';base64,' + r.data.base64;
        }
        _doSalvar(novoFileId);
      })
      .mb_salvarFotoMembro(token, membroIdTemp, base64Pure, MB.fotoMimeType || 'image/jpeg', MB.fotoNome || 'foto.jpg');
  } else {
    // Sem nova foto: salva com a URL já existente
    _doSalvar(fotoAtual);
  }
}

function mbConfirmarDeletar(id) {
  var m = MB.membros.filter(function(x){ return String(x.id)===String(id); })[0];
  if (!m) return;
  var overlay = document.getElementById('modal-mb-confirm');
  document.getElementById('mb-confirm-title').textContent = 'Excluir membro';
  document.getElementById('mb-confirm-body').textContent  = 'Excluir "'+m.nome+'"? Esta ação não pode ser desfeita.';
  document.getElementById('mb-confirm-cancel').onclick = function(){ overlay.classList.remove('open'); };
  document.getElementById('mb-confirm-ok').onclick = function(){
    overlay.classList.remove('open');
    _mbDeletar(id);
  };
  overlay.onclick = function(e){ if(e.target===overlay) overlay.classList.remove('open'); };
  overlay.classList.add('open');
}

function _mbDeletar(id) {
  var token = App.session && App.session.token;
  google.script.run
    .withFailureHandler(function(e){ showToast((e&&e.message)||'Erro ao excluir.','error'); })
    .withSuccessHandler(function(r){
      if (!_mbHandleResponse(r,'deletarMembro')) return;
      showToast('Membro excluído.','success');
      MB.tab = 'lista'; MB.selected = null;
      _mbLoad(function(){ _mbRenderPanel(); });

}

function mbAbrirModalAniv() {
  var overlay = document.getElementById('modal-mb-aniv');
  if (!overlay) return;

  var lista = MB.membros.filter(function(m){ return _mbNesteMes(m.nascimento); })
    .sort(function(a,b){ return (_mbDiasAniv(a.nascimento)||999)-(_mbDiasAniv(b.nascimento)||999); });

  var sub  = document.getElementById('mb-aniv-sub');
  var body = document.getElementById('mb-aniv-body');
  var meses = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho',
               'Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  if (sub) sub.textContent = meses[new Date().getMonth()] + ' · ' + lista.length + ' aniversariante(s)';

  if (!lista.length) {
    if (body) body.innerHTML = '<div class="mb-aniv-empty">🎈 Nenhum aniversariante este mês.</div>';
  } else {
    var html = '';
    lista.forEach(function(m){
      var dias  = _mbDiasAniv(m.nascimento);
      var hoje  = dias === 0;
      var idade = ((_mbIdade(m.nascimento)||0) + 1);
      html +=
        '<div class="mb-bday-card'+(hoje?' hoje':'')+'\" onclick="mbFecharModalAniv();mbVerDetalhe(\''+_mbEsc(m.id)+'\')" style="cursor:pointer">'+
          '<div class="ed-list-avatar">'+
            (m.foto ? '<img src="'+(MB._fotoCache[m.foto]||'')+'">' : _mbEsc((m.nome||'?')[0].toUpperCase()))+
          '</div>'+
          '<div style="flex:1;min-width:0">'+

            '<div style="font-size:11px;color:var(--text-muted)">'+_mbEsc(m.nascimento)+' · Fará '+idade+' anos</div>'+
          '</div>'+
          '<span class="badge '+(hoje?'badge-gold':'badge-teal')+'">'+
            (hoje ? '🎉 HOJE!' : dias+' dia'+(dias!==1?'s':''))+
          '</span>'+
        '</div>';
    });
    if (body) body.innerHTML = html;
  }

  if (window.lucide) lucide.createIcons();

// ════════════════════════════════════════════
//  EXPORTAR / IMPORTAR JSON (backup)
// ════════════════════════════════════════════
function mbExportarJSON() {
  if (!MB.membros.length) { showToast('Nenhum membro para exportar.','warning'); return; }
  var json = JSON.stringify(MB.membros, null, 2);
  var blob = new Blob([json], { type: 'application/json' });
  var url  = URL.createObjectURL(blob);
  var a    = document.createElement('a');
  a.href   = url;
  a.download = 'Backup_Membros_' + new Date().toISOString().split('T')[0] + '.json';
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
  showToast('Backup exportado!','success');
}

function mbImportarJSON(e) {
  var file = e.target.files[0]; if (!file) return;
  var reader = new FileReader();
  reader.onload = function(ev) {
    try {
      var data = JSON.parse(ev.target.result);
      if (!Array.isArray(data)) { showToast('Arquivo inválido — precisa ser um array JSON.','error'); return; }
      var token = App.session && App.session.token;
      var ok = 0, erros = 0, total = data.length;

      function next(i) {
        if (i >= total) {
          showToast('Importação concluída: '+ok+' salvo(s)'+(erros?' · '+erros+' erro(s)':''),'success');
          _mbLoad(function(){ _mbRenderPanel(); });
          return;
        }
        var m = data[i];
        // Normaliza campos (backup antigo pode ter camelCase ou PascalCase)
        var norm = {
          id:          m.id || m.ID || '',
          rol:         m.rol || m.Rol || '',
          nome:        m.nome || m.Nome || '',
          sexo:        m.sexo || m.Sexo || '',
          nascimento:  m.nascimento || m.Nascimento || '',
          nomeMae:     m.nomeMae || m.NomeMae || '',
          nomePai:     m.nomePai || m.NomePai || '',
          estadoCivil: m.estadoCivil || m.EstadoCivil || '',
          batismo:     m.batismo || m.Batismo || '',
          Igreja:      m.Igreja || m.igreja || m.IgrejaOrigen || '',
          funcao:      m.funcao || m.Funcao || '',
          rua:         m.rua || m.Rua || '',
          numero:      m.numero || m.Numero || '',
          bairro:      m.bairro || m.Bairro || '',
          cidade:      m.cidade || m.Cidade || '',
          estado:      m.estado || m.Estado || '',
          cep:         m.cep || m.CEP || '',
          celular:     m.celular || m.Celular || '',
          email:       m.email || m.Email || '',
          rg:          m.rg || m.RG || '',
          cpf:         m.cpf || m.CPF || '',
          foto:        m.foto || m.Foto || '',
          fotoZoom:    parseFloat(m.fotoZoom || m.FotoZoom || 1) || 1,
          fotoX:       parseFloat(m.fotoX    || m.FotoX    || 50) || 50,
          fotoY:       parseFloat(m.fotoY    || m.FotoY    || 50) || 50,
          ativo:       (m.ativo !== false && m.ativo !== 'FALSE' && m.Ativo !== false)
        };
        if (!norm.nome) { erros++; next(i+1); return; }

        // Se foto for base64, faz upload para o Drive antes de salvar
        var fotoRaw = norm.foto || '';
        if (fotoRaw && fotoRaw.indexOf('data:') === 0) {
          var base64Pure = fotoRaw.replace(/^data:[^;]+;base64,/, '');
          var mimeType   = (fotoRaw.match(/^data:([^;]+);/) || [])[1] || 'image/jpeg';
          var memId      = norm.id || ('imp_' + i + '_' + Date.now());
          google.script.run
            .withFailureHandler(function(){ norm.foto = ''; _salvarNorm(); })
            .withSuccessHandler(function(ru){
              norm.foto = (ru && ru.success && ru.data && ru.data.fileId) ? ru.data.fileId : '';
              // Popula cache para uso imediato
              if (norm.foto && ru.data.base64) {
                MB._fotoCache[norm.foto] = 'data:' + (ru.data.mimeType || 'image/jpeg') + ';base64,' + ru.data.base64;
              }
              _salvarNorm();
            })
            .mb_salvarFotoMembro(token, memId, base64Pure, mimeType, 'foto_' + memId + '.jpg');
        } else {
          // URL já existente (Drive ou vazio) — salva direto
          _salvarNorm();
        }

        function _salvarNorm() {
          google.script.run
            .withFailureHandler(function(){ erros++; next(i+1); })
            .withSuccessHandler(function(r){
              if (r && r.success) ok++; else erros++;
              next(i+1);
            })
            .mb_salvarMembro(token, norm);
        }
      }
      showToast('Importando '+total+' registros...','info');
      next(0);
    } catch(err) {
      showToast('Erro ao ler arquivo JSON.','error');
    }
    e.target.value = '';
  };
  reader.readAsText(file);
}
</script>

  cursor: pointer; transition: border-color .15s;
  /* Impede overflow do item na coluna */
  min-width: 0; overflow: hidden;
}
.mb-lote-item:hover { border-color: var(--teal-border); }
.mb-lote-item.selected { border-color: var(--teal); background: var(--teal-dim); }
.mb-lote-item-active { border-color: var(--teal-border) !important; box-shadow: inset 3px 0 0 var(--teal); }
.mb-lote-check {
  width: 20px; height: 20px; border-radius: 6px;
  border: 2px solid var(--border); background: var(--bg4);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: all .15s;
  font-size: 11px; color: transparent;
}
.mb-lote-item.selected .mb-lote-check {
  background: var(--teal); border-color: var(--teal); color: #fff;
}
/* Texto do lote item não extrapola */
.mb-lote-item > div[style*="flex:1"] {
  min-width: 0;
}
.mb-lote-item > div[style*="flex:1"] > div {
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* ── Toast de progresso PDF ── */
#mb-pdf-toast {
  position: fixed; bottom: 24px; left: 50%;
  transform: translateX(-50%);
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: 14px; padding: 14px 20px;
  box-shadow: 0 8px 32px rgba(0,0,0,.4);
  z-index: 9999; min-width: 260px;
  text-align: center; display: none;
}
#mb-pdf-toast .pt-label { font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
#mb-pdf-toast .pt-bar-wrap { background: var(--border); border-radius: 4px; height: 6px; overflow: hidden; }
#mb-pdf-toast .pt-bar { height: 100%; background: var(--teal); border-radius: 4px; transition: width .3s; }
#mb-pdf-toast .pt-sub { font-size: 11px; color: var(--text-muted); margin-top: 6px; }

<script>
/* ══════════════════════════════════════════════════════════
   CARTEIRINHA — ES5 puro, sem React
   Funções com prefixo mbCard_ para não colidir
══════════════════════════════════════════════════════════ */

// ── Pré-processa foto aplicando zoom/recorte em canvas ───
// Retorna Promise<dataURL> com a foto já recortada/escalada,
// eliminando dependência de transform:scale() dentro do dom-to-image.
function mbCard_prepararFoto(fotoSrc, zoom, posX, posY, destW, destH) {
  return new Promise(function(resolve) {
    if (!fotoSrc) { resolve(''); return; }
    var img = new Image();
    img.onload = function() {
      var z      = parseFloat(zoom) || 1;
      var px     = parseFloat(posX) || 50;
      var py     = parseFloat(posY) || 50;
      // Dimensões da fonte escaladas pelo zoom
      var srcW   = img.naturalWidth  / z;
      var srcH   = img.naturalHeight / z;
      // Proporcão destino para cobrir o container (object-fit: cover)
      var scaleC = Math.max(destW / img.naturalWidth, destH / img.naturalHeight);
      var visW   = destW / (scaleC * z);
      var visH   = destH / (scaleC * z);
      // Offset de acordo com object-position (px%, py%)
      var maxOX  = img.naturalWidth  - visW;
      var maxOY  = img.naturalHeight - visH;
      var ox     = maxOX * (px / 100);
      var oy     = maxOY * (py / 100);
      // Renderiza em canvas de destino de alta resolução
      var canvas = document.createElement('canvas');
      canvas.width  = destW;
      canvas.height = destH;
      var ctx = canvas.getContext('2d');
      ctx.drawImage(img, ox, oy, visW, visH, 0, 0, destW, destH);
      // Qualidade 1.0 na etapa intermediária: a compressão final acontece no dom-to-image (toJpeg)
      resolve(canvas.toDataURL('image/jpeg', 1.0));
    };
    img.onerror = function() { resolve(''); };
    img.src = fotoSrc;
  });
}

// ── Pré-processa logo da igreja em canvas (executado uma vez por sessão) ─
// Slot do logo no card: 38x38 px | SCALE 6 -> canvas 228x228 px.
// O filter CSS brightness(0) invert(1) e replicado via composicao no canvas.
// Resultado armazenado em MB_CARD._logoProcessado para reutilizacao no lote.
function mbCard_prepararLogo() {
  return new Promise(function(resolve) {
    if (MB_CARD._logoProcessado) { resolve(MB_CARD._logoProcessado); return; }
    var LOGO_PX = 480; // 38px x SCALE 6 x2 alta-res
    var img = new Image();
    img.onload = function() {
      var canvas = document.createElement('canvas');
      canvas.width  = LOGO_PX;
      canvas.height = LOGO_PX;
      var ctx = canvas.getContext('2d');
      // Desenha logo original
      ctx.drawImage(img, 0, 0, LOGO_PX, LOGO_PX);
      // Replica filter brightness(0) invert(1) preservando o canal alpha:
      // pixels opacos viram branco; pixels transparentes permanecem transparentes.
      // O 'difference' coloriria o fundo transparente de preto — logo invisivel no PDF.
      var imgData = ctx.getImageData(0, 0, LOGO_PX, LOGO_PX);
      var d = imgData.data;
      for (var i = 0; i < d.length; i += 4) {
        if (d[i + 3] > 0) {          // pixel opaco (alpha > 0)
          d[i]     = 255;            // R → branco
          d[i + 1] = 255;            // G → branco
          d[i + 2] = 255;            // B → branco
          // d[i+3] (alpha) inalterado: preserva suavidade das bordas
        }
      }
      ctx.putImageData(imgData, 0, 0);
      MB_CARD._logoProcessado = canvas.toDataURL('image/png');
      resolve(MB_CARD._logoProcessado);
    };
    img.onerror = function() { resolve(MB_CARD.LOGO); };
    img.src = MB_CARD.LOGO;
  });
}

// ── Monta HTML da FRENTE do cartão ──────────────────────
// fotoPreProcessada: foto recortada via canvas (sem transform CSS)
// logoProcessado: logo pre-renderizado via canvas com filter aplicado (sem filter CSS)
function mbCard_htmlFrente(m, forPrint, fotoPreProcessada, logoProcessado) {
  // Resolve src da foto: usa cache base64 (nunca URL do Drive — CORS no GAS)
  var fotoSrc = (m.foto && MB._fotoCache[m.foto]) ? MB._fotoCache[m.foto] : '';
  // Para captura PDF: usa foto pré-processada (sem transform CSS).
  // Para preview na tela: mantém transform:scale() para feedback visual imediato.
  var foto;
  if (fotoPreProcessada) {
    foto = '<img src="'+fotoPreProcessada+'" style="width:100%;height:100%;object-fit:cover">';
  } else if (fotoSrc) {
    foto = '<img src="'+fotoSrc+'" style="width:100%;height:100%;object-fit:cover;object-position:'+(m.fotoX||50)+'% '+(m.fotoY||50)+'%;transform:scale('+(m.fotoZoom||1)+')">';
  } else {
    foto = '<div class="no-photo">👤</div>';
  }

  var nomeTratado = _mbAbreviarNome(m.nome || 'Nome do Membro');

  return (
    '<div class="mb-card'+(forPrint?' for-print':'')+'">'+
    '<div class="mb-card-front">'+

      /* Marca d'água */
      '<div class="card-watermark">'+
        '<img src="'+MB_CARD.WATERMARK+'" crossorigin="anonymous">'+
      '</div>'+

      /* Onda branca SVG (path idêntico ao Index3) */
      '<svg class="card-wave" viewBox="0 0 340 75" preserveAspectRatio="none" fill="none">'+
        '<path d="M0 25 Q85 8, 170 25 T340 25 L340 75 L0 75 Z" fill="#ffffff"/>'+
      '</svg>'+

      '<div class="card-body">'+

        /* Header: logo + nome da igreja */
        '<div class="card-header">'+
          '<div class="card-logo"><img src="'+MB_CARD.LOGO+'" crossorigin="anonymous"></div>'+
          '<div class="card-church-name">'+
            '<div class="line1">Igreja Assembleia de Deus</div>'+
            '<div class="line2">Fonte da Salvação</div>'+
          '</div>'+
        '</div>'+

        /* Foto + dados do membro */
        '<div class="card-member-row">'+
          '<div class="card-photo">'+foto+'</div>'+
          '<div class="card-member-info">'+
            '<div class="m-nome">'+nomeTratado+'</div>'+
            '<div class="m-rol">ROL Nº '+(m.rol||'0000')+'</div>'+
            '<div class="m-funcao">'+(m.funcao||'Membro')+'</div>'+
          '</div>'+
        '</div>'+

        /* Rodapé branco */
        '<div class="card-footer">'+
          '<div class="f1">'+MB_CARD.IGREJA+'</div>'+
          '<div class="f2">Sede - '+MB_CARD.ENDERECO+'</div>'+
          '<div class="f3">CNPJ: '+MB_CARD.CNPJ+'</div>'+
        '</div>'+

      '</div>'+/* card-body */
    '</div>'+/* mb-card-front */
    '</div>' /* mb-card */
  );
}

// ── Monta HTML do VERSO do cartão ───────────────────────
function mbCard_htmlVerso(m, forPrint) {
  var campos = [
    ['Nascimento', m.nascimento],
    ['Estado Civil', m.estadoCivil],
    ['RG', m.rg],
    ['CPF', m.cpf],
    ['Batismo', m.batismo],
    ['Cidade/UF', (m.cidade||'')+'/'+(m.estado||'')]
  ];

  var grid = campos.map(function(c){
    return '<div class="back-field">'+
      '<div class="bf-label">'+c[0]+'</div>'+
      '<div class="bf-val">'+(c[1]||'—')+'</div>'+
    '</div>';
  }).join('');

  return (
    '<div class="mb-card'+(forPrint?' for-print':'')+'">'+
    '<div class="mb-card-back">'+

      '<div class="card-watermark">'+
        '<img src="'+MB_CARD.WATERMARK+'" crossorigin="anonymous">'+
      '</div>'+

      '<div class="card-body">'+

        '<div>'+
          '<div class="back-title">Dados do Membro</div>'+
          '<div class="back-grid">'+grid+'</div>'+
        '</div>'+

        /* Assinatura */
        '<div class="back-sign">'+
          '<div class="sign-img-wrap">'+
            '<img src="'+MB_CARD.ASSINATURA+'" crossorigin="anonymous">'+
          '</div>'+
          '<div class="sign-line"></div>'+
          '<div class="sign-name">'+MB_CARD.PASTOR+'</div>'+
          '<div class="sign-cargo">'+MB_CARD.CARGO+'</div>'+
        '</div>'+

        /* Endereço rodapé */
        '<div class="back-address">'+
          '<div class="ba1">'+MB_CARD.IGREJA+'</div>'+
          '<div class="ba2">'+MB_CARD.ENDERECO+'</div>'+
          '<div class="ba3">CNPJ: '+MB_CARD.CNPJ+'</div>'+
        '</div>'+

      '</div>'+
    '</div>'+
    '</div>'
  );
}

// ── Tab: CARTEIRINHA — painel preview + painel lista ────
function _mbBuildCarteirinha() {
  var ativos = MB.membros.filter(function(m){ return m.ativo !== false; });

  if (!ativos.length) {
    return '<div class="mb-empty">'+
      '<span class="mb-empty-icon">🪪</span>'+
      '<div class="mb-empty-title">Nenhum membro ativo</div>'+
      '<div class="mb-empty-sub">Cadastre membros para gerar carteirinhas.</div>'+
    '</div>';
  }

  var selected = MB.cardSelected
    ? (MB.membros.filter(function(m){ return String(m.id)===String(MB.cardSelected); })[0] || ativos[0])
    : ativos[0];

  MB.cardSelected = selected.id;
  MB.cardSelecionados = MB.cardSelecionados || {};

  var nSel = Object.keys(MB.cardSelecionados).length;
  var loteLabel = nSel > 0 ? ' Gerar PDF Lote ('+nSel+')' : ' Gerar PDF Lote';
  var loteDisabled = nSel === 0 ? ' disabled' : '';

  /* ── Painel esquerdo: preview + ações ── */
  var panelPreview =
    '<div class="mb-card-panel-preview">'+
      '<div style="text-align:center">'+
        '<div style="font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text-muted);margin-bottom:8px">'+_mbEsc(selected.nome||'Membro')+'</div>'+
        '<div class="mb-card-preview-label">Frente</div>'+
        mbCard_htmlFrente(selected, false)+
        '<div class="mb-card-preview-label" style="margin-top:14px">Verso</div>'+
        mbCard_htmlVerso(selected, false)+
      '</div>'+
      '<div class="mb-card-panel-actions">'+
        '<button class="btn btn-primary btn-sm" onclick="mbCard_downloadPDF(\''+selected.id+'\')">'+
          '<i data-lucide="file-down" style="width:14px;height:14px"></i> PDF (frente + verso)'+
        '</button>'+
        '<button class="btn btn-secondary btn-sm" onclick="mbCard_downloadPNG(\''+selected.id+'\',false)">'+
          '<i data-lucide="image" style="width:14px;height:14px"></i> PNG — Frente'+
        '</button>'+
        '<button class="btn btn-secondary btn-sm" onclick="mbCard_downloadPNG(\''+selected.id+'\',true)">'+
          '<i data-lucide="image" style="width:14px;height:14px"></i> PNG — Verso'+
        '</button>'+
      '</div>'+
    '</div>';

  /* ── Painel direito: lista de seleção para lote ── */
  var filtrados = ativos.filter(function(m){
    var q = (MB.cardSearch||'').toLowerCase();
    return !q || (m.nome||'').toLowerCase().indexOf(q)!==-1 || (m.rol||'').indexOf(q)!==-1;
  });

  var itens = '';
  filtrados.forEach(function(m){
    var sel = !!MB.cardSelecionados[m.id];
    var isActive = String(m.id) === String(MB.cardSelected);
    itens +=
      '<div class="mb-lote-item'+(sel?' selected':'')+(isActive?' mb-lote-item-active':'')+'" id="lote-item-'+m.id+'">'+
        '<div class="mb-lote-check" onclick="event.stopPropagation();mbCard_toggleSel(\''+m.id+'\')">'+
          (sel?'✓':'')+
        '</div>'+
        '<div class="ed-list-avatar" onclick="mbCard_selecionarPreview(\''+m.id+'\')" style="cursor:pointer">'+
          (m.foto?'<img src="'+(MB._fotoCache[m.foto]||'')+'" style="width:100%;height:100%;object-fit:cover">':((m.nome||'?')[0].toUpperCase()))+
        '</div>'+
        '<div style="flex:1;min-width:0;cursor:pointer" onclick="mbCard_selecionarPreview(\''+m.id+'\')">'+
          '<div style="font-size:12px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+(m.nome||'—')+'</div>'+
          '<div style="font-size:10px;color:var(--text-muted)">ROL '+m.rol+' · '+(m.funcao||'Membro')+'</div>'+
        '</div>'+
        '<button class="btn btn-ghost btn-sm" style="padding:4px 8px;font-size:11px;flex-shrink:0" onclick="event.stopPropagation();mbCard_downloadPDF(\''+m.id+'\')" title="PDF Carteirinha">'+
          '<i data-lucide="file-down" style="width:13px;height:13px"></i> PDF'+
        '</button>'+
      '</div>';
  });

  var panelList =
    '<div class="mb-card-panel-list">'+
      '<div class="ed-section-header" style="margin-bottom:10px">'+
        '<div>'+
          '<div class="ed-section-title">Membros Ativos</div>'+
          '<div class="ed-section-sub">'+ativos.length+' membro(s) · Marque para lote · Clique para preview</div>'+
        '</div>'+
        '<div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center">'+
          '<button class="btn btn-ghost btn-sm" onclick="mbCard_selecionarTodos()" title="Selecionar todos">'+
            '<i data-lucide="check-square" style="width:14px;height:14px"></i>'+
          '</button>'+
          '<button class="btn btn-ghost btn-sm" onclick="mbCard_deselecionarTodos()" title="Limpar seleção">'+
            '<i data-lucide="square" style="width:14px;height:14px"></i>'+
          '</button>'+
          '<button class="btn btn-primary btn-sm" id="btn-lote" onclick="mbCard_gerarLote()"'+loteDisabled+' style="'+(nSel===0?'opacity:0.5;cursor:not-allowed':'')+'">'+
            '<i data-lucide="layers" style="width:14px;height:14px"></i>'+
            '<span id="btn-lote-txt">'+loteLabel+'</span>'+
            '<div class="btn-spinner"></div>'+
          '</button>'+
        '</div>'+
      '</div>'+
      '<div class="ed-search-wrap" style="margin-bottom:10px">'+
        '<span class="ed-search-icon"><i data-lucide="search" style="width:15px;height:15px"></i></span>'+
        '<input class="ed-search" id="mb-card-search-input" type="text" placeholder="Buscar membro..." value="'+_mbEsc(MB.cardSearch||'')+'" oninput="_mbOnSearchCard(event)">'+
      '</div>'+
      '<div class="mb-lote-grid" id="mb-lote-grid">'+itens+'</div>'+
    '</div>';

  return '<div class="mb-card-layout">'+panelPreview+panelList+'</div>';
}

// ── Selecionar membro para preview ──────────────────────
function mbCard_selecionarPreview(id) {
  MB.cardSelected = id;
  _mbRenderPanel();
}

// ── Seleção para lote ────────────────────────────────────
function mbCard_toggleSel(id) {
  MB.cardSelecionados = MB.cardSelecionados || {};
  if (MB.cardSelecionados[id]) delete MB.cardSelecionados[id];
  else MB.cardSelecionados[id] = true;
  _mbRenderPanel();
}
function mbCard_selecionarTodos() {
  MB.cardSelecionados = {};
  MB.membros.filter(function(m){ return m.ativo !== false; })
    .forEach(function(m){ MB.cardSelecionados[m.id] = true; });
  _mbRenderPanel();
}
function mbCard_deselecionarTodos() {
  MB.cardSelecionados = {};
  _mbRenderPanel();
}

// ── Toast de progresso ───────────────────────────────────
function mbCard_toast(label, pct, sub) {
  var t = document.getElementById('mb-pdf-toast');
  var l = document.getElementById('mb-pdf-toast-label');
  var b = document.getElementById('mb-pdf-toast-bar');
  var s = document.getElementById('mb-pdf-toast-sub');
  if (!t) return;
  if (label === null) { t.style.display = 'none'; return; }
  t.style.display = 'block';
  if (l) l.textContent = label;
  if (b) b.style.width = pct + '%';
  if (s) s.textContent = sub || '';
}

// ── Renderiza cartão num div temporário e captura JPEG alta resolução ────
// SCALE 6 → 2040×1284 px ≈ 600 dpi no formato 85,6×53,98 mm (impressão profissional)
function mbCard_capturar(m, showBack) {
  return new Promise(function(resolve, reject) {
    var SCALE  = 6;   // ← era 4; 6 = ~600 dpi para carteirinha 85,6×53,98mm
    var W      = 340;
    var H      = 214;
    var container = document.getElementById('mb-pdf-render-container');

    // Pré-processa foto da frente via canvas antes de injetar no DOM,
    // eliminando transform:scale() CSS que o dom-to-image não renderiza fielmente.
    // Dimensões do slot de foto no card: 68×90 px → escaladas pelo SCALE para captura nítida
    var FOTO_W = 68 * SCALE;
    var FOTO_H = 90 * SCALE;

    function _renderizar(fotoProcessada, logoProcessado) {
      /* Wrapper externo: tamanho final da imagem — domtoimage captura este elemento */
      var outer = document.createElement('div');
      outer.style.cssText = 'position:absolute;top:0;left:0;width:' + (W*SCALE) + 'px;height:' + (H*SCALE) + 'px;overflow:hidden;pointer-events:none;background:#ffffff';

      /* Wrapper interno: tamanho real do card (340×214) escalado por transform.
         Assim o texto "enxerga" 340px de largura e não sofre reflow. */
      var inner = document.createElement('div');
      inner.style.cssText = 'width:' + W + 'px;height:' + H + 'px;transform:scale(' + SCALE + ');transform-origin:top left;border-radius:14px;overflow:hidden;font-family:Inter,sans-serif;image-rendering:crisp-edges';

      // Frente recebe foto e logo pré-processados (canvas); verso não tem nenhum dos dois
      inner.innerHTML = showBack
        ? mbCard_htmlVerso(m, false)
        : mbCard_htmlFrente(m, false, fotoProcessada || null, logoProcessado || null);

      outer.appendChild(inner);
      container.appendChild(outer);

      /* Aguarda fontes e imagens carregarem */
      var fontesProntas = (document.fonts && document.fonts.ready)
        ? document.fonts.ready
        : Promise.resolve();

      var imgs    = inner.querySelectorAll('img');
      var pending = imgs.length;

      function proceed() {
        // Aguarda fontes + delay mínimo para GPU flush
        fontesProntas.then(function() {
          setTimeout(function() {
            // JPEG qualidade 1.0: evita dupla compressão lossy (dom-to-image → jsPDF)
            domtoimage.toJpeg(outer, {
              width:   W * SCALE,
              height:  H * SCALE,
              quality: 1.0,
              bgcolor: '#ffffff'
            }).then(function(dataUrl) {
              container.removeChild(outer);
              resolve(dataUrl);
            }).catch(function(err) {
              container.removeChild(outer);
              reject(err);
            });
          }, 600);
        });
      }

      if (pending === 0) { proceed(); return; }
      imgs.forEach(function(img) {
        if (img.complete) { pending--; if (pending === 0) proceed(); }
        else {
          img.onload  = function() { pending--; if (pending === 0) proceed(); };
          img.onerror = function() { pending--; if (pending === 0) proceed(); };
        }
      });
    }

    // Frente: pré-processa apenas a foto via canvas (nitidez máxima, sem transform CSS)
    // Logo NÃO passa pelo canvas — o PNG original (80px) + filter CSS brightness(0) invert(1)
    // são capturados pelo domtoimage nativamente após o transform:scale(6), evitando upscale manual
    // que degradava a qualidade (80px → 228px forçado no canvas = pixelado).
    if (!showBack) {
      var fotoSrc = (m.foto && MB._fotoCache[m.foto]) ? MB._fotoCache[m.foto] : '';
      var fotoPromise = fotoSrc
        ? mbCard_prepararFoto(fotoSrc, m.fotoZoom||1, m.fotoX||50, m.fotoY||50, FOTO_W, FOTO_H)
            .catch(function() { return ''; })
        : Promise.resolve('');

      fotoPromise.then(function(fotoProcessada) {
        // logoProcessado = null → mbCard_htmlFrente usa PNG original + filter CSS
        _renderizar(fotoProcessada, null);
      });
    } else {
      // Verso não tem foto nem logo do membro
      _renderizar('', null);
    }
  });
}

// ── Download PDF individual (frente + verso) ─────────────
function mbCard_downloadPDF(id) {
  var m = MB.membros.filter(function(x){ return String(x.id)===String(id); })[0];
  if (!m) return;

  if (!window.jspdf || !window.domtoimage) {
    showToast('Bibliotecas PDF não carregadas ainda. Aguarde.', 'warning');
    return;
  }

  mbCard_toast('Gerando PDF...', 10, 'Capturando frente...');

  mbCard_capturar(m, false).then(function(frontImg) {
    mbCard_toast('Gerando PDF...', 50, 'Capturando verso...');
    return mbCard_capturar(m, true).then(function(backImg) {
      mbCard_toast('Gerando PDF...', 85, 'Salvando arquivo...');
      var pdf = new window.jspdf.jsPDF({
        orientation: 'landscape',
        unit: 'mm',
        format: [85.6, 53.98]
      });
      pdf.addImage(frontImg, 'JPEG', 0, 0, 85.6, 53.98, undefined, 'FAST');
      pdf.addPage([85.6, 53.98], 'landscape');
      pdf.addImage(backImg,  'JPEG', 0, 0, 85.6, 53.98, undefined, 'FAST');
      pdf.save('Cartao_ROL' + (m.rol||'0000') + '_' + (m.nome||'Membro').split(' ')[0] + '.pdf');
      mbCard_toast(null);
      showToast('PDF gerado com sucesso!', 'success');
    });
  }).catch(function(e) {
    mbCard_toast(null);
    console.error(e);
    showToast('Erro ao gerar PDF. Verifique o console.', 'error');
  });
}

// ── Download PNG (frente ou verso) ───────────────────────
function mbCard_downloadPNG(id, showBack) {
  var m = MB.membros.filter(function(x){ return String(x.id)===String(id); })[0];
  if (!m) return;

  if (!window.domtoimage) {
    showToast('Biblioteca de imagem não carregada ainda.', 'warning');
    return;
  }

  mbCard_toast('Gerando PNG...', 30, showBack ? 'Verso' : 'Frente');

  mbCard_capturar(m, showBack).then(function(dataUrl) {
    var a = document.createElement('a');
    a.href     = dataUrl;
    a.download = 'Cartao_' + (showBack?'Verso':'Frente') + '_ROL' + (m.rol||'0000') + '.png';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    mbCard_toast(null);
    showToast('PNG salvo!', 'success');
  }).catch(function(e) {
    mbCard_toast(null);
    console.error(e);
    showToast('Erro ao gerar PNG.', 'error');
  });
}

// ── Gerar PDF em lote (5 por página A4, frente|verso lado a lado) ──
function mbCard_gerarLote() {
  MB.cardSelecionados = MB.cardSelecionados || {};
  var ids = Object.keys(MB.cardSelecionados);
  if (!ids.length) { showToast('Selecione pelo menos um membro.', 'warning'); return; }

  if (!window.jspdf || !window.domtoimage) {
    showToast('Bibliotecas PDF não carregadas ainda.', 'warning');
    return;
  }

  var lista = ids.map(function(id){
    return MB.membros.filter(function(m){ return String(m.id)===String(id); })[0];
  }).filter(Boolean);

  var btn = document.getElementById('btn-lote');
  if (btn) btn.classList.add('loading');

  var pdf = new window.jspdf.jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
  // 5 carteirinhas/página: MARGIN=8, GAP=2 → altura total=293.9mm (A4=297mm)
  var CW = 85.6, CH = 53.98, MARGIN = 8, GAP = 2, POR_PAG = 5;

  // ── Linhas de sangria: linhas horizontais e verticais que cruzam a folha inteira ──
  // Facilita o alinhamento na guilhotina — cada linha vai de borda a borda da folha A4.
  var A4W = 210, A4H = 297; // mm
  function _desenharSangria(pdf, xL, xR, y, cw, ch) {
    // xL = x da frente, xR = x do verso, y = topo da linha, cw = largura do card, ch = altura
    pdf.setDrawColor(180, 180, 180);
    pdf.setLineWidth(0.12);
    pdf.setLineDashPattern([1.5, 1.2], 0);

    // Horizontais: topo e fundo de cada linha de carteirinhas — cruzam toda a largura A4
    pdf.line(0, y,      A4W, y);       // topo
    pdf.line(0, y + ch, A4W, y + ch);  // fundo

    // Verticais: bordas esquerda e direita de cada carteirinha (frente e verso) — cruzam toda a altura A4
    [xL, xL + cw, xR, xR + cw].forEach(function(xv) {
      pdf.line(xv, 0, xv, A4H);
    });

    pdf.setLineDashPattern([], 0); // restaura linha sólida
  }

  var total = lista.length;

  function processarMembro(idx) {
    if (idx >= lista.length) {
      // Todas as páginas geradas
      pdf.save('Lote_Membros_' + new Date().toISOString().split('T')[0] + '.pdf');
      if (btn) btn.classList.remove('loading');
      mbCard_toast(null);
      showToast('PDF lote gerado! ' + total + ' membro(s).', 'success');
      return;
    }

    var m     = lista[idx];
    var posNaPagina = idx % POR_PAG;

    // Nova página a cada 5 membros (exceto a primeira)
    if (posNaPagina === 0 && idx > 0) pdf.addPage();

    var yPos  = MARGIN + posNaPagina * (CH + GAP);
    var xBack = MARGIN + CW + GAP;
    var pct   = Math.round((idx / total) * 90) + 5;

    mbCard_toast(
      'Gerando lote (' + (idx+1) + '/' + total + ')',
      pct,
      m.nome || ''
    );

    mbCard_capturar(m, false).then(function(frontImg) {
      pdf.addImage(frontImg, 'JPEG', MARGIN, yPos, CW, CH, undefined, 'FAST');
      return mbCard_capturar(m, true);
    }).then(function(backImg) {
      pdf.addImage(backImg, 'JPEG', xBack, yPos, CW, CH, undefined, 'FAST');
      // Sangria tracejada ao redor de cada par frente+verso
      _desenharSangria(pdf, MARGIN, xBack, yPos, CW, CH);
      processarMembro(idx + 1);
    }).catch(function(e) {
      console.error('Erro no membro ' + m.nome, e);
      processarMembro(idx + 1); // Continua mesmo com erro
    });
  }

  processarMembro(0);
}

// ── Inicialização do estado de carteirinha ───────────────
if (!MB.cardSelected)     MB.cardSelected     = null;
if (!MB.cardSelecionados) MB.cardSelecionados = {};
if (!MB.cardSearch)       MB.cardSearch       = '';
