<style>
/* ══════════════════════════════════════════════════════
   USUÁRIOS — Gestão de Acesso e Perfis
   Alinhado ao Design System Cinematic Premium
══════════════════════════════════════════════════════ */

:root {
  --topnav-bg: rgba(5,11,16,0.90);
  --bg-glass2: rgba(20,32,44,0.72);
  --shadow-teal: 0 8px 32px rgba(0,217,198,0.14), 0 0 0 1px rgba(0,217,198,0.08);
}
[data-theme="light"] {
  --topnav-bg: rgba(243,247,250,0.94);
  --bg-glass2: rgba(255,255,255,0.85);
  --shadow-teal: 0 8px 28px rgba(0,169,156,0.12), 0 0 0 1px rgba(0,169,156,0.1);
}

/* ── HERO ── */
.usr-hero {
  padding: 28px 20px 20px;
  background: linear-gradient(175deg, #050e18 0%, #071825 55%, #050e18 100%);
  position: relative; overflow: hidden;
}
[data-theme="light"] .usr-hero { background: linear-gradient(175deg,#005248 0%,#007064 55%,#005248 100%); }
.usr-hero::before {
  content:''; position:absolute; top:-60px; right:-40px;
  width:260px; height:260px; border-radius:50%;
  background: radial-gradient(circle, rgba(0,217,198,.18) 0%, transparent 65%);
  pointer-events:none;
}
.usr-hero-top {
  display:flex; align-items:center; gap:14px; position:relative; z-index:2;
}
.usr-hero-back {
  background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.1);
  cursor:pointer; width:42px; height:42px; border-radius:12px;
  display:flex; align-items:center; justify-content:center;
  color:rgba(255,255,255,0.7); transition:all .2s;
}
.usr-hero-back:hover { background:rgba(255,255,255,0.12); color:#fff; transform:translateX(-2px); }
.usr-hero-title { font-size:22px; font-weight:900; color:#fff; letter-spacing:-.6px; }
.usr-hero-sub { font-size:11px; color:rgba(255,255,255,.5); margin-top:3px; font-family:'DM Mono',monospace; text-transform:uppercase; letter-spacing:.5px; }

/* ── CONTENT ── */
.usr-content { max-width:860px; margin:0 auto; padding:24px 16px 96px; }

/* ── SECTION HEADER ── */
.usr-section-header {
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:20px; gap:12px; flex-wrap:wrap;
}

/* ── SEARCH ── */
.usr-search-wrap { position:relative; margin-bottom:14px; }
.usr-search-icon {
  position:absolute; left:16px; top:50%; transform:translateY(-50%);
  color:var(--text-dim); display:flex; align-items:center; pointer-events:none;
}
.usr-search {
  width:100%; height:48px;
  background:var(--bg-glass); border:1.5px solid var(--border);
  border-radius:16px; color:var(--text);
  font-family:'Plus Jakarta Sans',sans-serif; font-size:14px;
  padding:0 16px 0 48px;
  transition:border-color .2s, box-shadow .2s;
  backdrop-filter:blur(14px);
}
.usr-search:focus { outline:none; border-color:var(--teal); box-shadow:0 0 0 3px var(--teal-glow-soft); }

/* ── FILTER TABS ── */
.usr-filter-row {
  display:flex; gap:6px; margin-bottom:16px; flex-wrap:wrap;
}
.usr-filter-btn {
  height:34px; padding:0 14px; border-radius:100px;
  border:1.5px solid var(--border); background:var(--bg-glass);
  font-family:'Plus Jakarta Sans',sans-serif; font-size:12px; font-weight:700;
  color:var(--text-muted); cursor:pointer; transition:all .18s;
}
.usr-filter-btn.active {
  background:var(--teal-dim); border-color:var(--teal-border); color:var(--teal);
}
.usr-filter-btn:hover:not(.active) { background:var(--bg4); color:var(--text); }

/* ── USER LIST ITEM ── */
.usr-list { display:flex; flex-direction:column; gap:8px; }
.usr-item {
  background:var(--bg-glass);
  border:1px solid var(--border);
  border-radius:18px; padding:14px 18px;
  display:flex; align-items:center; gap:14px;
  transition:border-color .2s, box-shadow .2s;
  position:relative; overflow:hidden;
}
.usr-item:hover {
  border-color:var(--border2);
  box-shadow: 0 4px 20px rgba(0,0,0,0.15);
}
.usr-item.inativo { opacity:.55; }

.usr-avatar {
  width:46px; height:46px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-weight:800; font-size:15px; flex-shrink:0;
  border:2px solid rgba(255,255,255,.1);
}
.usr-item-body { flex:1; min-width:0; }
.usr-item-name { font-size:14px; font-weight:700; color:var(--text); }
.usr-item-email { font-size:11px; color:var(--text-muted); margin-top:2px; font-family:'DM Mono',monospace; }
.usr-item-meta { display:flex; align-items:center; gap:8px; margin-top:6px; flex-wrap:wrap; }
.usr-item-actions { display:flex; gap:6px; flex-shrink:0; }
.usr-act-btn {
  width:34px; height:34px; border-radius:10px;
  border:1px solid var(--border); background:var(--bg3); cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  color:var(--text-muted); transition:all .18s;
}
.usr-act-btn:hover { background:var(--bg4); color:var(--text); border-color:var(--border-strong); }
.usr-act-btn.danger:hover { background:rgba(255,94,122,0.10); color:var(--danger); border-color:rgba(255,94,122,.3); }
.usr-act-btn.success-btn:hover { background:rgba(54,211,153,0.10); color:var(--success); border-color:rgba(54,211,153,.3); }

/* ── EMPTY STATE ── */
.usr-empty { text-align:center; padding:60px 24px; color:var(--text-muted); }
.usr-empty-icon { font-size:48px; opacity:.2; margin-bottom:12px; }
.usr-empty-title { font-size:16px; font-weight:800; color:var(--text); margin-bottom:6px; }

/* ── BOTTOM NAV (reutiliza estilos home) ── */
.usr-bottom-nav {
  position:fixed; bottom:0; left:0; right:0;
  background:var(--bg-glass-strong);
  backdrop-filter:blur(28px) saturate(200%);
  -webkit-backdrop-filter:blur(28px) saturate(200%);
  border-top:1px solid var(--border);
  display:flex; align-items:center; justify-content:space-around;
  padding:8px; padding-bottom:max(8px,env(safe-area-inset-bottom));
  z-index:90;
}
.usr-bnav-item {
  flex:1; max-width:80px;
  display:flex; flex-direction:column; align-items:center; gap:3px;
  background:none; border:none; cursor:pointer;
  font-size:10px; font-weight:700; color:var(--text-dim);
  font-family:'Plus Jakarta Sans',sans-serif;
  border-radius:10px; padding:6px 4px;
  transition:color .15s;
}
.usr-bnav-item.active { color:var(--teal); }
.usr-bnav-item i { width:22px; height:22px; display:block; }

/* ── PERFIL COLORS ── */
.perfil-admin      { background:rgba(255,94,122,.12); color:var(--danger); border:1px solid rgba(255,94,122,.25); }
.perfil-secretaria { background:rgba(155,124,255,0.12); color:var(--purple); border:1px solid rgba(155,124,255,.25); }
.perfil-professor  { background:var(--teal-dim); color:var(--teal); border:1px solid var(--teal-border); }

/* ── TABS ── */
.usr-tabs-wrap {
  background: var(--bg2); border-bottom: 1px solid var(--border);
  position: sticky; top: 64px; z-index: 90;
  overflow-x: auto; -webkit-overflow-scrolling: touch;
}
.usr-tabs-wrap::-webkit-scrollbar { height: 0; }
.usr-tabs {
  display: flex; gap: 2px; padding: 6px 16px; min-width: max-content;
  max-width: 860px; margin: 0 auto;
}
.usr-tab {
  display: flex; align-items: center; gap: 7px;
  padding: 7px 14px; border-radius: 10px;
  border: 1px solid transparent; background: none;
  font-family: 'Plus Jakarta Sans', sans-serif; font-size: 12px; font-weight: 700;
  color: var(--text-muted); cursor: pointer; transition: all .18s; white-space: nowrap;
}
.usr-tab:hover { background: rgba(255,255,255,.04); color: var(--text); }
.usr-tab.active {
  background: var(--teal-dim); color: var(--teal);
  border-color: var(--teal-border);
}

/* ── MATRIZ DE PERMISSÕES ── */
.perm-card {
  background: var(--bg-glass); border: 1px solid var(--border);
  border-radius: 18px; overflow: hidden; margin-bottom: 12px;
}
.perm-module-header {
  display: flex; align-items: center; gap: 10px;
  padding: 14px 18px; border-bottom: 1px solid var(--border);
  background: var(--bg3);
}
.perm-module-icon {
  width: 32px; height: 32px; border-radius: 9px;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.perm-module-name  { font-size: 13px; font-weight: 800; color: var(--text); }
.perm-module-desc  { font-size: 11px; color: var(--text-muted); margin-top: 1px; }

.perm-table { width: 100%; border-collapse: collapse; }
.perm-table th {
  padding: 10px 18px; font-size: 10px; font-weight: 800; text-transform: uppercase;
  letter-spacing: .06em; color: var(--text-muted); text-align: left;
  border-bottom: 1px solid var(--border); background: var(--bg3);
}
.perm-table th.col-perfil { width: 130px; }
.perm-table td {
  padding: 11px 18px; border-bottom: 1px solid var(--border);
  font-size: 12px; color: var(--text);
}
.perm-table tr:last-child td { border-bottom: none; }
.perm-table tr:hover td { background: rgba(255,255,255,.015); }
[data-theme="light"] .perm-table tr:hover td { background: rgba(0,0,0,.018); }

.perm-check {
  display: inline-flex; align-items: center; justify-content: center;
  width: 22px; height: 22px; border-radius: 6px;
}
.perm-check.yes { background: rgba(54,211,153,.15); color: var(--success); border: 1px solid rgba(54,211,153,.3); }
.perm-check.no  { background: rgba(255,94,122,.10); color: var(--danger);  border: 1px solid rgba(255,94,122,.2); opacity: .6; }
.perm-check.partial { background: rgba(255,200,87,.12); color: var(--warning,#FFC857); border: 1px solid rgba(255,200,87,.3); }

.perm-perfil-badge {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 100px;
}

.perm-legend {
  display: flex; gap: 16px; flex-wrap: wrap;
  padding: 12px 18px; font-size: 11px; color: var(--text-muted);
  border-top: 1px solid var(--border); background: var(--bg3); align-items: center;
}
.perm-legend-item { display: flex; align-items: center; gap: 6px; }
</style>

<script>
// ══════════════════════════════════════════════════════════
//  USUÁRIOS VIEW — Gestão de Acesso
//  Disponível para: Admin e Secretaria
// ══════════════════════════════════════════════════════════

var UsrState = {
  usuarios:    [],
  filtro:      'todos',   // todos | admin | secretaria | professor | inativos
  busca:       ''
};

// ── RENDER PRINCIPAL ───────────────────────────────────────
function renderUsuarios() {
  if (!App.session) { navigateTo('login'); return; }
  var perfil = App.session.perfil || '';
  if (perfil === 'professor') {
    showToast('Acesso restrito.', 'error');
    navigateTo(_homeViewForPerfil(perfil));
    return;
  }

  var isAdmin = perfil === 'admin';
  var isSec   = perfil === 'secretaria'; // secretaria pura (sem admin)
  var perfilLabel = { admin: 'Admin', secretaria: 'Secretaria', professor: 'Professor' }[perfil] || perfil;
  var _thIcon = (document.documentElement.getAttribute('data-theme') || 'dark') === 'dark' ? 'moon' : 'sun';

  // Ícone SVG inline por perfil — não depende de lucide.createIcons() para renderizar
  var perfilIcons = {
    admin:      '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:middle;margin-right:4px"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>',
    secretaria: '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:middle;margin-right:4px"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg>',
    professor:  '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:middle;margin-right:4px"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>'
  };
  var perfilIcon = perfilIcons[perfil] || '';

  renderView(
    /* ── TOPNAV ── */
    '<nav class="topnav">'+
      '<div class="topnav-logo" onclick="navigateTo(\''+_homeViewForPerfil(perfil)+'\')" style="cursor:pointer">'+
        '<div class="topnav-logo-icon">'+
          '<img src="" alt="Logo AD" class="app-logo-img" style="width:28px;height:28px;object-fit:contain">'+
        '</div>'+
        '<div>'+
          '<div class="topnav-logo-name">AD Fonte da Salvação</div>'+
          '<div class="topnav-logo-sub">Gestão Ministerial</div>'+
        '</div>'+
      '</div>'+
      '<div class="topnav-actions">'+

        /* Desktop */
        '<div style="display:flex;align-items:center;gap:4px" class="usr-desktop-nav">'+
          '<button class="theme-toggle-btn btn btn-ghost btn-sm" style="width:40px;padding:0" onclick="toggleTheme()">'+
            '<i data-lucide="'+_thIcon+'" style="width:18px;height:18px"></i>'+
          '</button>'+
          /* Botão Usuários — ativo/destacado por ser a view atual */
          '<button class="btn btn-sm" onclick="navigateTo(\'usuarios\')" '+
            'style="display:flex;align-items:center;gap:6px;padding:0 13px;height:36px;font-size:12px;font-weight:700;'+
            'background:var(--teal-dim);color:var(--teal);border:1.5px solid var(--teal-border);border-radius:10px">'+
            '<i data-lucide="shield-check" style="width:14px;height:14px"></i> Usuários'+
          '</button>'+
          '<div style="position:relative">'+
            '<button class="topnav-avatar-btn" onclick="toggleUserDropdown()" id="avatar-btn">'+
              '<div class="avatar">'+getInitials(App.session.nome||'')+'</div>'+
            '</button>'+
            '<div class="user-dropdown" id="user-dropdown">'+
              '<div class="user-dd-header">'+
                '<div class="user-dd-nome">'+(App.session.nome||'')+'</div>'+
                '<div class="user-dd-email">'+(App.session.email||'')+'</div>'+
                '<div style="margin-top:8px"><span class="badge badge-teal">'+perfilIcon+perfilLabel+'</span></div>'+
              '</div>'+
              (isAdmin ? '<button class="user-dd-item" onclick="closeDropdown();navigateTo(\'home\')">'+
                '<i data-lucide="layout-dashboard" style="width:15px;height:15px"></i> Dashboard'+
              '</button>' : '')+
              '<button class="user-dd-item" onclick="closeDropdown();navigateTo(\'escola-dominical\')">'+
                '<i data-lucide="graduation-cap" style="width:15px;height:15px"></i> Escola Dominical'+
              '</button>'+
              (isAdmin || isSec ? '<button class="user-dd-item" onclick="closeDropdown();navigateTo(\'membros\')">'+
                '<i data-lucide="contact" style="width:15px;height:15px"></i> Membros'+
              '</button>' : '')+
              '<button class="user-dd-item" onclick="closeDropdown();showTrocarSenha()">'+
                '<i data-lucide="key" style="width:15px;height:15px"></i> Alterar senha'+
              '</button>'+
              '<hr class="divider" style="margin:6px 0">'+
              '<button class="user-dd-item danger" onclick="handleLogout()">'+
                '<i data-lucide="log-out" style="width:15px;height:15px"></i> Sair'+
              '</button>'+
            '</div>'+
          '</div>'+
        '</div>'+

        /* Mobile cfg */
        '<div class="usr-mob-cfg-wrap">'+
          '<button class="btn btn-ghost btn-sm" style="width:38px;padding:0" onclick="usrToggleMobCfg(event)" title="Menu">'+
            '<i data-lucide="settings-2" style="width:17px;height:17px"></i>'+
          '</button>'+
          '<div class="usr-mob-cfg-dd" id="usr-mob-cfg-dd">'+
            '<div style="font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:var(--text-muted);padding:6px 13px 2px">Conta</div>'+
            '<div style="display:flex;align-items:center;gap:10px;padding:10px 13px;border-radius:9px">'+
              '<div class="avatar" style="width:28px;height:28px;font-size:11px;flex-shrink:0">'+getInitials(App.session.nome||'?')+'</div>'+
              '<div style="min-width:0">'+
                '<div style="font-size:12px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+(App.session.nome||'')+'</div>'+
                '<div style="font-size:10px;color:var(--text-muted)">'+(App.session.email||'')+'</div>'+
              '</div>'+
            '</div>'+
            '<div class="divider" style="height:1px;background:var(--border);margin:4px 0"></div>'+
            '<button onclick="usrToggleMobCfg();toggleTheme()">'+
              '<i data-lucide="'+_thIcon+'" style="width:15px;height:15px"></i> Alternar tema'+
            '</button>'+
            '<div class="divider" style="height:1px;background:var(--border);margin:4px 0"></div>'+
            (isAdmin ? '<button onclick="usrToggleMobCfg();navigateTo(\'home\')">'+
              '<i data-lucide="layout-dashboard" style="width:15px;height:15px"></i> Dashboard'+
            '</button>' : '')+
            '<button onclick="usrToggleMobCfg();navigateTo(\'escola-dominical\')">'+
              '<i data-lucide="graduation-cap" style="width:15px;height:15px"></i> Escola Dominical'+
            '</button>'+
            (isAdmin ? '<button onclick="usrToggleMobCfg();navigateTo(\'membros\')">'+
              '<i data-lucide="contact" style="width:15px;height:15px"></i> Membros'+
            '</button>' : '')+
            '<div class="divider" style="height:1px;background:var(--border);margin:4px 0"></div>'+
            '<button onclick="usrToggleMobCfg();showTrocarSenha()">'+
              '<i data-lucide="key" style="width:15px;height:15px"></i> Alterar senha'+
            '</button>'+
            '<div class="divider" style="height:1px;background:var(--border);margin:4px 0"></div>'+
            '<button onclick="handleLogout()" style="color:var(--danger)">'+
              '<i data-lucide="log-out" style="width:15px;height:15px"></i> Sair'+
            '</button>'+
          '</div>'+
        '</div>'+

      '</div>'+
    '</nav>'+

    /* ── BREADCRUMB BAR ── */
    '<div style="background:var(--bg2);border-bottom:1px solid var(--border);padding:0 16px;height:36px;display:flex;align-items:center;gap:0">'+
      '<button style="display:flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:8px;border:1px solid transparent;color:var(--text-muted);cursor:pointer;background:transparent;margin-right:8px;transition:all .2s" onclick="navigateTo(\''+_homeViewForPerfil(perfil)+'\')" title="Voltar">'+
        '<i data-lucide="arrow-left" style="width:14px;height:14px"></i>'+
      '</button>'+
      '<span style="font-size:11.5px;color:var(--text-muted);font-weight:500;cursor:pointer" onclick="navigateTo(\''+_homeViewForPerfil(perfil)+'\')">Gestão Ministerial</span>'+
      '<span style="font-size:11px;color:var(--border-strong);margin:0 6px">/</span>'+
      '<span style="font-size:12px;font-weight:700;color:var(--teal)">Usuários</span>'+
      '<div style="display:flex;align-items:center;gap:4px;margin-left:10px">'+
        '<span style="font-size:9.5px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--text-muted);background:var(--bg3);border:1px solid var(--border);border-radius:4px;padding:1px 6px;opacity:.75">Acesso</span>'+
        '<span style="font-size:9.5px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--text-muted);background:var(--bg3);border:1px solid var(--border);border-radius:4px;padding:1px 6px;opacity:.75">Permissões</span>'+
      '</div>'+
    '</div>'+

    /* ── TABS ── */
    '<div class="usr-tabs-wrap">'+
      '<div class="usr-tabs">'+
        '<button class="usr-tab active" id="usr-tab-usuarios" onclick="usrSetTab(\'usuarios\')">'+
          '<i data-lucide="users" style="width:14px;height:14px"></i> Usuários'+
        '</button>'+
        (isAdmin ?
        '<button class="usr-tab" id="usr-tab-permissoes" onclick="usrSetTab(\'permissoes\')">'+
          '<i data-lucide="shield" style="width:14px;height:14px"></i> Permissões'+
        '</button>' : '')+
      '</div>'+
    '</div>'+

    /* ── CONTENT ── */
    '<div class="usr-content" id="usr-content">'+

      /* Header */
      '<div class="usr-section-header">'+
        '<div id="usr-count" style="font-size:13px;color:var(--text-muted)">Carregando...</div>'+
        (isAdmin ?
          '<button class="btn btn-primary btn-sm" onclick="usrOpenModalNovoUsuario()">'+
            '<i data-lucide="user-plus" style="width:15px;height:15px"></i> Novo Usuário'+
          '</button>' : ''
        )+
      '</div>'+

      /* Busca */
      '<div class="usr-search-wrap">'+
        '<div class="usr-search-icon"><i data-lucide="search" style="width:16px;height:16px"></i></div>'+
        '<input type="text" class="usr-search" id="usr-busca" placeholder="Buscar por nome ou e-mail…" oninput="usrSetBusca(this.value)">'+
      '</div>'+

      /* Filtros */
      '<div class="usr-filter-row">'+
        '<button class="usr-filter-btn active" id="ufbtn-todos"      onclick="usrSetFiltro(\'todos\')">Todos</button>'+
        '<button class="usr-filter-btn"        id="ufbtn-admin"      onclick="usrSetFiltro(\'admin\')">Admin</button>'+
        '<button class="usr-filter-btn"        id="ufbtn-secretaria" onclick="usrSetFiltro(\'secretaria\')">Secretaria</button>'+
        '<button class="usr-filter-btn"        id="ufbtn-professor"  onclick="usrSetFiltro(\'professor\')">Professor</button>'+

// ── CARREGAR USUÁRIOS ─────────────────────────────────────
function _usrCarregar() {
  var listEl = document.getElementById('usr-list');
  if (listEl) listEl.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text-muted);font-size:13px"><div class="loader-spinner" style="margin:0 auto 12px"></div>Carregando...</div>';

  google.script.run
    .withFailureHandler(function(e) {
      var msg = (e && e.message) ? e.message : 'Erro de conexão.';
      if (listEl) listEl.innerHTML = '<div style="padding:24px;text-align:center;color:var(--danger);font-size:13px">⚠ ' + msg + '</div>';
      showToast('Erro: ' + msg, 'error');
    })
    .withSuccessHandler(function(res) {
      if (!res || !res.success) {
        var msg = res ? res.error : 'Erro desconhecido.';
        if (listEl) listEl.innerHTML = '<div style="padding:24px;text-align:center;color:var(--danger);font-size:13px">⚠ ' + msg + '</div>';
        showToast(msg, 'error');
        return;
      }
      UsrState.usuarios = res.data || [];
      _usrRenderLista();
    })
    .usr_listar(App.session.token);
}

// ── RENDER LISTA ──────────────────────────────────────────
function _usrRenderLista() {
  var perfil   = App.session.perfil || '';
  var isAdmin  = perfil === 'admin';
  var busca    = (UsrState.busca || '').toLowerCase();
  var filtro   = UsrState.filtro;

  var lista = UsrState.usuarios.filter(function(u) {
    var ativo = u.Ativo === true || u.Ativo === 'TRUE' || u.Ativo === true;
    if (filtro === 'inativos') return !ativo;
    if (filtro !== 'todos' && u.Perfil !== filtro) return false;
    if (!ativo && filtro !== 'inativos') return false;  // excluir inativos por padrão
    if (busca) {
      return (u.Nome||'').toLowerCase().indexOf(busca) !== -1 ||
             (u.Email||'').toLowerCase().indexOf(busca) !== -1;
    }
    return true;
  });

  var contEl = document.getElementById('usr-count');
  if (contEl) contEl.textContent = lista.length + ' usuário(s)';

  var listEl = document.getElementById('usr-list');
  if (!listEl) return;

  if (!lista.length) {
    listEl.innerHTML = '<div class="usr-empty">'+
      '<div class="usr-empty-icon">👥</div>'+
      '<div class="usr-empty-title">Nenhum usuário encontrado</div>'+
      '<div style="font-size:13px;margin-top:4px">Tente outro filtro ou busca.</div>'+
    '</div>';
    return;
  }

  var colors = {
    admin:      { bg:'rgba(255,94,122,.14)',    fg:'#FF5E7A' },
    secretaria: { bg:'rgba(155,124,255,.14)',   fg:'#9B7CFF' },
    professor:  { bg:'rgba(0,217,198,.14)',     fg:'#00D9C6' }
  };

  var html = '';
  lista.forEach(function(u) {
    var ativo = u.Ativo === true || u.Ativo === 'TRUE' || u.Ativo === true;
    var cor   = colors[u.Perfil] || colors['professor'];
    var ini   = getInitials(u.Nome || '');
    var perfilLabel = { admin:'Admin', secretaria:'Secretaria', professor:'Professor' }[u.Perfil] || u.Perfil;
    var perfilClass = 'perfil-'+(u.Perfil||'professor');

    var isSelf = (u.Email || '').toLowerCase() === (App.session.email || '').toLowerCase();

    html +=
      '<div class="usr-item'+(ativo?'':' inativo')+'">'+
        '<div class="usr-avatar" style="background:'+cor.bg+';color:'+cor.fg+'">'+ini+'</div>'+
        '<div class="usr-item-body">'+
          '<div class="usr-item-name">'+_usrEsc(u.Nome)+(isSelf?' <span style="font-size:10px;color:var(--teal)">(você)</span>':(!ativo?' <span style="font-size:10px;color:var(--text-dim)">(inativo)</span>':''))+'</div>'+
          '<div class="usr-item-email">'+_usrEsc(u.Email||'')+'</div>'+
          '<div class="usr-item-meta">'+
            '<span class="badge '+perfilClass+'" style="font-size:10px;padding:2px 10px;border-radius:100px;font-weight:800">'+perfilLabel+'</span>'+
            (u.UltLogin ? '<span style="font-size:10px;color:var(--text-dim)">Último login: '+u.UltLogin+'</span>' : '')+
          '</div>'+
        '</div>'+
        '<div class="usr-item-actions">'+
          (isAdmin && !isSelf ? '<button class="usr-act-btn" title="Resetar senha" onclick="usrOpenResetarSenha(\''+u.ID+'\',\''+_usrEsc(u.Nome)+'\')"><i data-lucide="key" style="width:14px;height:14px"></i></button>' : '')+
          (!isSelf ?
            '<button class="usr-act-btn" title="Editar usuário" onclick="usrOpenEditar(\''+u.ID+'\')">'+
              '<i data-lucide="pencil" style="width:14px;height:14px"></i>'+
            '</button>'+
            (ativo ?
              '<button class="usr-act-btn danger" title="Desativar usuário" onclick="usrAlterarStatus(\''+u.ID+'\',\''+_usrEsc(u.Nome)+'\',false)">'+
                '<i data-lucide="user-x" style="width:14px;height:14px"></i>'+
              '</button>' :
              '<button class="usr-act-btn success-btn" title="Reativar usuário" onclick="usrAlterarStatus(\''+u.ID+'\',\''+_usrEsc(u.Nome)+'\',true)">'+
                '<i data-lucide="user-check" style="width:14px;height:14px"></i>'+
              '</button>'
            )
          : '')+
        '</div>'+
      '</div>';
  });

  listEl.innerHTML = html;
  if (window.lucide) lucide.createIcons();
}

// ── HELPERS ───────────────────────────────────────────────
function _usrEsc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function usrSetFiltro(f) {
  UsrState.filtro = f;
  document.querySelectorAll('.usr-filter-btn').forEach(function(b) { b.classList.remove('active'); });
  var btn = document.getElementById('ufbtn-'+f);
  if (btn) btn.classList.add('active');
  _usrRenderLista();
}

function usrSetBusca(v) {
  UsrState.busca = v;
  _usrRenderLista();
}

        '</div>'+
        '<div style="font-size:11px;color:var(--text-muted);margin-top:4px">O usuário será solicitado a trocar no primeiro acesso.</div>'+
      '</div>'+

      '<div style="display:flex;gap:10px">'+
        '<button class="btn btn-secondary btn-full" onclick="usrCloseModal(\'modal-novo-usr\')">Cancelar</button>'+
        '<button class="btn btn-primary btn-full" id="btn-criar-usr" onclick="usrCriar()">'+
          '<span class="btn-text">Criar Usuário</span><div class="btn-spinner"></div>'+
        '</button>'+
      '</div>'+
    '</div>'+
  '</div>';
}

function usrOpenModalNovoUsuario() {
  ['nusr-nome','nusr-email','nusr-senha'].forEach(function(id){
    var el = document.getElementById(id); if(el) el.value='';
  });
  var sel = document.getElementById('nusr-perfil'); if(sel) sel.value='';
  var err = document.getElementById('nusr-err'); if(err) err.style.display='none';
  usrOpenModal('modal-novo-usr');
}

function usrCriar() {
  var nome  = (document.getElementById('nusr-nome').value||'').trim();
  var email = (document.getElementById('nusr-email').value||'').trim();
  var perfil= document.getElementById('nusr-perfil').value||'';
  var senha = document.getElementById('nusr-senha').value||'';
  var btn   = document.getElementById('btn-criar-usr');
  var err   = document.getElementById('nusr-err');
  err.style.display='none';

  if (!nome || !email || !perfil || !senha) { err.textContent='Preencha todos os campos.'; err.style.display='block'; return; }
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { err.textContent='E-mail inválido.'; err.style.display='block'; return; }
  if (senha.length < 8) { err.textContent='Senha mínima de 8 caracteres.'; err.style.display='block'; return; }

  btn.classList.add('loading');
  sha256(senha).then(function(hash) {
    google.script.run
      .withFailureHandler(function(e){ btn.classList.remove('loading'); err.textContent=e.message||'Erro.'; err.style.display='block'; })
      .withSuccessHandler(function(r){
        btn.classList.remove('loading');
        if (!r || !r.success) { err.textContent=r?r.error:'Erro.'; err.style.display='block'; return; }
        usrCloseModal('modal-novo-usr');
        showToast('Usuário criado com sucesso!','success');
        _usrCarregar();
      })
      .usr_criar(App.session.token, { Nome:nome, Email:email, Perfil:perfil, SenhaHash:hash });
  });
}

function usrAlterarStatus(id, nome, ativar) {

  google.script.run
    .withFailureHandler(function(e){ showToast(e.message||'Erro.','error'); })
    .withSuccessHandler(function(r){
      if (!r || !r.success) { showToast(r?r.error:'Erro.','error'); return; }
      showToast('Usuário '+(ativar?'reativado':'desativado')+'!', ativar?'success':'warning');

function usrCloseModal(id) {
  var el = document.getElementById(id);

function usrTogglePwd(inputId, btn) {
  var input = document.getElementById(inputId);
  if (!input) return;
  var isText = input.type === 'text';
  input.type = isText ? 'password' : 'text';
  btn.innerHTML = isText
    ? '<i data-lucide="eye" style="width:18px;height:18px"></i>'
    : '<i data-lucide="eye-off" style="width:18px;height:18px"></i>';
  if (window.lucide) lucide.createIcons();
}

        ['todos','admin','secretaria','professor','inativos'].map(function(f){
          var a = UsrState.filtro===f?' active':'';
          return '<button class="usr-filter-btn'+a+'" id="ufbtn-'+f+'" onclick="usrSetFiltro(\''+f+'\')">'+f.charAt(0).toUpperCase()+f.slice(1)+'</button>';
        }).join('')+
      '</div>'+
      '<div class="usr-list" id="usr-list"></div>';
    if (window.lucide) lucide.createIcons();
    _usrRenderLista();

  } else if (tab === 'permissoes') {
    // Resetar estado para garantir leitura fresca do banco
    _permState = null;

    // Mostrar loading enquanto busca do banco
    var content = document.getElementById('usr-content');
    if (content) content.innerHTML = '<div style="text-align:center;padding:48px 24px;color:var(--text-muted)"><div class="loader-spinner" style="margin:0 auto 12px"></div><div style="font-size:13px">Carregando permissões…</div></div>';

    google.script.run
      .withFailureHandler(function() {
        // Falhou — renderiza com estado local/padrão
        _permInitState();
        usrRenderPermissoes();
        showToast('Usando configuração padrão (sem conexão).', 'warning');
      })
      .withSuccessHandler(function(r) {
        if (r && r.success && r.data) {
          // Sobrescreve estado com o que veio do banco
          _permState = r.data;
          // Atualizar cache de sessão
          try { sessionStorage.setItem('permMatrix', JSON.stringify(_permState)); } catch(e) {}
        } else {
          // Nada salvo no banco — usa padrão
          _permState = null;
          _permInitState();
        }
        usrRenderPermissoes();
      })
      .usr_listarPermissoes(App.session.token);
  }
}

// Inicializa estado mutável a partir dos dados base
function _permInitState() {
  if (_permState) return; // já inicializado
  _permState = {};
  _permModulos.forEach(function(mod) {
    mod.acoes.forEach(function(a) {
      _permState[a.id] = { admin: a.admin, secretaria: a.secretaria, professor: a.professor };
    });
  });
}

// Cicla entre os 3 estados: true → false → 'partial' → true
// (admin só alterna true/false — não faz sentido 'partial')
function _permCycle(current, perfil) {
  if (perfil === 'admin') return !current;
  if (current === true)    return false;
  if (current === false)   return 'partial';
  return true; // partial → true
}

function _permToggle(acaoId, perfil) {
  if (!_permState || !_permState[acaoId]) return;
  _permState[acaoId][perfil] = _permCycle(_permState[acaoId][perfil], perfil);
  // Re-renderizar só a célula (sem rebuildar a tabela toda)
  var el = document.getElementById('pcell-' + acaoId + '-' + perfil);
  if (el) el.innerHTML = _permCellHtml(acaoId, perfil);
  // Marcar dirty
  var saveBtn = document.getElementById('perm-save-btn');
  if (saveBtn) saveBtn.classList.add('dirty');
}

function _permCellHtml(acaoId, perfil) {
  var val = _permState[acaoId][perfil];
  var isAdmin = perfil === 'admin';
  // Admin não pode ser 'partial'
  if (isAdmin && val === 'partial') val = true;

  var svgCheck   = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
  var svgX       = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>';
  var svgMinus   = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="5" y1="12" x2="19" y2="12"/></svg>';

  var cls, icon, title;
  if (val === true)      { cls = 'yes';     icon = svgCheck; title = 'Permitido — clique para alterar'; }
  else if (val === false){ cls = 'no';      icon = svgX;     title = 'Sem acesso — clique para alterar'; }
  else                   { cls = 'partial'; icon = svgMinus; title = 'Parcial — clique para alterar'; }

  // Admin locked (não pode perder acesso)
  var locked = perfil === 'admin';
  if (locked) {
    return '<span class="perm-check yes" title="Admin sempre tem acesso">'+svgCheck+'</span>';
  }

  return '<button class="perm-toggle perm-check '+cls+'" '+
    'onclick="_permToggle(\''+acaoId+'\',\''+perfil+'\')" '+
    'id="pcell-'+acaoId+'-'+perfil+'" '+
    'title="'+title+'">'+icon+'</button>';
}

function _permSave() {
  var btn = document.getElementById('perm-save-btn');
  if (btn) { btn.disabled = true; btn.textContent = 'Salvando…'; }

  var matrizJson = JSON.stringify(_permState);

  google.script.run
    .withFailureHandler(function(e) {
      if (btn) { btn.disabled = false; btn.classList.add('dirty'); btn.textContent = 'Salvar alterações'; }
      showToast('Erro ao salvar: ' + (e.message || 'tente novamente.'), 'error');
    })
    .withSuccessHandler(function(r) {
      if (!r || !r.success) {
        if (btn) { btn.disabled = false; btn.classList.add('dirty'); btn.textContent = 'Salvar alterações'; }
        showToast(r ? r.error : 'Erro ao salvar.', 'error');
        return;
      }
      // Manter cópia local como cache de sessão
      try { sessionStorage.setItem('permMatrix', matrizJson); } catch(e) {}
      if (btn) { btn.disabled = false; btn.classList.remove('dirty'); btn.textContent = 'Salvo ✓'; }
      setTimeout(function() { if (btn) btn.textContent = 'Salvar alterações'; }, 2000);
      showToast('Permissões salvas com sucesso!', 'success');
    })
    .usr_salvarPermissoes(App.session.token, matrizJson);
}

function _permReset() {
  _permState = null;
  try { sessionStorage.removeItem('permMatrix'); } catch(e) {}
  _permInitState();
  usrRenderPermissoes();
  showToast('Matriz restaurada para os valores padrão.', 'info');
}

function usrToggleMobCfg(e) {
  if (e) e.stopPropagation();
  var dd = document.getElementById('usr-mob-cfg-dd');
  if (!dd) return;
  dd.classList.toggle('open');
  if (dd.classList.contains('open')) {
    document.addEventListener('click', function _closeMob(ev) {
      if (!dd.contains(ev.target)) {
        dd.classList.remove('open');
        document.removeEventListener('click', _closeMob);
      }
    });
  }
}

    dd.classList.remove('open');

});
