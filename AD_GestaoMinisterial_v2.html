<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0f1e21">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>AD Fonte da Salvação</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@0.383.0/dist/umd/lucide.min.js"></script>

<style>
/* ══════════════════════════════════════════════════
   DESIGN SYSTEM PREMIUM — AD FONTE DA SALVAÇÃO v2
══════════════════════════════════════════════════ */
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap');

/* ── TEMA ESCURO PREMIUM ── */
:root, [data-theme="dark"] {
  --teal:         #00C4B5;
  --teal-light:   #00ddd0;
  --teal-dark:    #009185;
  --teal-dim:     rgba(0,196,181,0.10);
  --teal-glow:    rgba(0,196,181,0.25);
  --teal-glow2:   rgba(0,196,181,0.08);
  --navy:         #0b1c24;
  --navy-mid:     #112230;
  --navy-light:   #1a3040;
  --gold:         #E2B65A;
  --gold-dim:     rgba(226,182,90,0.14);
  --red:          #f26d6d;
  --red-dim:      rgba(242,109,109,0.12);
  --green:        #44cc88;
  --green-dim:    rgba(68,204,136,0.12);
  --purple:       #a78bfa;
  --purple-dim:   rgba(167,139,250,0.12);
  --bg:           #060e12;
  --bg2:          #0a1820;
  --bg3:          #0f2230;
  --bg4:          #162e40;
  --bg5:          #1e3d54;
  --text:         #e8f4f5;
  --text-muted:   #6b9eaa;
  --text-dim:     #3a5e6e;
  --border:       rgba(0,196,181,0.10);
  --border-2:     rgba(0,196,181,0.18);
  --border-focus: rgba(0,196,181,0.50);
  --shadow-sm:    0 2px 12px rgba(0,0,0,0.4);
  --shadow:       0 4px 24px rgba(0,0,0,0.55);
  --shadow-lg:    0 8px 56px rgba(0,0,0,0.70);
  --shadow-teal:  0 4px 32px rgba(0,196,181,0.22);
  --shadow-teal2: 0 0 0 1px rgba(0,196,181,0.15), 0 4px 32px rgba(0,196,181,0.15);
  --logo-filter:  drop-shadow(0 0 12px rgba(0,196,181,0.3));
  --topnav-bg:    rgba(6,14,18,0.90);
  --glass-bg:     rgba(10,24,32,0.70);
}

/* ── TEMA CLARO ── */
[data-theme="light"] {
  --teal:         #007b6e;
  --teal-light:   #00a99c;
  --teal-dark:    #005e54;
  --teal-dim:     rgba(0,123,110,0.09);
  --teal-glow:    rgba(0,123,110,0.20);
  --teal-glow2:   rgba(0,123,110,0.06);
  --navy:         #f0f6f7;
  --navy-mid:     #e4eff1;
  --navy-light:   #d5e6e9;
  --gold:         #9b6e0a;
  --gold-dim:     rgba(155,110,10,0.10);
  --red:          #c0392b;
  --red-dim:      rgba(192,57,43,0.08);
  --green:        #1a7a44;
  --green-dim:    rgba(26,122,68,0.10);
  --purple:       #7c3aed;
  --purple-dim:   rgba(124,58,237,0.10);
  --bg:           #eef5f6;
  --bg2:          #ffffff;
  --bg3:          #e6f0f2;
  --bg4:          #d4e5e8;
  --bg5:          #c2d8dc;
  --text:         #061418;
  --text-muted:   #3a6470;
  --text-dim:     #7a9ea8;
  --border:       rgba(0,0,0,0.08);
  --border-2:     rgba(0,123,110,0.18);
  --border-focus: rgba(0,123,110,0.40);
  --shadow-sm:    0 2px 8px rgba(0,0,0,0.07);
  --shadow:       0 4px 20px rgba(0,0,0,0.10);
  --shadow-lg:    0 8px 40px rgba(0,0,0,0.14);
  --shadow-teal:  0 4px 24px rgba(0,123,110,0.14);
  --shadow-teal2: 0 0 0 1px rgba(0,123,110,0.10), 0 4px 20px rgba(0,123,110,0.10);
  --logo-filter:  none;
  --topnav-bg:    rgba(238,245,246,0.92);
  --glass-bg:     rgba(255,255,255,0.80);
}

:root {
  --radius-sm:    8px;
  --radius:       14px;
  --radius-lg:    20px;
  --radius-xl:    28px;
  --ease:         cubic-bezier(0.25,0.46,0.45,0.94);
  --ease-spring:  cubic-bezier(0.34,1.56,0.64,1);
}

/* ── LOGO ── */
.app-logo-img {
  display: block;
  filter: var(--logo-filter);
  transition: filter 0.3s var(--ease);
}

body { transition: background 0.3s var(--ease), color 0.3s var(--ease); }

/* ── RESET ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html {
  font-size: 16px;
  -webkit-text-size-adjust: 100%;
  height: 100%;
  scroll-behavior: smooth;
}

body {
  font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
  min-height: 100vh;
  min-height: 100dvh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* Noise texture overlay para depth */
body::after {
  content: '';
  position: fixed; inset: 0; z-index: 0;
  background: radial-gradient(ellipse 80% 50% at 50% -10%, rgba(0,196,181,0.08) 0%, transparent 65%);
  pointer-events: none;
}
[data-theme="light"] body::after { display: none; }

/* ── SCROLLBAR PREMIUM ── */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 10px; }
::-webkit-scrollbar-thumb:hover { background: var(--teal-dark); }

/* ── SELEÇÃO ── */
::selection { background: var(--teal-glow); color: var(--text); }

/* ── APP LOADER ── */
#app-loader {
  position: fixed; inset: 0;
  background: var(--bg);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 24px;
  z-index: 9999;
  transition: opacity 0.5s var(--ease), visibility 0.5s;
}
#app-loader.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

.loader-logo {
  width: 72px; height: 72px;
  border-radius: 20px;
  background: var(--teal-dim);
  border: 1.5px solid rgba(0,196,181,0.25);
  display: flex; align-items: center; justify-content: center;
  animation: logoPulse 2.4s ease-in-out infinite;
  box-shadow: 0 0 0 0 var(--teal-glow);
}
@keyframes logoPulse {
  0%,100% { box-shadow: 0 0 0 0 var(--teal-glow), 0 0 20px rgba(0,196,181,0.08); }
  50%      { box-shadow: 0 0 0 16px transparent, 0 0 40px rgba(0,196,181,0.15); }
}

.loader-spinner {
  width: 28px; height: 28px;
  border: 2.5px solid var(--border);
  border-top-color: var(--teal);
  border-radius: 50%;
  animation: spin 0.75s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.loader-text {
  font-size: 12px; color: var(--text-dim);
  font-family: 'DM Mono', monospace;
  letter-spacing: 0.5px;
}

/* ── APP WRAPPER ── */
#app {
  min-height: 100vh; min-height: 100dvh;
  opacity: 0;
  transition: opacity 0.35s var(--ease);
  position: relative; z-index: 1;
}
#app.ready { opacity: 1; }

/* ── TOAST NOTIFICATIONS ── */
#toast-container {
  position: fixed;
  bottom: 24px; right: 24px;
  display: flex; flex-direction: column; gap: 10px;
  z-index: 10000; pointer-events: none;
}
@media (max-width: 480px) {
  #toast-container { bottom: 90px; right: 16px; left: 16px; }
}
.toast {
  background: var(--bg3);
  border: 1px solid var(--border-2);
  border-radius: var(--radius);
  padding: 14px 18px;
  font-size: 13px; color: var(--text);
  display: flex; align-items: center; gap: 10px;
  box-shadow: var(--shadow-lg);
  pointer-events: auto;
  animation: toastIn 0.4s var(--ease-spring);
  max-width: 360px;
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
}
.toast.success { border-left: 3px solid var(--green); }
.toast.error   { border-left: 3px solid var(--red);   }
.toast.info    { border-left: 3px solid var(--teal);  }
.toast.warning { border-left: 3px solid var(--gold);  }
.toast-icon { font-size: 16px; flex-shrink: 0; }
.toast-msg  { flex: 1; line-height: 1.4; }
.toast-close {
  background: none; border: none; cursor: pointer;
  color: var(--text-muted); font-size: 18px; padding: 0;
  line-height: 1; flex-shrink: 0; opacity: 0.6;
  transition: opacity 0.15s;
}
.toast-close:hover { opacity: 1; }
@keyframes toastIn {
  from { opacity: 0; transform: translateX(20px) scale(0.94); }
  to   { opacity: 1; transform: translateX(0) scale(1); }
}
.toast.hiding {
  animation: toastOut 0.25s var(--ease) forwards;
}
@keyframes toastOut {
  to { opacity: 0; transform: translateX(16px) scale(0.94); }
}

/* ── MODAL BASE ── */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.65);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  display: flex; align-items: flex-end; justify-content: center;
  padding: 0;
  z-index: 5000;
  opacity: 0; visibility: hidden;
  transition: opacity 0.3s var(--ease), visibility 0.3s;
}
@media (min-width: 600px) {
  .modal-overlay { align-items: center; padding: 16px; }
}
.modal-overlay.open { opacity: 1; visibility: visible; }

.modal-box {
  background: var(--bg2);
  border: 1px solid var(--border-2);
  border-radius: var(--radius-xl) var(--radius-xl) 0 0;
  width: 100%; max-width: 520px;
  max-height: 92vh;
  overflow-y: auto;
  padding: 28px 24px 32px;
  box-shadow: var(--shadow-lg), 0 -8px 48px rgba(0,0,0,0.5);
  transform: translateY(32px);
  transition: transform 0.35s var(--ease-spring);
  position: relative;
}
.modal-box::before {
  content: '';
  position: absolute; top: 0; left: 50%; transform: translateX(-50%);
  width: 40px; height: 4px; border-radius: 2px;
  background: var(--border-2); margin-top: 12px;
}
@media (min-width: 600px) {
  .modal-box {
    border-radius: var(--radius-xl);
    transform: translateY(20px) scale(0.97);
  }
  .modal-box::before { display: none; }
}
.modal-overlay.open .modal-box {
  transform: translateY(0) scale(1);
}

/* Linha superior de acento no modal */
.modal-box::after {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, transparent, var(--teal), transparent);
  border-radius: var(--radius-xl) var(--radius-xl) 0 0;
}

/* ── BOTÕES ── */
.btn {
  display: inline-flex; align-items: center; justify-content: center;
  gap: 8px;
  height: 44px; min-width: 44px;
  padding: 0 20px;
  border: none; border-radius: var(--radius);
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 14px; font-weight: 700;
  cursor: pointer;
  transition: all 0.2s var(--ease);
  text-decoration: none;
  white-space: nowrap;
  position: relative; overflow: hidden;
  letter-spacing: 0.1px;
}
.btn::after {
  content: '';
  position: absolute; inset: 0;
  background: rgba(255,255,255,0);
  transition: background 0.15s;
  border-radius: inherit;
}
.btn:hover::after { background: rgba(255,255,255,0.05); }
.btn:disabled { opacity: 0.45; cursor: not-allowed; }
.btn:not(:disabled):active { transform: scale(0.97); }

.btn-primary {
  background: linear-gradient(135deg, var(--teal), var(--teal-dark));
  color: #fff;
  box-shadow: var(--shadow-teal);
}
.btn-primary:not(:disabled):hover {
  box-shadow: 0 6px 32px rgba(0,196,181,0.40);
  transform: translateY(-1px);
}

.btn-secondary {
  background: var(--bg3);
  color: var(--text);
  border: 1px solid var(--border-2);
}
.btn-secondary:not(:disabled):hover {
  background: var(--bg4);
  border-color: rgba(0,196,181,0.25);
}

.btn-ghost {
  background: transparent;
  color: var(--text-muted);
  border: 1px solid transparent;
}
.btn-ghost:not(:disabled):hover {
  background: var(--bg3);
  color: var(--text);
  border-color: var(--border);
}

.btn-danger {
  background: var(--red-dim);
  color: var(--red);
  border: 1px solid rgba(242,109,109,0.2);
}
.btn-danger:not(:disabled):hover {
  background: var(--red); color: #fff;
}

.btn-full { width: 100%; }
.btn-lg { height: 52px; padding: 0 28px; font-size: 15px; border-radius: var(--radius-lg); }
.btn-sm { height: 36px; padding: 0 14px; font-size: 12px; }

/* Spinner em botão */
.btn .btn-spinner {
  width: 16px; height: 16px;
  border: 2px solid rgba(255,255,255,0.3);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  display: none;
}
.btn.loading .btn-spinner { display: block; }
.btn.loading .btn-text    { display: none;  }

/* ── INPUTS PREMIUM ── */
.field {
  display: flex; flex-direction: column; gap: 6px;
  margin-bottom: 16px;
}
.field label {
  font-size: 11px; font-weight: 700;
  letter-spacing: 0.7px; text-transform: uppercase;
  color: var(--text-muted);
}
.field .input-wrap { position: relative; }
.field .input-wrap .input-icon {
  position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
  color: var(--text-dim);
  display: flex; align-items: center;
  pointer-events: none;
}
.field .input-wrap .input-icon.right {
  left: auto; right: 14px;
  pointer-events: auto; cursor: pointer;
}

input[type="text"],
input[type="email"],
input[type="password"],
input[type="tel"],
input[type="date"],
input[type="number"],
select, textarea {
  width: 100%; height: 50px;
  background: var(--bg3);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 15px; padding: 0 16px;
  transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
  appearance: none; -webkit-appearance: none;
}
input.has-icon-left  { padding-left: 46px; }
input.has-icon-right { padding-right: 46px; }
input:focus, select:focus, textarea:focus {
  outline: none;
  border-color: var(--teal);
  background: var(--bg4);
  box-shadow: 0 0 0 3px var(--teal-dim);
}
input::placeholder { color: var(--text-dim); }
textarea {
  height: auto; min-height: 100px; padding: 14px 16px; resize: vertical;
}

.field .field-error { font-size: 12px; color: var(--red); display: none; }
.field.has-error input,
.field.has-error select { border-color: var(--red); }
.field.has-error .field-error { display: block; }

/* ── CARDS ── */
.card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 24px;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  transition: border-color 0.2s, box-shadow 0.2s;
}
.card:hover {
  border-color: var(--border-2);
  box-shadow: var(--shadow-teal2);
}

/* ── BADGE ── */
.badge {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 3px 10px; border-radius: 100px;
  font-size: 11px; font-weight: 700;
  font-family: 'DM Mono', monospace; letter-spacing: 0.3px;
}
.badge-teal   { background: var(--teal-dim);   color: var(--teal);  border: 1px solid rgba(0,196,181,0.2); }
.badge-gold   { background: var(--gold-dim);   color: var(--gold);  border: 1px solid rgba(226,182,90,0.2); }
.badge-green  { background: var(--green-dim);  color: var(--green); border: 1px solid rgba(68,204,136,0.2); }
.badge-red    { background: var(--red-dim);    color: var(--red);   border: 1px solid rgba(242,109,109,0.2); }
.badge-muted  { background: var(--bg4);        color: var(--text-muted); }
.badge-purple { background: var(--purple-dim); color: var(--purple); border: 1px solid rgba(167,139,250,0.2); }

/* ── DIVIDER ── */
.divider { border: none; border-top: 1px solid var(--border); margin: 20px 0; }

/* ── AVATAR ── */
.avatar {
  width: 40px; height: 40px; border-radius: 50%;
  background: linear-gradient(135deg, var(--teal-dim), rgba(0,196,181,0.2));
  border: 2px solid rgba(0,196,181,0.25);
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 14px; color: var(--teal);
  flex-shrink: 0;
  font-family: 'Plus Jakarta Sans', sans-serif;
  transition: border-color 0.2s;
}
.avatar-lg { width: 52px; height: 52px; font-size: 18px; }
.avatar-xl { width: 72px; height: 72px; font-size: 24px; }

/* ── EMPTY STATE ── */
.empty-state {
  display: flex; flex-direction: column; align-items: center;
  padding: 56px 24px; text-align: center; gap: 12px;
}
.empty-state-icon { font-size: 44px; opacity: 0.35; }
.empty-state-title { font-size: 16px; font-weight: 800; color: var(--text); }
.empty-state-desc  { font-size: 13px; color: var(--text-muted); max-width: 280px; line-height: 1.5; }

/* ── VIEW TRANSITION ── */
.view-container { animation: viewIn 0.35s var(--ease); }
@keyframes viewIn {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── SKELETON LOADING ── */
.skeleton {
  background: linear-gradient(90deg, var(--bg3) 25%, var(--bg4) 50%, var(--bg3) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.6s infinite;
  border-radius: var(--radius-sm);
}
@keyframes shimmer { to { background-position: -200% 0; } }

/* ── GLOW LINE (topo de seções) ── */
.glow-line {
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--teal-glow), transparent);
  margin: 0;
}
</style>
</head>
<body>

<!-- ── LOADER ── -->
<div id="app-loader">
  <div class="loader-logo"><img id="loader-logo-img" alt="Logo AD" class="app-logo-img" style="width:40px;height:40px;object-fit:contain"></div>
  <div class="loader-spinner"></div>
  <p class="loader-text">Carregando plataforma…</p>
</div>

<!-- ── APP ROOT ── -->
<div id="app"></div>

<!-- ── TOAST CONTAINER ── -->
<div id="toast-container" aria-live="polite"></div>

<script>
// ══════════════════════════════════════════════════════════
//  APP SHELL · Roteamento, Estado Global, Utilitários UI
//  ATENÇÃO: Zero backticks — ES5 only
// ══════════════════════════════════════════════════════════

// ── ESTADO GLOBAL ────────────────────────────────────────
var App = {
  session: null,        // { token, nome, email, perfil, primeiroAcesso }
  currentView: null,
  TOKEN_KEY: 'ad_sess_token'
};

// ── ROTEAMENTO ───────────────────────────────────────────
var VIEWS = {
  login:           'renderLogin',
  'primeiro-acesso': 'renderPrimeiroAcesso',
  'recuperar-senha': 'renderRecuperarSenha',
  home:            'renderHome',
  usuarios:        'renderUsuarios',
  'escola-dominical': 'renderEscolaDominical'
};

function navigateTo(view, params) {
  App.currentView = view;

  // Views que requerem autenticação
  var authRequired = ['home', 'usuarios', 'escola-dominical'];
  if (authRequired.indexOf(view) !== -1 && !App.session) {
    navigateTo('login');
    return;
  }

  var fn = VIEWS[view];
  if (!fn || typeof window[fn] !== 'function') {
    showToast('View "' + view + '" não encontrada.', 'error');
    return;
  }
  window[fn](params);
}

// ── RENDER HELPER ────────────────────────────────────────
function renderView(html) {
  var app = document.getElementById('app');
  app.innerHTML = '<div class="view-container">' + html + '</div>';
  applyLogoSrc();
  if (window.lucide) lucide.createIcons();
}

// ── SESSION STORAGE ──────────────────────────────────────
function saveSession(sessao) {
  App.session = sessao;
  try { sessionStorage.setItem(App.TOKEN_KEY, sessao.token); } catch(e) {}
}

function clearSession() {
  App.session = null;
  try { sessionStorage.removeItem(App.TOKEN_KEY); } catch(e) {}
}

function getSavedToken() {
  try { return sessionStorage.getItem(App.TOKEN_KEY); } catch(e) { return null; }
}

// ── TOAST ─────────────────────────────────────────────────
function showToast(msg, type, duration) {
  type     = type     || 'info';
  duration = duration || 4000;

  var icons = { success: '✓', error: '✕', info: 'ℹ', warning: '!' };
  var container = document.getElementById('toast-container');

  var el = document.createElement('div');
  el.className = 'toast ' + type;
  el.innerHTML =
    '<span class="toast-icon">' + (icons[type] || 'ℹ') + '</span>' +
    '<span class="toast-msg">' + msg + '</span>' +
    '<button class="toast-close" onclick="dismissToast(this.parentElement)">×</button>';

  container.appendChild(el);

  setTimeout(function() { dismissToast(el); }, duration);
}

function dismissToast(el) {
  if (!el || !el.parentElement) return;
  el.classList.add('hiding');
  setTimeout(function() { if (el.parentElement) el.parentElement.removeChild(el); }, 250);
}

// ── BTN LOADING ──────────────────────────────────────────
function setBtnLoading(btn, loading) {
  if (!btn) return;
  if (loading) {
    btn.disabled = true;
    btn.classList.add('loading');
  } else {
    btn.disabled = false;
    btn.classList.remove('loading');
  }
}

// ── SHA-256 CLIENT-SIDE ──────────────────────────────────
function sha256(str) {
  var msgBuffer = new TextEncoder().encode(str);
  return crypto.subtle.digest('SHA-256', msgBuffer).then(function(hashBuffer) {
    var hashArray = Array.from(new Uint8Array(hashBuffer));
    return hashArray.map(function(b) {
      var h = b.toString(16);
      return h.length === 1 ? '0' + h : h;
    }).join('');
  });
}

// ── AVATAR INICIAIS ──────────────────────────────────────
function getInitials(nome) {
  if (!nome) return '?';
  var parts = nome.trim().split(' ');
  if (parts.length === 1) return parts[0][0].toUpperCase();
  return (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
}

// ── VALIDAÇÃO ────────────────────────────────────────────
function validateEmail(email) {
  return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
}

function validatePassword(pwd) {
  // Min 8 chars, 1 maiúscula, 1 número, 1 especial
  return pwd.length >= 8 &&
         /[A-Z]/.test(pwd) &&
         /[0-9]/.test(pwd) &&
         /[^A-Za-z0-9]/.test(pwd);
}

function getPasswordStrength(pwd) {
  var score = 0;
  if (pwd.length >= 8)           score++;
  if (pwd.length >= 12)          score++;
  if (/[A-Z]/.test(pwd))         score++;
  if (/[0-9]/.test(pwd))         score++;
  if (/[^A-Za-z0-9]/.test(pwd))  score++;
  if (score <= 1) return { level: 'weak',   label: 'Fraca',  color: '#e05c5c' };
  if (score <= 3) return { level: 'medium', label: 'Média',  color: '#C9A84C' };
  return                { level: 'strong', label: 'Forte',  color: '#3bba79' };
}

// ── FORMATAR DATA BR ──────────────────────────────────────
function formatDateBR(dateStr) {
  if (!dateStr) return '';
  var d = new Date(dateStr);
  if (isNaN(d)) return dateStr;
  return d.toLocaleDateString('pt-BR');
}

// ── INICIALIZAÇÃO ─────────────────────────────────────────
function initApp() {
  var savedToken = getSavedToken();

  if (savedToken) {
    google.script.run
      .withSuccessHandler(function(res) {
        if (res.success) {
          App.session = res.data;
          // Checar primeiro acesso
          if (res.data.primeiroAcesso) {
            navigateTo('primeiro-acesso');
          } else {
            navigateTo('home');
          }
        } else {
          clearSession();
          navigateTo('login');
        }
        hideLoader();
        document.getElementById('app').classList.add('ready');
      })
      .withFailureHandler(function() {
        clearSession();
        navigateTo('login');
        hideLoader();
        document.getElementById('app').classList.add('ready');
      })
      .getSession(savedToken);
  } else {
    // Verificar se há token de recuperação na URL
    var urlParams = new URLSearchParams(window.location.search);
    var recovToken = urlParams.get('token');
    var view = urlParams.get('view');

    if (view === 'recuperar-senha' && recovToken) {
      navigateTo('recuperar-senha', { token: recovToken });
    } else {
      navigateTo('login');
    }
    hideLoader();
    document.getElementById('app').classList.add('ready');
  }
}

function hideLoader() {
  var loader = document.getElementById('app-loader');
  if (loader) loader.classList.add('hidden');
}

function applyLogoSrc() {
  var imgs = document.querySelectorAll(".app-logo-img");
  imgs.forEach(function(img) { img.src = LOGO_SRC; });
}

// ── TEMA ─────────────────────────────────────────────────
var THEME_KEY = 'ad_theme';

function initTheme() {
  var saved = localStorage.getItem(THEME_KEY) || 'dark';
  document.documentElement.setAttribute('data-theme', saved);
  applyLogoSrc();
}

function toggleTheme() {
  var current = document.documentElement.getAttribute('data-theme') || 'dark';
  var next = current === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem(THEME_KEY, next);
  // Atualizar icone do botao de tema em toda a UI
  var btns = document.querySelectorAll('.theme-toggle-btn');
  btns.forEach(function(btn) {
    btn.innerHTML = next === 'dark'
      ? '<i data-lucide="sun" style="width:18px;height:18px"></i>'
      : '<i data-lucide="moon" style="width:18px;height:18px"></i>';
    if (window.lucide) lucide.createIcons();
  });
}

// ── START ─────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', function() {
  initTheme();
  // Pequeno delay para garantir fontes carregadas
  setTimeout(initApp, 300);
});
</script>

<style>
/* ══════════════════════════════════════════════════
   LOGIN SCREEN PREMIUM
══════════════════════════════════════════════════ */
#view-login {
  min-height: 100vh; min-height: 100dvh;
  display: flex; flex-direction: column;
}

/* ── FUNDO COM EFEITO ── */
.login-bg {
  position: fixed; inset: 0; z-index: 0;
  background:
    radial-gradient(ellipse 80% 60% at 50% -10%, rgba(0,196,181,0.16) 0%, transparent 65%),
    radial-gradient(ellipse 60% 50% at 100% 100%, rgba(10,28,38,0.8) 0%, transparent 70%),
    var(--bg);
  pointer-events: none;
}
.login-bg-grid {
  position: fixed; inset: 0; z-index: 0;
  background-image:
    linear-gradient(rgba(0,196,181,0.035) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,196,181,0.035) 1px, transparent 1px);
  background-size: 52px 52px;
  pointer-events: none;
  mask-image: radial-gradient(ellipse 80% 55% at 50% 0%, black 0%, transparent 80%);
  -webkit-mask-image: radial-gradient(ellipse 80% 55% at 50% 0%, black 0%, transparent 80%);
}

/* ── WRAPPER ── */
.login-wrapper {
  position: relative; z-index: 1; flex: 1;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 24px 20px 48px; gap: 0;
}

/* ── CABEÇALHO ── */
.login-header { text-align: center; margin-bottom: 36px; }
.login-logo-ring {
  position: relative; width: 88px; height: 88px; margin: 0 auto 24px;
}
.login-logo-bg {
  position: absolute; inset: 0; border-radius: 50%;
  background: var(--teal-dim);
  border: 1.5px solid rgba(0,196,181,0.22);
  animation: ringPulse 3s ease-in-out infinite;

<script>
// ═══════════════════════════════════════════════════
//  LOGIN VIEW

function renderLogin() {
  renderView(
    '<div id="view-login">' +
      '<div class="login-bg"></div>' +
      '<div class="login-bg-grid"></div>' +
      '<div class="login-wrapper">' +

        /* ── HEADER ── */
        '<div class="login-header">' +
          '<div class="login-logo-ring">' +
            '<div class="login-logo-bg"></div>' +
            '<div class="login-logo-icon">' +
              '<img src="" alt="Logo AD" class="app-logo-img" style="width:56px;height:56px;object-fit:contain">' +
            '</div>' +
          '</div>' +
          '<h1 class="login-church-name">AD Fonte da Salvação</h1>' +
          '<p class="login-church-sub">Plataforma de Gestão Ministerial</p>' +
        '</div>' +

        /* ── CARD ── */
        '<div class="login-card">' +
          '<h2 class="login-card-title">Entrar na plataforma</h2>' +
          '<p class="login-card-sub">Acesse com suas credenciais</p>' +

          /* Erro inline */
          '<div class="login-error-msg" id="login-error">' +
            '<span>⚠</span>' +
            '<span id="login-error-text"></span>' +
          '</div>' +

          /* Campo email */
          '<div class="field">' +
            '<label for="login-email">E-mail</label>' +
            '<div class="input-wrap">' +
              '<span class="input-icon"><i data-lucide="mail" style="width:18px;height:18px"></i></span>' +
              '<input type="email" id="login-email" class="has-icon-left" ' +
                'placeholder="seu@email.com" autocomplete="email" autofocus>' +
            '</div>' +
            '<span class="field-error">E-mail inválido.</span>' +
          '</div>' +

          /* Campo senha */
          '<div class="field">' +
            '<label for="login-senha">Senha</label>' +
            '<div class="input-wrap" style="position:relative">' +
              '<span class="input-icon"><i data-lucide="lock" style="width:18px;height:18px"></i></span>' +
              '<input type="password" id="login-senha" class="has-icon-left has-icon-right" ' +
                'placeholder="••••••••" autocomplete="current-password">' +
              '<button type="button" class="pwd-toggle-btn" onclick="togglePwdVisibility(\'login-senha\', this)" tabindex="-1">' +
                '<i data-lucide="eye" style="width:18px;height:18px"></i>' +
              '</button>' +
            '</div>' +
          '</div>' +

          /* Esqueci senha */
          '<div class="login-forgot-row">' +
            '<button class="forgot-link" onclick="navigateTo(\'recuperar-senha\')">Esqueci minha senha</button>' +
          '</div>' +

          /* Botão entrar */
          '<button class="btn btn-primary btn-full btn-lg" id="btn-login" onclick="handleLogin()">' +
            '<span class="btn-spinner"></span>' +
            '<span class="btn-text">Entrar</span>' +
          '</button>' +

        '</div>' + /* /login-card */

        '<div class="login-footer" style="display:flex;align-items:center;justify-content:center;gap:12px">' +
          '<span>AD Fonte da Salvação · Sistema de Gestão v1.0</span>' +
          '<button class="theme-toggle-btn btn btn-ghost btn-sm" onclick="toggleTheme()" style="width:32px;height:32px;padding:0;border-radius:8px" title="Alternar tema">' +
            '<i data-lucide="moon" style="width:16px;height:16px"></i>' +
          '</button>' +
        '</div>' +

      '</div>' + /* /login-wrapper */
    '</div>'   /* /view-login */
  );

  // Enter para submeter
  document.getElementById('login-email').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') document.getElementById('login-senha').focus();
  });
  document.getElementById('login-senha').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') handleLogin();
  });
}

function handleLogin() {
  var emailEl = document.getElementById('login-email');
  var senhaEl = document.getElementById('login-senha');
  var btn     = document.getElementById('btn-login');
  var errBox  = document.getElementById('login-error');
  var errTxt  = document.getElementById('login-error-text');

  var email = emailEl.value.trim();
  var senha = senhaEl.value;

  // Ocultar erro anterior
  errBox.classList.remove('visible');

  // Validações client
  var ok = true;
  var emailField = emailEl.closest('.field');
  var senhaField = senhaEl.closest('.field');
  emailField.classList.remove('has-error');
  senhaField.classList.remove('has-error');

  if (!validateEmail(email)) {
    emailField.classList.add('has-error');
    ok = false;
  }
  if (!senha) {
    senhaField.classList.add('has-error');
    ok = false;
  }
  if (!ok) return;

  setBtnLoading(btn, true);

  sha256(senha).then(function(hash) {
    google.script.run
      .withSuccessHandler(function(res) {
        setBtnLoading(btn, false);
        if (res.success) {
          saveSession(res.data);
          if (res.data.primeiroAcesso) {
            navigateTo('primeiro-acesso');
          } else {
            navigateTo('home');
          }
        } else {
          errTxt.textContent = res.error;
          errBox.classList.add('visible');
          senhaEl.value = '';
          senhaEl.focus();
        }
      })
      .withFailureHandler(function(e) {
        setBtnLoading(btn, false);
        errTxt.textContent = 'Erro de conexão. Tente novamente.';
        errBox.classList.add('visible');
      })
      .login(email, hash);
  });
}

function togglePwdVisibility(inputId, btn) {
  var input = document.getElementById(inputId);
  if (!input) return;
  var isHidden = input.type === 'password';
  input.type = isHidden ? 'text' : 'password';
  btn.innerHTML = isHidden
    ? '<i data-lucide="eye-off" style="width:18px;height:18px"></i>'
    : '<i data-lucide="eye" style="width:18px;height:18px"></i>';
  if (window.lucide) lucide.createIcons();
}
</script>

<script>
// ═══════════════════════════════════════════════════
//  PRIMEIRO ACESSO VIEW
// ═══════════════════════════════════════════════════

function renderPrimeiroAcesso() {
  if (!App.session) { navigateTo('login'); return; }

  var nome = App.session.nome || 'Usuário';

  renderView(
    '<div id="view-primeiro-acesso">' +
      '<div class="login-bg"></div>' +
      '<div class="login-bg-grid"></div>' +
      '<div class="pa-wrapper">' +
        '<div class="pa-card">' +

          '<div class="pa-badge"><i data-lucide="alert-triangle" style="width:12px;height:12px"></i> Primeiro Acesso</div>' +
          '<h2 class="pa-title">Defina sua senha</h2>' +
          '<p class="pa-sub">Olá, <strong>' + nome + '</strong>! Por segurança, defina sua senha antes de continuar.</p>' +

          '<div class="pa-info-box">' +
            '<span>🔒</span>' +
            '<span>Sua senha deve ter pelo menos 8 caracteres, incluindo letras maiúsculas, números e um caractere especial.</span>' +
          '</div>' +

          /* Erro inline */
          '<div class="login-error-msg" id="pa-error">' +
            '<span>⚠</span><span id="pa-error-text"></span>' +
          '</div>' +

          /* Nova senha */
          '<div class="field">' +
            '<label for="pa-nova">Nova Senha</label>' +
            '<div class="input-wrap">' +
              '<span class="input-icon"><i data-lucide="lock" style="width:18px;height:18px"></i></span>' +
              '<input type="password" id="pa-nova" class="has-icon-left has-icon-right" ' +
                'placeholder="Mínimo 8 caracteres" autocomplete="new-password" ' +
                'oninput="paCheckStrength()">' +
              '<button type="button" class="pwd-toggle-btn" onclick="togglePwdVisibility(\'pa-nova\', this)" tabindex="-1">' +
                '<i data-lucide="eye" style="width:18px;height:18px"></i>' +
              '</button>' +
            '</div>' +

            /* Barra de força */
            '<div class="pwd-strength" id="pa-strength">' +
              '<div class="pwd-strength-bar">' +
                '<div class="pwd-strength-fill" id="pa-strength-fill" style="width:0%"></div>' +
              '</div>' +
              '<span class="pwd-strength-label" id="pa-strength-label"></span>' +
            '</div>' +

            /* Regras */
            '<ul class="pwd-rules" id="pa-rules">' +
              '<li id="rule-len">Mínimo de 8 caracteres</li>' +
              '<li id="rule-upper">Uma letra maiúscula</li>' +
              '<li id="rule-num">Um número</li>' +
              '<li id="rule-special">Um caractere especial (!@#$...)</li>' +
            '</ul>' +
          '</div>' +

          /* Confirmar senha */
          '<div class="field">' +
            '<label for="pa-confirma">Confirmar Nova Senha</label>' +
            '<div class="input-wrap">' +
              '<span class="input-icon"><i data-lucide="lock-keyhole" style="width:18px;height:18px"></i></span>' +
              '<input type="password" id="pa-confirma" class="has-icon-left has-icon-right" ' +
                'placeholder="Repita a senha" autocomplete="new-password">' +
              '<button type="button" class="pwd-toggle-btn" onclick="togglePwdVisibility(\'pa-confirma\', this)" tabindex="-1">' +
                '<i data-lucide="eye" style="width:18px;height:18px"></i>' +
              '</button>' +
            '</div>' +
            '<span class="field-error">As senhas não conferem.</span>' +
          '</div>' +

          '<button class="btn btn-primary btn-full btn-lg" id="btn-pa" onclick="handlePrimeiroAcesso()">' +
            '<span class="btn-spinner"></span>' +
            '<span class="btn-text">Definir senha e entrar</span>' +
          '</button>' +

        '</div>' +
      '</div>' +
    '</div>'
  );

  document.getElementById('pa-strength').classList.add('visible');
}

function paCheckStrength() {
  var pwd    = document.getElementById('pa-nova').value;
  var fill   = document.getElementById('pa-strength-fill');
  var label  = document.getElementById('pa-strength-label');

  // Regras
  var rLen    = pwd.length >= 8;
  var rUpper  = /[A-Z]/.test(pwd);
  var rNum    = /[0-9]/.test(pwd);
  var rSpec   = /[^A-Za-z0-9]/.test(pwd);

  toggleRule('rule-len',    rLen);
  toggleRule('rule-upper',  rUpper);
  toggleRule('rule-num',    rNum);
  toggleRule('rule-special',rSpec);

  var s = getPasswordStrength(pwd);
  var pcts = { weak: '25%', medium: '65%', strong: '100%' };
  fill.style.width      = pwd.length ? pcts[s.level] : '0%';
  fill.style.background = s.color;
  label.textContent     = pwd.length ? ('Senha ' + s.label) : '';
  label.style.color     = s.color;
}

function toggleRule(id, ok) {
  var el = document.getElementById(id);
  if (!el) return;
  if (ok) el.classList.add('ok'); else el.classList.remove('ok');
}

function handlePrimeiroAcesso() {
  var novaEl     = document.getElementById('pa-nova');
  var confirmEl  = document.getElementById('pa-confirma');
  var btn        = document.getElementById('btn-pa');
  var errBox     = document.getElementById('pa-error');
  var errTxt     = document.getElementById('pa-error-text');

  errBox.classList.remove('visible');
  confirmEl.closest('.field').classList.remove('has-error');

  var nova    = novaEl.value;
  var confirma = confirmEl.value;

  if (!validatePassword(nova)) {
    errTxt.textContent = 'A senha não atende aos requisitos mínimos.';
    errBox.classList.add('visible');
    return;
  }
  if (nova !== confirma) {
    confirmEl.closest('.field').classList.add('has-error');
    return;
  }

  setBtnLoading(btn, true);

  sha256(nova).then(function(hash) {
    google.script.run
      .withSuccessHandler(function(res) {
        setBtnLoading(btn, false);
        if (res.success) {
          App.session.primeiroAcesso = false;
          showToast('Senha definida com sucesso! Bem-vindo(a) 🎉', 'success');
          navigateTo('home');
        } else {
          errTxt.textContent = res.error;
          errBox.classList.add('visible');
        }
      })
      .withFailureHandler(function() {
        setBtnLoading(btn, false);
        errTxt.textContent = 'Erro de conexão. Tente novamente.';
        errBox.classList.add('visible');
      })
      .definirPrimeiraSenha(App.session.token, hash);
  });
}
</script>

function _renderSolicitarEmail() {

          '</button>' +

          '<div class="pa-badge" style="background:rgba(138,180,248,0.1);border-color:rgba(138,180,248,0.25);color:#8ab4f8">🔑 Recuperação de Senha</div>' +

          '<div class="login-error-msg" id="rec-error">' +

          '</div>' +

          /* Sucesso */
          '<div id="rec-success" style="display:none">' +
            '<div style="text-align:center;padding:24px 0">' +
              '<div style="font-size:48px;margin-bottom:16px">📧</div>' +
              '<h3 style="font-size:17px;font-weight:700;color:#fff;margin-bottom:8px">E-mail enviado!</h3>' +
              '<p style="font-size:13px;color:var(--text-muted);line-height:1.6">' +
                'Se o e-mail estiver cadastrado, você receberá o link de recuperação em breve.<br>' +
                '<span style="color:var(--text-dim);font-size:12px">(Verifique também sua caixa de spam)</span>' +
              '</p>' +
              '<button class="btn btn-primary btn-full" style="margin-top:24px" onclick="navigateTo(\'login\')">' +
                'Voltar ao login' +
              '</button>' +
            '</div>' +
          '</div>' +

          /* Formulário */
          '<div id="rec-form">' +
            '<div class="field">' +
              '<label for="rec-email">E-mail cadastrado</label>' +
              '<div class="input-wrap">' +
                '<span class="input-icon"><i data-lucide="mail" style="width:18px;height:18px"></i></span>' +
                '<input type="email" id="rec-email" class="has-icon-left" ' +
                  'placeholder="seu@email.com" autocomplete="email" autofocus>' +
              '</div>' +
              '<span class="field-error">E-mail inválido.</span>' +
            '</div>' +

            '<button class="btn btn-primary btn-full btn-lg" id="btn-rec" onclick="handleSolicitarRecuperacao()">' +
              '<span class="btn-spinner"></span>' +
              '<span class="btn-text">Enviar link de recuperação</span>' +
            '</button>' +
          '</div>' +

        '</div>' +
      '</div>' +
    '</div>'
  );

  document.getElementById('rec-email').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') handleSolicitarRecuperacao();
  });
}

function handleSolicitarRecuperacao() {
  var emailEl  = document.getElementById('rec-email');
  var btn      = document.getElementById('btn-rec');
  var errBox   = document.getElementById('rec-error');
  var errTxt   = document.getElementById('rec-error-text');
  var emailField = emailEl.closest('.field');

  errBox.classList.remove('visible');
  emailField.classList.remove('has-error');

  var email = emailEl.value.trim();
  if (!validateEmail(email)) {
    emailField.classList.add('has-error');
    return;
  }

  setBtnLoading(btn, true);

  google.script.run
    .withSuccessHandler(function(res) {
      setBtnLoading(btn, false);
      if (res.success) {
        document.getElementById('rec-form').style.display = 'none';
        document.getElementById('rec-success').style.display = 'block';
      } else {
        errTxt.textContent = res.error;
        errBox.classList.add('visible');
      }
    })
    .withFailureHandler(function() {
      setBtnLoading(btn, false);
      errTxt.textContent = 'Erro de conexão. Tente novamente.';
      errBox.classList.add('visible');
    })
    .solicitarRecuperacao(email);
}

/* ── ESTADO 2: Redefinir via token ── */
function _renderRedefinirSenha(token) {
  renderView(
    '<div id="view-recuperar-senha">' +
      '<div class="login-bg"></div>' +
      '<div class="login-bg-grid"></div>' +
      '<div class="pa-wrapper">' +
        '<div class="pa-card" id="redef-card">' +
          '<div class="loader-spinner" style="margin:40px auto"></div>' +
        '</div>' +
      '</div>' +
    '</div>'
  );

  // Verificar token antes de exibir formulário
  google.script.run
    .withSuccessHandler(function(res) {
      if (res.success) {
        _buildRedefForm(token, res.data.nome);
      } else {
        document.getElementById('redef-card').innerHTML =
          '<div style="text-align:center;padding:24px 0">' +
            '<div style="font-size:48px;margin-bottom:16px">❌</div>' +
            '<h3 style="font-size:17px;font-weight:700;color:var(--red);margin-bottom:8px">Link inválido ou expirado</h3>' +
            '<p style="font-size:13px;color:var(--text-muted);margin-bottom:24px">' +
              res.error +
            '</p>' +
            '<button class="btn btn-primary btn-full" onclick="navigateTo(\'recuperar-senha\')">' +
              'Solicitar novo link' +
            '</button>' +
          '</div>';
      }
    })
    .withFailureHandler(function() {
      document.getElementById('redef-card').innerHTML =
        '<p style="color:var(--red);text-align:center;padding:24px 0">Erro de conexão. Tente novamente.</p>';
    })
    .verificarTokenRecuperacao(token);
}

function _buildRedefForm(token, nome) {
  var card = document.getElementById('redef-card');
  card.innerHTML =
    '<div class="pa-badge" style="background:var(--teal-dim);border-color:rgba(0,169,156,0.25);color:var(--teal)">🔑 Nova Senha</div>' +
    '<h2 class="pa-title">Redefinir senha</h2>' +
    '<p class="pa-sub">Olá, <strong>' + nome + '</strong>! Defina sua nova senha abaixo.</p>' +

    '<div class="login-error-msg" id="redef-error">' +
      '<span>⚠</span><span id="redef-error-text"></span>' +
    '</div>' +

    '<div class="field">' +
      '<label for="redef-nova">Nova Senha</label>' +
      '<div class="input-wrap">' +
        '<span class="input-icon"><i data-lucide="lock" style="width:18px;height:18px"></i></span>' +
        '<input type="password" id="redef-nova" class="has-icon-left has-icon-right" ' +
          'placeholder="Mínimo 8 caracteres" autocomplete="new-password" oninput="paCheckStrengthRedef()">' +
        '<button type="button" class="pwd-toggle-btn" onclick="togglePwdVisibility(\'redef-nova\', this)" tabindex="-1">' +
          '<i data-lucide="eye" style="width:18px;height:18px"></i>' +
        '</button>' +
      '</div>' +
      '<div class="pwd-strength visible" id="redef-strength">' +
        '<div class="pwd-strength-bar"><div class="pwd-strength-fill" id="redef-strength-fill" style="width:0%"></div></div>' +
        '<span class="pwd-strength-label" id="redef-strength-label"></span>' +
      '</div>' +
      '<ul class="pwd-rules" id="redef-rules">' +
        '<li id="rrule-len">Mínimo de 8 caracteres</li>' +
        '<li id="rrule-upper">Uma letra maiúscula</li>' +
        '<li id="rrule-num">Um número</li>' +
        '<li id="rrule-special">Um caractere especial</li>' +
      '</ul>' +
    '</div>' +

    '<div class="field">' +
      '<label for="redef-confirma">Confirmar Nova Senha</label>' +
      '<div class="input-wrap">' +
        '<span class="input-icon"><i data-lucide="lock-keyhole" style="width:18px;height:18px"></i></span>' +
        '<input type="password" id="redef-confirma" class="has-icon-left has-icon-right" ' +
          'placeholder="Repita a senha" autocomplete="new-password">' +
        '<button type="button" class="pwd-toggle-btn" onclick="togglePwdVisibility(\'redef-confirma\', this)" tabindex="-1">' +
          '<i data-lucide="eye" style="width:18px;height:18px"></i>' +
        '</button>' +
      '</div>' +
      '<span class="field-error">As senhas não conferem.</span>' +
    '</div>' +

    '<button class="btn btn-primary btn-full btn-lg" id="btn-redef" onclick="handleRedefinirSenha(\'' + token + '\')">' +
      '<span class="btn-spinner"></span>' +
      '<span class="btn-text">Redefinir senha</span>' +
    '</button>';

  if (window.lucide) lucide.createIcons();
}

function paCheckStrengthRedef() {
  var pwd   = document.getElementById('redef-nova').value;
  var fill  = document.getElementById('redef-strength-fill');
  var label = document.getElementById('redef-strength-label');
  var s     = getPasswordStrength(pwd);
  var pcts  = { weak: '25%', medium: '65%', strong: '100%' };
  fill.style.width      = pwd.length ? pcts[s.level] : '0%';
  fill.style.background = s.color;
  label.textContent     = pwd.length ? ('Senha ' + s.label) : '';
  label.style.color     = s.color;
  toggleRule('rrule-len',    pwd.length >= 8);
  toggleRule('rrule-upper',  /[A-Z]/.test(pwd));
  toggleRule('rrule-num',    /[0-9]/.test(pwd));
  toggleRule('rrule-special',/[^A-Za-z0-9]/.test(pwd));
}

function handleRedefinirSenha(token) {
  var novaEl    = document.getElementById('redef-nova');
  var confirmEl = document.getElementById('redef-confirma');
  var btn       = document.getElementById('btn-redef');
  var errBox    = document.getElementById('redef-error');
  var errTxt    = document.getElementById('redef-error-text');

  errBox.classList.remove('visible');
  confirmEl.closest('.field').classList.remove('has-error');

  var nova    = novaEl.value;
  var confirma = confirmEl.value;

  if (!validatePassword(nova)) {
    errTxt.textContent = 'A senha não atende aos requisitos mínimos.';
    errBox.classList.add('visible');
    return;
  }
  if (nova !== confirma) {
    confirmEl.closest('.field').classList.add('has-error');
    return;
  }

  setBtnLoading(btn, true);

  sha256(nova).then(function(hash) {
    google.script.run
      .withSuccessHandler(function(res) {
        setBtnLoading(btn, false);
        if (res.success) {
          document.getElementById('redef-card').innerHTML =
            '<div style="text-align:center;padding:24px 0">' +
              '<div style="font-size:48px;margin-bottom:16px">✅</div>' +
              '<h3 style="font-size:17px;font-weight:700;color:var(--green);margin-bottom:8px">Senha redefinida!</h3>' +
              '<p style="font-size:13px;color:var(--text-muted);margin-bottom:24px">Sua senha foi alterada com sucesso. Faça login com suas novas credenciais.</p>' +
              '<button class="btn btn-primary btn-full" onclick="navigateTo(\'login\')">' +
                'Ir para o login' +
              '</button>' +
            '</div>';
        } else {
          errTxt.textContent = res.error;
          errBox.classList.add('visible');
        }
      })
      .withFailureHandler(function() {
        setBtnLoading(btn, false);
        errTxt.textContent = 'Erro de conexão. Tente novamente.';
        errBox.classList.add('visible');
      })
      .redefinirSenhaToken(token, hash);
  });
}
</script>

  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.activity-body { flex: 1; min-width: 0; }
.activity-text {
  font-size: 13px; font-weight: 600; color: var(--text);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.activity-time { font-size: 11px; color: var(--text-dim); margin-top: 2px; font-family: 'DM Mono', monospace; }
.activity-arrow {
  color: var(--text-dim); flex-shrink: 0; transition: color 0.15s;
}
.activity-item:hover .activity-arrow { color: var(--teal); }

/* ── BOTTOM NAV PREMIUM ── */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--glass-bg);
  backdrop-filter: blur(20px) saturate(180%);
  -webkit-backdrop-filter: blur(20px) saturate(180%);
  border-top: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-around;
  padding: 8px 8px;
  padding-bottom: max(8px, env(safe-area-inset-bottom));
  z-index: 90;
  box-shadow: 0 -8px 32px rgba(0,0,0,0.25);
}
.bnav-item {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; gap: 3px;
  background: none; border: none; cursor: pointer;
  font-size: 10px; font-weight: 700; color: var(--text-dim);
  font-family: 'Plus Jakarta Sans', sans-serif;
  border-radius: var(--radius-sm); padding: 6px 4px;
  transition: color 0.15s;
  max-width: 80px;
}
.bnav-item.active { color: var(--teal); }
.bnav-item i { width: 22px; height: 22px; display: block; }

/* FAB central */
.bnav-fab {
  width: 54px; height: 54px; border-radius: 50%;
  background: linear-gradient(135deg, var(--teal), var(--teal-dark));
  border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: #fff;
  box-shadow: var(--shadow-teal), 0 0 20px rgba(0,196,181,0.3);
  transition: transform 0.2s var(--ease-spring), box-shadow 0.2s;
  flex-shrink: 0;
  margin: 0 8px;
  position: relative; top: -8px;
}
.bnav-fab:hover {
  transform: scale(1.08) translateY(-2px);
  box-shadow: var(--shadow-teal), 0 0 32px rgba(0,196,181,0.5);
}
.bnav-fab:active { transform: scale(0.95); }
.bnav-fab i { width: 24px; height: 24px; }

/* ── MODAL TROCA DE SENHA (sobrescreve para ficar premium) ── */
.modal-box .modal-title {
  font-size: 18px; font-weight: 800; color: var(--text); letter-spacing: -0.3px;
}
.modal-close-btn {
  width: 32px; height: 32px;
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: 8px; cursor: pointer; color: var(--text-muted);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; line-height: 1;
  transition: background 0.15s, color 0.15s;
}
.modal-close-btn:hover { background: var(--bg4); color: var(--text); }
</style>

<script>
// ═══════════════════════════════════════════════════
//  HOME DASHBOARD VIEW
// ═══════════════════════════════════════════════════

var HomeState = {
  kpis: { membros: 0, alunos: 0, professores: 0, turmas: 0 }
};

function renderHome() {
  if (!App.session) { navigateTo('login'); return; }

  var nome   = App.session.nome || '';
  var perfil = App.session.perfil || '';

  var hora  = new Date().getHours();
  var sauda = hora < 12 ? 'Bom dia' : hora < 18 ? 'Boa tarde' : 'Boa noite';

  var perfilLabel = {
    admin:      'Administrador',
    secretaria: 'Secretaria',
    professor:  'Professor(a)'
  }[perfil] || perfil;

  var perfilColor = {
    admin:      'var(--teal)',
    secretaria: 'var(--gold)',
    professor:  '#8ab4f8'
  }[perfil] || 'var(--text-muted)';

  var isAdmin = perfil === PERFIS_CLIENT.ADMIN;
  var isSec   = perfil === PERFIS_CLIENT.SECRETARIA || isAdmin;

  renderView(
    /* ── TOP NAV ── */
    '<nav class="topnav">' +
      '<a class="topnav-logo">' +
        '<div class="topnav-logo-icon" style="padding:2px">' +
          '<img src="" alt="Logo AD" class="app-logo-img" style="width:70px;height:70px;object-fit:contain">' +
        '</div>' +
        '<div>' +
          '<div class="topnav-logo-name">AD Fonte da Salvação</div>' +
          '<div class="topnav-logo-sub">Gestão Ministerial</div>' +
        '</div>' +
      '</a>' +
      '<div class="topnav-actions">' +
        /* Notificação */
        '<button class="btn btn-ghost btn-sm" style="width:40px;padding:0" title="Notificações">' +
          '<i data-lucide="bell" style="width:18px;height:18px"></i>' +
        '</button>' +
        /* Tema */
        '<button class="theme-toggle-btn btn btn-ghost btn-sm" style="width:40px;padding:0" onclick="toggleTheme()" title="Alternar tema">' +
          '<i data-lucide="moon" style="width:18px;height:18px"></i>' +
        '</button>' +
        /* Avatar + dropdown */
        '<div style="position:relative">' +
          '<button class="topnav-avatar-btn" onclick="toggleUserDropdown()" id="avatar-btn">' +
            '<div class="avatar">' + getInitials(nome) + '</div>' +
          '</button>' +
          '<div class="user-dropdown" id="user-dropdown">' +
            '<div class="user-dd-header">' +
              '<div class="user-dd-nome">' + nome + '</div>' +
              '<div class="user-dd-email">' + (App.session.email || '') + '</div>' +
              '<div class="user-dd-perfil">' +
                '<span class="badge" style="background:rgba(0,169,156,0.1);color:' + perfilColor + '">' + perfilLabel + '</span>' +
              '</div>' +
            '</div>' +
            '<button class="user-dd-item" onclick="closeDropdown(); navigateTo(\'home\')">' +
              '<i data-lucide="layout-dashboard" style="width:16px;height:16px"></i> Dashboard' +
            '</button>' +
            (isSec ? '<button class="user-dd-item" onclick="closeDropdown(); navigateTo(\'usuarios\')">' +
              '<i data-lucide="users" style="width:16px;height:16px"></i> Usuários' +
            '</button>' : '') +
            '<button class="user-dd-item" onclick="closeDropdown(); showTrocarSenha()">' +
              '<i data-lucide="key" style="width:16px;height:16px"></i> Alterar senha' +
            '</button>' +
            '<hr class="divider" style="margin:6px 0">' +
            '<button class="user-dd-item danger" onclick="handleLogout()">' +
              '<i data-lucide="log-out" style="width:16px;height:16px"></i> Sair' +
            '</button>' +
          '</div>' +
        '</div>' +
      '</div>' +
    '</nav>' +

    /* ── HERO PREMIUM ── */
    '<div class="home-hero">' +
      '<div class="hero-profile-badge">' +
        '<div class="avatar" style="width:28px;height:28px;font-size:11px">' + getInitials(nome) + '</div>' +
        '<div>' +
          '<div class="hero-profile-name">' + nome.split(' ')[0] + '</div>' +
          '<div class="hero-profile-role">' + perfilLabel + '</div>' +
        '</div>' +
      '</div>' +
      '<div class="home-hero-greeting">' + sauda + '! 👋</div>' +
      '<h1 class="home-hero-title">Bem-vindo à plataforma</h1>' +
      '<p class="home-hero-sub">AD Fonte da Salvação · Gestão Ministerial</p>' +
    '</div>' +

    /* ── CONTEÚDO ── */
    '<div class="home-content">' +

      /* KPIs elevados */
      '<div class="kpi-grid-wrapper">' +
      '<div class="kpi-grid" id="kpi-grid">' +
        _kpiSkeleton() + _kpiSkeleton() + _kpiSkeleton() + _kpiSkeleton() +
      '</div>' +
      '</div>' + /* /kpi-grid-wrapper */

      /* Módulos */
      '<div class="section-label">Módulos</div>' +
      '<div class="modules-grid">' +
        _moduleBtn('graduation-cap', 'Escola Dominical', 'Classes, alunos e chamadas', 'escola-dominical', false) +
        _moduleBtn('users',          'Usuários',         'Gestão de acesso e perfis',  isSec ? 'usuarios' : null, !isSec) +
        _moduleBtn('contact',        'Membros',          'Cadastro de membros',         null, true, 'Em breve') +
        _moduleBtn('wallet',         'Financeiro',       'Tesouraria e relatórios',     null, true, 'Em breve') +
        _moduleBtn('calendar-days',  'Agenda',           'Eventos e escalas',           null, true, 'Em breve') +
        _moduleBtn('bar-chart-2',    'Relatórios',       'Análises e exportação',       null, true, 'Em breve') +
      '</div>' +

      /* Atividade recente */
      '<div class="section-label">Atividade Recente</div>' +
      '<div class="activity-list" id="activity-list">' +
        '<div class="activity-item">' +
          '<div class="activity-icon" style="background:var(--bg3)"><span class="skeleton" style="width:20px;height:20px;border-radius:6px"></span></div>' +
          '<div class="activity-body">' +
            '<div class="skeleton" style="width:70%;height:13px;margin-bottom:6px"></div>' +
            '<div class="skeleton" style="width:40%;height:11px"></div>' +
          '</div>' +
        '</div>' +
        '<div class="activity-item">' +
          '<div class="activity-icon" style="background:var(--bg3)"><span class="skeleton" style="width:20px;height:20px;border-radius:6px"></span></div>' +
          '<div class="activity-body">' +
            '<div class="skeleton" style="width:55%;height:13px;margin-bottom:6px"></div>' +
            '<div class="skeleton" style="width:30%;height:11px"></div>' +
          '</div>' +
        '</div>' +
      '</div>' +

    '</div>' + /* /home-content */

    /* ── BOTTOM NAV (mobile) ── */
    '<nav class="bottom-nav">' +
      '<button class="bnav-item active" onclick="navigateTo(\'home\')">' +
        '<i data-lucide="layout-dashboard"></i>' +
        '<span>Início</span>' +
      '</button>' +
      '<button class="bnav-item" onclick="navigateTo(\'escola-dominical\')">' +
        '<i data-lucide="graduation-cap"></i>' +
        '<span>EBD</span>' +
      '</button>' +
      '<button class="bnav-fab" onclick="showToast(\'Em breve: ações rápidas!\', \'info\')" title="Ações rápidas">' +
        '<i data-lucide="plus" style="width:26px;height:26px"></i>' +
      '</button>' +
      (isSec ? '<button class="bnav-item" onclick="navigateTo(\'usuarios\')">' +
        '<i data-lucide="users"></i>' +
        '<span>Usuários</span>' +
      '</button>' : '<button class="bnav-item" disabled style="opacity:0.3">' +
        '<i data-lucide="bell"></i>' +
        '<span>Avisos</span>' +
      '</button>') +
      '<button class="bnav-item" onclick="toggleUserDropdown()" id="bnav-perfil">' +
        '<i data-lucide="circle-user"></i>' +
        '<span>Perfil</span>' +
      '</button>' +
    '</nav>' +

    /* Modal alterar senha */
    _modalTrocarSenha()
  );

  // Fechar dropdown ao clicar fora
  document.addEventListener('click', function onDocClick(e) {
    var dd  = document.getElementById('user-dropdown');
    var btn = document.getElementById('avatar-btn');
    if (dd && btn && !btn.contains(e.target) && !dd.contains(e.target)) {
      dd.classList.remove('open');
    }
  }, { once: false });

  // Carregar KPIs
  _loadKpis();
  // Carregar atividade
  _loadActivity();
  // Sincronizar icone do tema e forcar lucide apos paint
  setTimeout(function() {
    var currentTheme = document.documentElement.getAttribute('data-theme') || 'dark';
    var themeBtns = document.querySelectorAll('.theme-toggle-btn');
    themeBtns.forEach(function(btn) {
      btn.innerHTML = currentTheme === 'dark'
        ? '<i data-lucide="sun" style="width:18px;height:18px"></i>'
        : '<i data-lucide="moon" style="width:18px;height:18px"></i>';
    });
    if (window.lucide) lucide.createIcons();
    applyLogoSrc();
  }, 0);
}

/* ── HELPERS ── */
var PERFIS_CLIENT = { ADMIN: 'admin', SECRETARIA: 'secretaria', PROFESSOR: 'professor' };

function _kpiSkeleton() {
  return '<div class="kpi-card">' +
    '<div class="skeleton" style="width:36px;height:36px;border-radius:10px"></div>' +
    '<div class="skeleton" style="width:50%;height:26px;border-radius:6px"></div>' +
    '<div class="skeleton" style="width:80%;height:11px;border-radius:4px"></div>' +
  '</div>';
}

function _kpiCard(icon, bg, value, label, trend, trendDir, colorClass) {
  var cc = colorClass ? ' ' + colorClass : '';
  return '<div class="kpi-card' + cc + '">' +
    '<div class="kpi-icon-wrap" style="background:' + bg + ';border-radius:10px">' + icon + '</div>' +
    '<div class="kpi-value">' + value + '</div>' +
    '<div class="kpi-label">' + label + '</div>' +
    (trend ? '<div class="kpi-trend ' + trendDir + '">' + trend + '</div>' : '') +
  '</div>';
}

function _moduleBtn(icon, name, desc, view, locked, badgeText) {
  var lockedClass = locked ? ' locked' : '';
  var clickAttr   = (!locked && view) ? 'onclick="navigateTo(\'' + view + '\')"' : '';
  var statusDot   = !locked ? '<span style="position:absolute;top:12px;right:12px;width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 6px rgba(68,204,136,0.6)"></span>' : '';
  var lockIcon    = locked ? '<span style="position:absolute;top:12px;right:12px;color:var(--text-dim);opacity:0.5"><i data-lucide="lock" style="width:13px;height:13px"></i></span>' : '';
  return '<button class="module-btn' + lockedClass + '" ' + clickAttr + '>' +
    statusDot + lockIcon +
    '<div class="module-btn-icon"><i data-lucide="' + icon + '" style="width:22px;height:22px"></i></div>' +
    '<div class="module-btn-name">' + name + '</div>' +
    '<div class="module-btn-desc">' + (locked && badgeText ? '<span style="color:var(--text-dim);font-size:10px;font-family:DM Mono,monospace;letter-spacing:0.5px">' + badgeText + '</span>' : desc) + '</div>' +
  '</button>';
}

function _loadKpis() {
  google.script.run
    .withSuccessHandler(function(res) {
      if (!res || !res.success) return;
      var d   = res.data;
      var grid = document.getElementById('kpi-grid');
      if (!grid) return;
      var iStyle = 'style="width:20px;height:20px"';
      grid.innerHTML =
        _kpiCard('<i data-lucide="users" ' + iStyle + '></i>',         'rgba(0,196,181,0.14)',   d.membros     || 0, 'Membros cadastrados', '', '', 'kc-teal') +
        _kpiCard('<i data-lucide="backpack" ' + iStyle + '></i>',      'rgba(138,180,248,0.14)', d.alunos      || 0, 'Alunos na ED', '', '', 'kc-blue') +
        _kpiCard('<i data-lucide="user-check" ' + iStyle + '></i>',    'rgba(226,182,90,0.14)',  d.professores || 0, 'Professores ativos', '', '', 'kc-gold') +
        _kpiCard('<i data-lucide="school" ' + iStyle + '></i>',        'rgba(68,204,136,0.14)',  d.turmas      || 0, 'Turmas ativas', '', '', 'kc-green');
      if (window.lucide) setTimeout(function(){ lucide.createIcons(); }, 0);
    })
    .withFailureHandler(function() {})
    .getKpisHome(App.session.token);
}

function _loadActivity() {
  google.script.run
    .withSuccessHandler(function(res) {
      var list = document.getElementById('activity-list');
      if (!list) return;
      if (!res || !res.success || !res.data || !res.data.length) {
        list.innerHTML =
          '<div class="empty-state">' +
            '<div class="empty-state-icon">📋</div>' +
            '<div class="empty-state-title">Nenhuma atividade recente</div>' +
            '<div class="empty-state-desc">As ações recentes aparecerão aqui.</div>' +
          '</div>';
        return;
      }
      var html = '';
      res.data.forEach(function(item) {
        html +=
          '<div class="activity-item">' +
            '<div class="activity-icon" style="background:var(--bg3);color:var(--teal)">' +
              '<i data-lucide="' + (item.icon || 'file-text') + '" style="width:18px;height:18px"></i>' +
            '</div>' +
            '<div class="activity-body">' +
              '<div class="activity-text">' + item.texto + '</div>' +
              '<div class="activity-time">' + (item.tempo || '') + '</div>' +
            '</div>' +
          '</div>';
      });
      list.innerHTML = html;
      if (window.lucide) setTimeout(function(){ lucide.createIcons(); }, 0);
    })
    .withFailureHandler(function() {})
    .getAtividadeRecente(App.session.token);
}

/* ── DROPDOWN ── */
function toggleUserDropdown() {
  var dd = document.getElementById('user-dropdown');
  if (dd) dd.classList.toggle('open');
}
function closeDropdown() {
  var dd = document.getElementById('user-dropdown');
  if (dd) dd.classList.remove('open');
}

/* ── LOGOUT ── */
function handleLogout() {
  closeDropdown();
  if (!App.session) { navigateTo('login'); return; }
  google.script.run
    .withSuccessHandler(function() {
      clearSession();
      showToast('Sessão encerrada. Até logo!', 'info');
      navigateTo('login');
    })
    .withFailureHandler(function() {
      clearSession();
      navigateTo('login');
    })
    .logout(App.session.token);
}

/* ── MODAL TROCA DE SENHA ── */
function _modalTrocarSenha() {
  return '<div class="modal-overlay" id="modal-troca-senha">' +
    '<div class="modal-box">' +
      '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">' +
        '<h3 style="font-size:17px;font-weight:800;color:var(--text)">Alterar senha</h3>' +
        '<button class="btn btn-ghost btn-sm" style="width:36px;padding:0" onclick="closeModalTrocarSenha()">×</button>' +
      '</div>' +

      '<div class="login-error-msg" id="ts-error">' +
        '<span>⚠</span><span id="ts-error-text"></span>' +
      '</div>' +

      '<div class="field">' +
        '<label for="ts-atual">Senha atual</label>' +
        '<div class="input-wrap">' +
          '<span class="input-icon"><i data-lucide="lock" style="width:18px;height:18px"></i></span>' +
          '<input type="password" id="ts-atual" class="has-icon-left has-icon-right" placeholder="Sua senha atual">' +
          '<button type="button" class="pwd-toggle-btn" onclick="togglePwdVisibility(\'ts-atual\', this)" tabindex="-1">' +
            '<i data-lucide="eye" style="width:18px;height:18px"></i>' +
          '</button>' +
        '</div>' +
      '</div>' +

      '<div class="field">' +
        '<label for="ts-nova">Nova senha</label>' +
        '<div class="input-wrap">' +
          '<span class="input-icon"><i data-lucide="lock" style="width:18px;height:18px"></i></span>' +
          '<input type="password" id="ts-nova" class="has-icon-left has-icon-right" placeholder="Mínimo 8 caracteres" oninput="tsCheckStrength()">' +
          '<button type="button" class="pwd-toggle-btn" onclick="togglePwdVisibility(\'ts-nova\', this)" tabindex="-1">' +
            '<i data-lucide="eye" style="width:18px;height:18px"></i>' +
          '</button>' +
        '</div>' +
        '<div class="pwd-strength visible">' +
          '<div class="pwd-strength-bar"><div class="pwd-strength-fill" id="ts-strength-fill" style="width:0%"></div></div>' +
          '<span class="pwd-strength-label" id="ts-strength-label"></span>' +
        '</div>' +
      '</div>' +

      '<div class="field">' +
        '<label for="ts-confirma">Confirmar nova senha</label>' +
        '<div class="input-wrap">' +
          '<span class="input-icon"><i data-lucide="lock-keyhole" style="width:18px;height:18px"></i></span>' +
          '<input type="password" id="ts-confirma" class="has-icon-left has-icon-right" placeholder="Repita a nova senha">' +
          '<button type="button" class="pwd-toggle-btn" onclick="togglePwdVisibility(\'ts-confirma\', this)" tabindex="-1">' +
            '<i data-lucide="eye" style="width:18px;height:18px"></i>' +
          '</button>' +
        '</div>' +
        '<span class="field-error">As senhas não conferem.</span>' +
      '</div>' +

      '<div style="display:flex;gap:10px;margin-top:4px">' +
        '<button class="btn btn-secondary btn-full" onclick="closeModalTrocarSenha()">Cancelar</button>' +
        '<button class="btn btn-primary btn-full" id="btn-ts" onclick="handleTrocarSenha()">' +
          '<span class="btn-spinner"></span>' +
          '<span class="btn-text">Salvar</span>' +
        '</button>' +
      '</div>' +
    '</div>' +
  '</div>';
}

function showTrocarSenha() {
  closeDropdown();
  var m = document.getElementById('modal-troca-senha');
  if (m) {
    m.classList.add('open');
    // Reset campos
    ['ts-atual','ts-nova','ts-confirma'].forEach(function(id) {
      var el = document.getElementById(id);
      if (el) el.value = '';
    });
    var errBox = document.getElementById('ts-error');
    if (errBox) errBox.classList.remove('visible');
    if (window.lucide) lucide.createIcons();
  }
}
function closeModalTrocarSenha() {
  var m = document.getElementById('modal-troca-senha');
  if (m) m.classList.remove('open');
}

function tsCheckStrength() {
  var pwd   = document.getElementById('ts-nova').value;
  var fill  = document.getElementById('ts-strength-fill');
  var label = document.getElementById('ts-strength-label');
  var s     = getPasswordStrength(pwd);
  var pcts  = { weak: '25%', medium: '65%', strong: '100%' };
  fill.style.width      = pwd.length ? pcts[s.level] : '0%';
  fill.style.background = s.color;
  label.textContent     = pwd.length ? ('Senha ' + s.label) : '';
  label.style.color     = s.color;
}

function handleTrocarSenha() {
  var atualEl   = document.getElementById('ts-atual');
  var novaEl    = document.getElementById('ts-nova');
  var confirmEl = document.getElementById('ts-confirma');
  var btn       = document.getElementById('btn-ts');
  var errBox    = document.getElementById('ts-error');
  var errTxt    = document.getElementById('ts-error-text');

  errBox.classList.remove('visible');
  confirmEl.closest('.field').classList.remove('has-error');

  var atual    = atualEl.value;
  var nova     = novaEl.value;
  var confirma = confirmEl.value;

  if (!atual || !nova || !confirma) {
    errTxt.textContent = 'Preencha todos os campos.';
    errBox.classList.add('visible'); return;
  }
  if (!validatePassword(nova)) {
    errTxt.textContent = 'A nova senha não atende aos requisitos.';
    errBox.classList.add('visible'); return;
  }
  if (nova !== confirma) {
    confirmEl.closest('.field').classList.add('has-error'); return;
  }

  setBtnLoading(btn, true);

  Promise.all([sha256(atual), sha256(nova)]).then(function(hashes) {
    google.script.run
      .withSuccessHandler(function(res) {
        setBtnLoading(btn, false);
        if (res.success) {
          closeModalTrocarSenha();
          showToast('Senha alterada com sucesso! ✓', 'success');
        } else {
          errTxt.textContent = res.error;
          errBox.classList.add('visible');
        }
      })
      .withFailureHandler(function() {
        setBtnLoading(btn, false);
        errTxt.textContent = 'Erro de conexão. Tente novamente.';
        errBox.classList.add('visible');
      })
      .trocarSenha(App.session.token, hashes[0], hashes[1]);
  });
}
</script>

<script>
// ══════════════════════════════════════════════════════════
//  ESCOLA DOMINICAL — Controller (reescrito limpo)
// ══════════════════════════════════════════════════════════

// ── Estado global ────────────────────────────────────────
var ED = {
  tab:         'visao-geral',
  classes:     [],
  alunos:      [],
  professores: [],
  aulas:       [],
  extras:      [],
  stats:       null,
  filtroClasse:'',
  chamada: {
    aulaId:    null,
    classeId:  null,
    registros: {}
  }
};

// ── Utilitários ───────────────────────────────────────────
function _esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function _initials(n) {
  var p = String(n||'').trim().split(' ').filter(Boolean);
  if (!p.length) return '?';
  return p.length === 1 ? p[0][0].toUpperCase() : (p[0][0]+p[p.length-1][0]).toUpperCase();
}
function _avatarColor(n) {
  var pal = [
    {bg:'rgba(0,196,181,0.15)',  fg:'#00C4B5'},
    {bg:'rgba(138,180,248,0.15)',fg:'#8ab4f8'},
    {bg:'rgba(226,182,90,0.15)', fg:'#E2B65A'},
    {bg:'rgba(68,204,136,0.15)', fg:'#44cc88'},
    {bg:'rgba(242,109,109,0.15)',fg:'#f26d6d'},
    {bg:'rgba(180,138,248,0.15)',fg:'#b48af8'}
  ];
  var code = 0;
  for (var i=0;i<(n||'').length;i++) code += n.charCodeAt(i);
  return pal[code % pal.length];
}
function _edFindById(arr, id) {
  for (var i=0;i<arr.length;i++) if(arr[i].ID===id) return arr[i];
  return null;
}

// ── Tratamento centralizado de resposta do servidor ───────
// Retorna true se OK, false se erro de sessão (redireciona) ou erro comum (toast)
function _handleResponse(r, context) {
  if (!r) {
    showToast('Sem resposta do servidor (' + context + ').', 'error');
    return false;
  }
  if (!r.success) {
    var msg = r.error || 'Erro desconhecido';
    // Sessão expirada → redirecionar para login
    if (msg.indexOf('Sess') !== -1 || msg.indexOf('xpirada') !== -1 || msg.indexOf('utorizado') !== -1) {
      showToast('Sessão expirada. Faça login novamente.', 'error');
      setTimeout(function() { navigateTo('login'); }, 1500);
      return false;
    }
    showToast(msg, 'error');
    return false;
  }
  return true;
}

// ── Loaders ────────────────────────────────────────────────
function _edLoadClasses(cb) {
  var token = App.session && App.session.token;
  console.log('[ED] _edLoadClasses | token:', token ? token.substring(0,8)+'...' : 'NULL', '| session:', JSON.stringify(App.session ? {email:App.session.email, perfil:App.session.perfil} : null));
  if (!token) {
    showToast('Sessão inválida. Faça login novamente.', 'error');
    setTimeout(function(){ navigateTo('login'); }, 1500);
    return;
  }
  google.script.run
    .withFailureHandler(function(e) {
      console.error('[ED] _edLoadClasses FAILURE:', e);
      showToast((e&&e.message)||'Erro ao carregar turmas.','error');

    .withSuccessHandler(function(r) {
      console.log('[ED] _edLoadClasses RESPONSE:', JSON.stringify(r));
      if (!_handleResponse(r, 'classes')) return;
      ED.classes = r.data || [];
      if (cb) cb();
    })
    .ed_listarClasses(token);
}

// ── Renderizador de tab ───────────────────────────────────
function _edRenderTab() {
  var panel = document.getElementById('ed-panel');
  if (!panel) return;
  var tab = ED.tab;
  if      (tab==='visao-geral')  _edRenderVisaoGeral(panel);
  else if (tab==='classes')      _edRenderClasses(panel);
  else if (tab==='alunos')       _edRenderAlunos(panel);
  else if (tab==='professores')  _edRenderProfessores(panel);
  else if (tab==='aulas')        _edRenderAulas(panel);
  else if (tab==='chamadas')     _edRenderChamadaSetup(panel);
  else if (tab==='ranking')      _edRenderRanking(panel);
  if (window.lucide) lucide.createIcons();
}

// ── Navegação entre tabs ──────────────────────────────────
function edSetTab(tab) {
  ED.tab = tab;

  // Atualizar visual das tabs
  document.querySelectorAll('.ed-tab').forEach(function(t) {
    t.classList.toggle('active', t.getAttribute('onclick') === "edSetTab('"+tab+"')");
  });

  var panel = document.getElementById('ed-panel');
  if (!panel) return;
  panel.innerHTML = '<div style="padding:48px;text-align:center"><div class="loader-spinner" style="margin:0 auto"></div></div>';

  // Cada tab carrega apenas o que precisa, em cadeia
  if (tab === 'visao-geral') {
    _edLoadClasses(function() {
      _edLoadAlunos(function() {
        _edLoadStats(function() {
          _edRenderTab();
        });
      });
    });
  } else if (tab === 'classes') {
    _edLoadClasses(function() {
      _edLoadAlunos(function() {
        _edRenderTab();
      });
    });
  } else if (tab === 'alunos') {
    _edLoadClasses(function() {
      _edLoadAlunos(function() {
        _edRenderTab();
      });
    });
  } else if (tab === 'professores') {
    _edLoadClasses(function() {
      _edLoadProfessores(function() {
        _edRenderTab();
      });
    });
  } else if (tab === 'aulas') {
    _edLoadAulas(function() {
      _edRenderTab();
    });
  } else if (tab === 'chamadas') {
    _edLoadClasses(function() {
      _edLoadAulas(function() {
        _edLoadExtras(function() {
          _edRenderTab();
        });
      });
    });
  } else if (tab === 'ranking') {
    _edLoadClasses(function() {
      _edLoadAlunos(function() {
        _edRenderTab();
      });
    });
  } else {
    _edRenderTab();
  }
}

var _edEditClasseId = null;

function edOpenModalClasse(id) {
  _edEditClasseId = id || null;
  var t = document.getElementById('modal-classe-titulo');
  if (t) t.textContent = id ? 'Editar Turma' : 'Nova Turma';
  document.getElementById('mclasse-nome').value  = '';
  document.getElementById('mclasse-faixa').value = '';
  document.getElementById('mclasse-licao').value = '';
  if (id) {
    var c = _edFindById(ED.classes, id);
    if (c) {
      document.getElementById('mclasse-nome').value  = c.Nome        ||'';
      document.getElementById('mclasse-faixa').value = c.FaixaEtaria ||'';
      document.getElementById('mclasse-licao').value = c.LicaoCPAD   ||'';
    }
  }
  edOpenModal('modal-classe');
}

function edSalvarClasse() {
  var nome  = (document.getElementById('mclasse-nome').value ||'').trim();
  var faixa = (document.getElementById('mclasse-faixa').value||'').trim();
  var licao = (document.getElementById('mclasse-licao').value||'').trim();
  if (!nome) { showToast('Nome da turma é obrigatório.','error'); return; }
  var btn = document.getElementById('btn-salvar-classe');
  btn.classList.add('loading');
  var dados = {Nome:nome, FaixaEtaria:faixa, LicaoCPAD:licao};
  var fn = _edEditClasseId ? 'ed_editarClasse' : 'ed_criarClasse';
  var runner = google.script.run
    .withFailureHandler(function(e) { btn.classList.remove('loading'); showToast(e.message,'error'); })
    .withSuccessHandler(function(r) {
      btn.classList.remove('loading');
      if (!_handleResponse(r,'salvarClasse')) return;
      showToast(_edEditClasseId?'Turma atualizada!':'Turma criada!','success');
      edCloseModal('modal-classe');
      edSetTab('classes');
    });
  if (_edEditClasseId) runner.ed_editarClasse(App.session.token, _edEditClasseId, dados);
  else runner.ed_criarClasse(App.session.token, dados);
}

function edExcluirClasse(id, nome) {
  if (!confirm('Desativar a turma "'+nome+'"?')) return;
  google.script.run
    .withFailureHandler(function(e){ showToast(e.message,'error'); })
    .withSuccessHandler(function(r) {
      if (!_handleResponse(r,'excluirClasse')) return;
      showToast('Turma desativada.','success');
      edSetTab('classes');
    })
    .ed_excluirClasse(App.session.token, id);
}
