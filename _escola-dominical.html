function _edUpdateBirthdayBell() {
  var aniv = [];
  var today = new Date(), dow = today.getDay();
  function checkList(list, tipo) {
    (list||[]).forEach(function(p) {
      var d = _bdParseDate(p.DataNasc); if (!d) return;
      for (var i=0; i<7; i++) {
        var ref = new Date(today.getFullYear(), today.getMonth(), today.getDate()-dow+i);
        if (d.getDate()===ref.getDate() && d.getMonth()===ref.getMonth()) {
          var days=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
          aniv.push({ nome:p.Nome, tipo:tipo, isHoje:(i===dow),
            diaLabel: days[i]+' '+('0'+ref.getDate()).slice(-2)+'/'+('0'+(ref.getMonth()+1)).slice(-2) });
          break;
        }
      }
    });
  }
  checkList(ED.alunos, 'Aluno');
  checkList(ED.professores, 'Professor');
  aniv.sort(function(a,b){ return (a.isHoje?0:1)-(b.isHoje?0:1); });

  // Badge no botão
  var wrap = document.getElementById('ed-bell-wrap');
  if (wrap) {
    var existBadge = document.getElementById('ed-bell-badge');
    if (existBadge) existBadge.remove();
    var bellBtn = document.getElementById('ed-bell-btn');
    if (bellBtn) bellBtn.classList.remove('birthday-hoje');
    if (aniv.length) {
      var hoje = aniv.filter(function(a){return a.isHoje;}).length;
      var badge = document.createElement('span');
      badge.id = 'ed-bell-badge';
      badge.className = 'ed-bell-badge';
      badge.textContent = aniv.length;
      wrap.appendChild(badge);
      if (hoje > 0 && bellBtn) bellBtn.classList.add('birthday-hoje');
    }
  }

  // Preencher conteúdo do modal
  var body = document.getElementById('ed-aniv-modal-body');
  if (!body) return;
  if (!aniv.length) {
    body.innerHTML = '<div style="text-align:center;padding:24px 0;color:var(--text-muted);font-size:13px">Nenhum aniversariante esta semana 🎉</div>';
  } else {
    var h = '';
    aniv.forEach(function(a) {
      var isHoje = a.isHoje;
      h += '<div style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border10)">'+
        '<div style="font-size:22px;line-height:1;flex-shrink:0">'+(isHoje ? _CAKE_SVG_HOJE : '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="display:inline-block;vertical-align:middle"><rect x="2" y="11" width="20" height="10" rx="2" fill="#A78BFA"/><rect x="2" y="11" width="20" height="4" rx="1" fill="#C4B5FD"/><rect x="5" y="7" width="14" height="5" rx="1.5" fill="#FFD93D"/><line x1="8" y1="7" x2="8" y2="4" stroke="#A78BFA" stroke-width="1.5" stroke-linecap="round"/><line x1="12" y1="7" x2="12" y2="3" stroke="#FF6B6B" stroke-width="1.5" stroke-linecap="round"/><line x1="16" y1="7" x2="16" y2="4" stroke="#A78BFA" stroke-width="1.5" stroke-linecap="round"/><ellipse cx="8" cy="4" rx="1" ry="1.5" fill="#FF9500"/><ellipse cx="12" cy="3" rx="1" ry="1.5" fill="#FF9500"/><ellipse cx="16" cy="4" rx="1" ry="1.5" fill="#FF9500"/></svg>')+'</div>'+
        '<div style="flex:1;min-width:0">'+
          '<div style="font-size:13px;font-weight:700;color:var(--text)">'+_esc(a.nome)+'</div>'+
          '<div style="font-size:11px;color:var(--text-muted);margin-top:2px">'+
            (isHoje?'<strong style="color:#ff5e7a">Hoje!</strong>':a.diaLabel)+' · '+a.tipo+
          '</div>'+
        '</div>'+
        (isHoje ? '<div style="font-size:15px;opacity:0.85">✨</div>' : '')+

// ── Abrir modal importador (apenas admin) ──────────────────
var _impListenersRegistered = false;
var _impXlsxLoaded = false;

function edOpenModalImportador() {
  if (!App.session || App.session.perfil !== 'admin') {
    _toast('Acesso restrito a administradores.', 'error');
    return;
  }

  // Carrega XLSX dinamicamente na primeira vez
  if (!_impXlsxLoaded && typeof XLSX === 'undefined') {
    var s = document.createElement('script');
    s.src = 'https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
    s.onload = function() { _impXlsxLoaded = true; };
    document.head.appendChild(s);
  } else {
    _impXlsxLoaded = true;
  }

  impReset();
  edOpenModal('modal-importador');

  // Registra listeners apenas uma vez
  if (_impListenersRegistered) return;
  _impListenersRegistered = true;

  document.addEventListener('input', function(e) {
    if (e.target && e.target.id === 'imp-confirmar-txt') {
      var btn = document.getElementById('imp-btn-limpar');
      if (btn) btn.disabled = e.target.value.trim().toUpperCase() !== 'LIMPAR';
    }
  });
  document.addEventListener('dragover', function(e) {
    var dz = document.getElementById('imp-dropzone');
    if (dz && dz.contains(e.target)) { e.preventDefault(); dz.classList.add('drag'); }
  });
  document.addEventListener('dragleave', function(e) {
    var dz = document.getElementById('imp-dropzone');
    if (dz && !dz.contains(e.relatedTarget)) dz.classList.remove('drag');
  });
  document.addEventListener('drop', function(e) {
    var dz = document.getElementById('imp-dropzone');
    if (dz && (dz === e.target || dz.contains(e.target))) {
      e.preventDefault(); dz.classList.remove('drag');
      var f = e.dataTransfer.files[0];
      if (f) impHandleFile(f);
    }
  });
  document.addEventListener('change', function(e) {
    if (e.target && e.target.id === 'imp-file-input' && e.target.files[0]) {
      impHandleFile(e.target.files[0]);
    }
  });
}

function impReset() {
  _imp.rawData = []; _imp.mappedData = []; _imp.classesNew = [];
  _imp.classMapping = {}; _imp.uniqueClasses = [];

  var dz = document.getElementById('imp-dropzone');

    if (sub)   sub.textContent   = 'ou clique para selecionar';
  }
  var fi = document.getElementById('imp-file-info');
  if (fi) { fi.style.display = 'none'; fi.innerHTML = ''; }
  var ba = document.getElementById('imp-btn-analisar');
  if (ba) ba.disabled = true;

// ── Limpar dados ──────────────────────────────────────────
function impLimparDados() {
  var btn = document.getElementById('imp-btn-limpar');
  var res = document.getElementById('imp-limpar-resultado');
  if (!btn || !res) return;
  btn.disabled = true;
  btn.textContent = '⏳ Limpando...';
  res.textContent = '';

  if (typeof google === 'undefined' || !google.script) {
    setTimeout(function() {
      res.innerHTML = '<span style="color:#34d399">✓ Simulado (sem GAS).</span>';
      btn.textContent = '🗑 Apagar tudo';
      var ct = document.getElementById('imp-confirmar-txt');
      if (ct) ct.value = '';
    }, 800);
    return;
  }

  google.script.run
    .withFailureHandler(function(e) {
      res.innerHTML = '<span style="color:#ff5e7a">✗ Erro: ' + _esc(e.message) + '</span>';
      btn.textContent = '🗑 Apagar tudo';
    })
    .withSuccessHandler(function(r) {
      btn.textContent = '🗑 Apagar tudo';
      var ct = document.getElementById('imp-confirmar-txt');
      if (ct) ct.value = '';
      if (!r || !r.success) {
        res.innerHTML = '<span style="color:#ff5e7a">✗ ' + _esc(r && r.error ? r.error : 'Erro') + '</span>';
        return;
      }
      var det = (r.data && r.data.detalhes) ? r.data.detalhes : [];
      res.innerHTML = '<span style="color:#34d399">✓ Limpeza concluída!</span> ' +
        det.map(function(d){ return _esc(d); }).join(' · ');
      _toast('Dados apagados. Agora faça o upload da base oficial.', 'success');
    })
    .imp_limparDados(App.session ? App.session.token || '' : '');
}

// ── Navegação entre steps ─────────────────────────────────
function impGoStep(n) {
  var ids = ['upload','analise','turmas','importando','resultado'];
  ids.forEach(function(id, i) {
    var sec = document.getElementById('imp-sec-'+id);
    if (sec) sec.classList.toggle('active', i+1===n);
    var st = document.getElementById('imp-step-'+(i+1));
    if (!st) return;
    st.classList.remove('active','done');
    if (i+1 < n) st.classList.add('done');
    if (i+1 === n) st.classList.add('active');
  });
}

// ── Upload / parse do arquivo (listeners registrados em edOpenModalImportador) ──
function impHandleFile(file) {
  if (typeof XLSX === 'undefined') {
    _toast('Biblioteca XLSX não carregada. Verifique a conexão.', 'error');
    return;
  }
  var reader = new FileReader();
  reader.onload = function(e2) {
    try {
      var wb = XLSX.read(e2.target.result, { type: 'binary', cellDates: false });
      var ws = wb.Sheets[wb.SheetNames[0]];
      _imp.rawData = XLSX.utils.sheet_to_json(ws, { defval: '' });
      if (!_imp.rawData.length) { _toast('Planilha vazia ou formato inválido.', 'error'); return; }

      var dz = document.getElementById('imp-dropzone');
      if (dz) dz.classList.add('dz-ok');
      var icon  = document.getElementById('imp-dz-icon');
      var title = document.getElementById('imp-dz-title');
      var sub   = document.getElementById('imp-dz-sub');
      if (icon)  icon.textContent  = '✅';
      if (title) title.textContent = file.name;
      if (sub)   sub.textContent   = _imp.rawData.length + ' registros encontrados';

      var fi = document.getElementById('imp-file-info');
      if (fi) {
        fi.style.display = 'flex';
        fi.innerHTML =
          '<div class="imp-stat-pill"><div class="dot" style="background:var(--accent)"></div>'+_imp.rawData.length+' linhas</div>'+
          '<div class="imp-stat-pill"><div class="dot" style="background:#f0b429"></div>'+_esc(file.name)+'</div>'+
          '<div class="imp-stat-pill"><div class="dot" style="background:var(--text-muted)"></div>'+(file.size/1024).toFixed(1)+' KB</div>';
      }

      var ba = document.getElementById('imp-btn-analisar');
      if (ba) ba.disabled = false;

      var cols = Object.keys(_imp.rawData[0]);
      _toast('Colunas: ' + cols.slice(0,5).join(', ') + (cols.length>5?'...':''), 'success');
    } catch(err) { _toast('Erro ao ler arquivo: ' + err.message, 'error'); }
  };
  reader.readAsBinaryString(file);
}

// ── Análise / mapeamento ──────────────────────────────────
function impFmtDate(val) {
  if (!val) return '';
  var s = String(val).trim();
  var m = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if (m) return m[3]+'/'+m[2]+'/'+m[1];
  if (/^\d{2}\/\d{2}\/\d{4}$/.test(s)) return s;
  var n = parseFloat(s);
  if (!isNaN(n) && n > 1000) {
    var d = new Date(Math.round((n - 25569) * 86400 * 1000));
    return ('0'+d.getDate()).slice(-2)+'/'+('0'+(d.getMonth()+1)).slice(-2)+'/'+d.getFullYear();
  }
  return s;
}
function impIsAtivo(val) {
  if (!val) return false;
  var s = String(val).toLowerCase().trim();
  return s==='active'||s==='ativo'||s==='true'||s==='1';
}
function impBuildEndereco(row) {
  var parts = [];
  if (row.streetName)       parts.push(row.streetName);
  if (row.streetNumber)     parts.push(row.streetNumber);
  if (row.neighborhoodName) parts.push(row.neighborhoodName);
  if (row.city)             parts.push(row.city);
  if (row.state)            parts.push(row.state);
  var addr = parts.filter(Boolean).join(', ');
  var pais = [];
  if (row.parentOne) pais.push('Resp1: '+row.parentOne+(row.phoneOne?' ('+row.phoneOne+')':''));
  if (row.parentTwo) pais.push('Resp2: '+row.parentTwo+(row.phoneTwo?' ('+row.phoneTwo+')':''));
  if (pais.length) addr += (addr?' | ':'')+pais.join(' | ');
  return addr;
}

function impAnalisar() {
  _imp.mappedData = [];
  var seenNames = {};
  _imp.rawData.forEach(function(row) {
    var pos  = String(row.position||'').toLowerCase().trim();
    var tipo = (pos==='teacher'||pos==='professor') ? 'prof' : 'aluno';
    var ativo = impIsAtivo(row.status);
    var dados = {
      Nome:     String(row.name||'').trim(),
      DataNasc: impFmtDate(row.birthday),
      Classe:   String(row.classroom||'').trim(),
      Telefone: String(row.phone||'').trim(),
      Email:    String(row.email||'').trim(),
      Endereco: impBuildEndereco(row),
      Ativo:    ativo,
      CriadoEm: impFmtDate(row.date)
    };
    if (!dados.Nome) return;
    var nLow = dados.Nome.toLowerCase();
    var dup  = !!seenNames[nLow];
    seenNames[nLow] = true;
    _imp.mappedData.push({ tipo:tipo, dados:dados, ativo:ativo, dup:dup });
  });

  var alunos   = _imp.mappedData.filter(function(r){ return r.tipo==='aluno'&&!r.dup; });
  var profs    = _imp.mappedData.filter(function(r){ return r.tipo==='prof'&&!r.dup; });
  var ativos   = _imp.mappedData.filter(function(r){ return r.ativo&&!r.dup; });
  var inativos = _imp.mappedData.filter(function(r){ return !r.ativo&&!r.dup; });
  var dups     = _imp.mappedData.filter(function(r){ return r.dup; });

  var rs = document.getElementById('imp-resumo-stats');
  if (rs) rs.innerHTML =
    '<div class="imp-stat-pill"><div class="dot" style="background:var(--accent)"></div>'+alunos.length+' alunos</div>'+
    '<div class="imp-stat-pill"><div class="dot" style="background:#f0b429"></div>'+profs.length+' professores</div>'+
    '<div class="imp-stat-pill"><div class="dot" style="background:#34d399"></div>'+ativos.length+' ativos</div>'+
    '<div class="imp-stat-pill"><div class="dot" style="background:#ff5e7a"></div>'+inativos.length+' inativos</div>'+
    (dups.length?'<div class="imp-stat-pill"><div class="dot" style="background:var(--text-muted)"></div>'+dups.length+' duplicados</div>':'');

  var dupBox = document.getElementById('imp-dup-box');
  var dupMsg = document.getElementById('imp-dup-msg');
  if (dupBox && dupMsg) {
    if (dups.length) {
      dupBox.style.display = 'flex';
      var nomes = dups.map(function(d){ return d.dados.Nome; }).slice(0,5).join(', ');
      dupMsg.textContent = dups.length+' nome(s) duplicado(s): '+nomes+(dups.length>5?'...':'')+'. Serão ignorados na importação.';
    } else { dupBox.style.display = 'none'; }
  }
  var inBox = document.getElementById('imp-inat-box');
  var inMsg = document.getElementById('imp-inat-msg');
  if (inBox && inMsg) {
    if (inativos.length) {
      inBox.style.display = 'flex';
      inMsg.innerHTML = '<strong>'+inativos.length+' registros inativos</strong> serão importados com Ativo=false e não aparecerão nas listas do sistema.';
    } else { inBox.style.display = 'none'; }
  }

  var tbody = document.getElementById('imp-preview-body');
  if (tbody) {
    var html = ''; var count = 0;
    _imp.mappedData.forEach(function(r) {
      if (count >= 200) return;
      var cls = r.dup ? 'imp-row-skip' : (r.tipo==='prof' ? 'imp-row-prof' : 'imp-row-aluno');
      var tag = r.dup ? '<span class="imp-tag-skip">DUP</span>' :
                (r.tipo==='prof' ? '<span class="imp-tag-prof">Prof</span>' : '<span class="imp-tag-aluno">Aluno</span>');
      html += '<tr class="'+cls+'">'+
        '<td>'+tag+'</td>'+
        '<td>'+_esc(r.dados.Nome)+'</td>'+
        '<td>'+_esc(r.dados.Classe)+'</td>'+
        '<td>'+_esc(r.dados.Telefone)+'</td>'+
        '<td>'+_esc(r.dados.DataNasc)+'</td>'+
        '<td>'+(r.ativo?'<span style="color:#34d399">✓</span>':'<span style="color:#ff5e7a">✗</span>')+'</td>'+
      '</tr>';
      count++;
    });
    if (_imp.mappedData.length > 200)
      html += '<tr><td colspan="6" style="text-align:center;color:var(--text-muted);padding:10px;font-size:10px">... e mais '+(_imp.mappedData.length-200)+' registros</td></tr>';
    tbody.innerHTML = html;
  }

  _imp.uniqueClasses = [];
  var seenCls = {};
  _imp.mappedData.forEach(function(r) {
    if (r.dados.Classe && !seenCls[r.dados.Classe]) {
      seenCls[r.dados.Classe] = true;
      _imp.uniqueClasses.push(r.dados.Classe);
    }
  });

  impGoStep(2);
}

// ── Step 3: Mapeamento de turmas ──────────────────────────
function impGoStep3() {
  impGoStep(3);
  if (typeof google === 'undefined' || !google.script) {
    _imp.classesNew = [];
    impBuildClassMap();
    return;
  }
  google.script.run
    .withFailureHandler(function() {
      _imp.classesNew = [];
      impBuildClassMap();
      _toast('Não foi possível carregar turmas. Todas serão criadas.', 'error');
    })
    .withSuccessHandler(function(r) {
      _imp.classesNew = (r && r.success && r.data) ? r.data : [];
      impBuildClassMap();
    })
    .imp_listarClasses();
}

function impBuildClassMap() {
  var list = document.getElementById('imp-class-map-list');
  if (!list) return;
  if (!_imp.uniqueClasses.length) {
    list.innerHTML = '<div style="color:var(--text-muted);font-size:11px;padding:8px">Nenhuma turma encontrada na planilha.</div>';
    return;
  }
  var optsHtml = '<option value="__new__">— Criar nova turma —</option>';
  _imp.classesNew.forEach(function(c) {
    optsHtml += '<option value="'+_esc(c.ID)+'">'+_esc(c.Nome)+'</option>';
  });
  var html = '';
  _imp.uniqueClasses.forEach(function(cls) {
    html += '<div class="imp-class-map-row">'+
      '<div class="imp-class-map-old">'+_esc(cls)+'</div>'+
      '<div class="imp-class-map-arrow">→</div>'+
      '<select class="imp-class-map-select" data-old="'+_esc(cls)+'">'+optsHtml+'</select>'+
    '</div>';
  });
  list.innerHTML = html;
  // Auto-match por nome
  list.querySelectorAll('select').forEach(function(sel) {
    var oldName = sel.getAttribute('data-old');
    for (var i = 0; i < _imp.classesNew.length; i++) {
      if (_imp.classesNew[i].Nome.toLowerCase().trim() === (oldName||'').toLowerCase().trim()) {
        sel.value = _imp.classesNew[i].ID;
        break;
      }
    }
  });
}

// ── Importação ────────────────────────────────────────────
function impIniciarImportacao() {
  document.querySelectorAll('.imp-class-map-select').forEach(function(sel) {
    _imp.classMapping[sel.getAttribute('data-old')] = sel.value;
  });
  impGoStep(4);
  setTimeout(impExecutar, 300);
}

function impExecutar() {
  var registros = _imp.mappedData.filter(function(r){ return !r.dup; });
  var total = registros.length;
  var ok = 0, erros = 0, dup = 0, idx = 0;
  var log = document.getElementById('imp-prog-log');

  function _log(msg, cls) {
    if (!log) return;
    var line = document.createElement('div');
    line.className = cls || '';
    line.textContent = msg;
    log.appendChild(line);
    log.scrollTop = log.scrollHeight;
  }
  function _setProgress(done) {
    var pct = Math.round(done/total*100);
    var bar = document.getElementById('imp-prog-bar');
    var pctEl = document.getElementById('imp-prog-pct');
    var lblEl = document.getElementById('imp-prog-label');
    if (bar) bar.style.width = pct + '%';
    if (pctEl) pctEl.textContent = pct + '%';
    if (lblEl) lblEl.textContent = 'Importando '+done+'/'+total+'...';
  }
  function _finalize() {
    var lblEl = document.getElementById('imp-prog-label');
    var pctEl = document.getElementById('imp-prog-pct');
    var bar = document.getElementById('imp-prog-bar');
    if (lblEl) lblEl.textContent = 'Concluído!';
    if (pctEl) pctEl.textContent = '100%';
    if (bar) bar.style.width = '100%';

    var rmsg = document.getElementById('imp-resultado-msg');
    if (rmsg) rmsg.innerHTML =
      '<strong>'+ok+' registros importados</strong> com sucesso.'+
      (dup ? ' <span style="color:#f0b429">'+dup+' duplicados ignorados.</span>' : '')+
      (erros ? ' <span style="color:#ff5e7a">'+erros+' erros.</span>' : '');

    var alunosImp = registros.filter(function(r){ return r.tipo==='aluno'; }).length;
    var profsImp  = registros.filter(function(r){ return r.tipo==='prof'; }).length;
    var rStats = document.getElementById('imp-resultado-stats');
    if (rStats) rStats.innerHTML =
      '<div class="imp-stat-pill"><div class="dot" style="background:var(--accent)"></div>'+alunosImp+' alunos</div>'+
      '<div class="imp-stat-pill"><div class="dot" style="background:#f0b429"></div>'+profsImp+' professores</div>'+
      '<div class="imp-stat-pill"><div class="dot" style="background:#34d399"></div>'+ok+' importados</div>'+
      (erros?'<div class="imp-stat-pill"><div class="dot" style="background:#ff5e7a"></div>'+erros+' falhas</div>':'');
    impGoStep(5);
  }

  function processNext() {
    if (idx >= total) { _finalize(); return; }
    var r = registros[idx++];
    var oldClasse  = r.dados.Classe;
    var classeVal  = _imp.classMapping[oldClasse] || '__new__';
    var isNew      = classeVal === '__new__';
    var classeID   = isNew ? '' : classeVal;
    var nomeTurma  = isNew ? oldClasse : null;
    var dados = {
      Nome:     r.dados.Nome,
      DataNasc: r.dados.DataNasc,
      ClasseID: classeID,
      Telefone: r.dados.Telefone,
      Email:    r.dados.Email,
      Endereco: r.dados.Endereco,
      Ativo:    r.dados.Ativo !== undefined ? r.dados.Ativo : r.ativo,
      CriadoEm: r.dados.CriadoEm
    };
    _setProgress(idx);

    if (typeof google === 'undefined' || !google.script) {
      setTimeout(function() {
        ok++;
        _log('✓ ' + r.dados.Nome + ' (' + r.tipo + ')', 'ok');
        processNext();
      }, 15);
      return;
    }

    var fn = r.tipo === 'prof' ? 'imp_importarProfessor' : 'imp_importarAluno';
    google.script.run
      .withFailureHandler(function(e) {
        erros++;
        _log('✗ ' + r.dados.Nome + ': ' + e.message, 'err');
        processNext();
      })
      .withSuccessHandler(function(res) {
        if (res && res.success) {
          ok++;
          _log('✓ ' + r.dados.Nome + ' (' + r.tipo + ')', 'ok');
        } else {
          var msg = res && res.error ? res.error : 'erro';
          if (msg.indexOf('Duplicado') !== -1 || msg.indexOf('já existe') !== -1) {
            dup++;
            _log('⚠ ' + r.dados.Nome + ' — ' + msg, 'warn');
          } else {
            erros++;
            _log('✗ ' + r.dados.Nome + ': ' + msg, 'err');
          }
        }
        processNext();
      })
      [fn](dados, nomeTurma);
  }

  _log('🚀 Iniciando importação de ' + total + ' registros...');
  processNext();
}
// ═══════════════════════════════════════════════════════════

</script>
