/* ── UTILITÁRIOS DE DATA ── */
function mbMaskDate(val) {
  var d = val.replace(/\D/g,'').slice(0,8);
  if (d.length<=2) return d;
  if (d.length<=4) return d.slice(0,2)+'/'+d.slice(2);
  return d.slice(0,2)+'/'+d.slice(2,4)+'/'+d.slice(4);
}
function mbMaskPhone(val) {
  var d = val.replace(/\D/g,'').slice(0,11);
  if (d.length<=2) return d;
  if (d.length<=7) return '('+d.slice(0,2)+') '+d.slice(2);
  return '('+d.slice(0,2)+') '+d.slice(2,7)+'-'+d.slice(7);
}
function mbParseDate(s) {
  if (!s) return null;
  var p = s.split('/');
  if (p.length<3) return null;
  return new Date(p[2], p[1]-1, p[0]);
}
function mbIsHoje(s) {
  var d = mbParseDate(s); if (!d) return false;
  var t = new Date();
  return d.getDate()===t.getDate() && d.getMonth()===t.getMonth();
}
function mbNesteMes(s) {
  var d = mbParseDate(s); if (!d) return false;
  return d.getMonth() === new Date().getMonth();
}
function mbDiasAniv(s) {
  var d = mbParseDate(s); if (!d) return null;
  var t = new Date();
  var prox = new Date(t.getFullYear(), d.getMonth(), d.getDate());
  if (prox < t) prox.setFullYear(t.getFullYear()+1);
  return Math.ceil((prox-t)/(864e5));
}
function mbIdade(s) {
  var d = mbParseDate(s); if (!d) return null;
  var t = new Date();
  var a = t.getFullYear()-d.getFullYear();
  var m = t.getMonth()-d.getMonth();
  if (m<0||(m===0&&t.getDate()<d.getDate())) a--;
  return a;
}
function mbGerarRol(lista) {
  if (!lista.length) return '0001';
  var max = Math.max.apply(null, lista.map(function(m){ return parseInt(m.Rol||'0')||0; }));
  return String(max+1).padStart(4,'0');
}
function mbEsc(s) {
  if (s==null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ── PERSISTÊNCIA GAS ── */
function mbLoadFromSheet(cb) {
  if (typeof google==='undefined'||!google.script) { cb([]); return; }
  var token = App.session && App.session.token;
  google.script.run
    .withSuccessHandler(function(r){
      /* getMembros retorna {success, data:[]} via Util.ok */
      MB.membros = (r && r.success && Array.isArray(r.data)) ? r.data : [];
      if (cb) cb(MB.membros);
    })
    .withFailureHandler(function(e){
      console.error('[Membros] getMembros:', e);
      showToast('Erro ao carregar membros','error');
      MB.membros = [];
      if (cb) cb([]);
    })
    .getMembros(token);
}
function mbSaveToSheet(membro, cb) {
  if (typeof google==='undefined'||!google.script) { if(cb)cb({success:true}); return; }
  var token = App.session && App.session.token;
  google.script.run
    .withSuccessHandler(function(r){ if(cb)cb(r); })
    .withFailureHandler(function(e){
      console.error('[Membros] salvarMembro:',e);
      if(cb)cb({success:false, error: e.message||String(e)});
    })
    .salvarMembro(token, membro);
}
function mbDeleteFromSheet(id, cb) {
  if (typeof google==='undefined'||!google.script) { if(cb)cb({success:true}); return; }
  var token = App.session && App.session.token;
  google.script.run
    .withSuccessHandler(function(r){ if(cb)cb(r); })
    .withFailureHandler(function(e){ console.error('[Membros] deletarMembro:',e); showToast('Erro ao deletar membro','error'); })
    .deletarMembro(token, id);
}

═══════════════════════════════════════════════════════ */
function _mbBuildLista() {
  var lista = MB.membros.filter(function(m){
    var s = (m.Nome||'').toLowerCase().indexOf(MB.search.toLowerCase())!==-1;
    if (MB.filtroStatus==='ativos')   return s && m.Ativo!==false && m.Ativo!=='FALSE';
    if (MB.filtroStatus==='inativos') return s && (m.Ativo===false||m.Ativo==='FALSE');
    return s;
  });

  var total    = MB.membros.length;
  var ativos   = MB.membros.filter(function(m){ return m.Ativo!==false&&m.Ativo!=='FALSE'; }).length;
  var inativos = total - ativos;
  var aniv     = MB.membros.filter(function(m){ return mbNesteMes(m.Nascimento); }).length;
  var semFoto  = MB.membros.filter(function(m){ return !m.Foto; }).length;

  /* ── KPIs ── */
  var kpis =
    '<div class="ed-stats" style="grid-template-columns:repeat(5,1fr);margin-bottom:20px">'+
      _mbKpi('mb-kpi-total',    'users',         total,    'Total')+
      _mbKpi('mb-kpi-ativos',   'check-circle',  ativos,   'Ativos')+
      _mbKpi('mb-kpi-inativos', 'x-circle',      inativos, 'Inativos')+
      _mbKpi('mb-kpi-aniv',     'cake',          aniv,     'Aniv. mês')+
      _mbKpi('mb-kpi-semfoto',  'image-off',     semFoto,  'Sem foto')+
    '</div>';

  /* ── Aniversariantes ── */
  var anivHtml = _mbBuildAniversariantes();

  /* ── Toolbar ── */
  var toolbar =
    '<div style="display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:16px">'+
      '<div>'+
        '<div class="ed-section-title">Todos os Membros</div>'+
        '<div class="ed-section-sub">'+lista.length+' resultado(s) de '+total+' cadastrado(s)</div>'+
      '</div>'+
      '<div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">'+
        '<button class="btn btn-primary btn-sm" onclick="_mbNovoMembro()">'+
          '<i data-lucide="user-plus" style="width:15px;height:15px"></i><span class="btn-text">Novo Membro</span>'+
        '</button>'+
        '<button class="btn btn-secondary btn-sm" onclick="mbAbrirEnvioMassa()" title="Solicitar fotos em massa">'+
          '<i data-lucide="message-circle" style="width:15px;height:15px"></i>'+
          '<span class="btn-text" style="color:inherit">Solicitar Fotos</span>'+
        '</button>'+
        '<button class="btn btn-secondary btn-sm" onclick="_mbRenderTab(\'lote\')" title="Imprimir em lote">'+
          '<i data-lucide="printer" style="width:15px;height:15px"></i>'+
        '</button>'+
        '<button class="btn btn-ghost btn-sm" onclick="mbExportarJSON()" title="Backup JSON">'+
          '<i data-lucide="download" style="width:15px;height:15px"></i>'+
        '</button>'+
        '<label class="btn btn-ghost btn-sm" title="Importar JSON" style="cursor:pointer">'+
          '<i data-lucide="upload" style="width:15px;height:15px"></i>'+
          '<input type="file" accept=".json" onchange="mbImportarJSON(event)" style="display:none">'+
        '</label>'+
      '</div>'+
    '</div>';

  /* ── Busca + filtro ── */
  var busca =
    '<div style="display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap">'+
      '<div class="ed-search-wrap" style="flex:1;min-width:220px;margin-bottom:0">'+
        '<span class="ed-search-icon"><i data-lucide="search" style="width:16px;height:16px"></i></span>'+
        '<input class="ed-search" type="text" placeholder="Buscar por nome, função..." value="'+mbEsc(MB.search)+'" oninput="MB.search=this.value;_mbRenderTab(\'lista\')">'+
      '</div>'+
      '<select class="ed-filter-select" style="flex:0 0 auto;min-width:130px" onchange="MB.filtroStatus=this.value;_mbRenderTab(\'lista\')">'+
        '<option value="todos"'  +(MB.filtroStatus==='todos'   ?' selected':'')+'>Todos</option>'+
        '<option value="ativos"' +(MB.filtroStatus==='ativos'  ?' selected':'')+'>Ativos</option>'+
        '<option value="inativos"'+(MB.filtroStatus==='inativos'?' selected':'')+'>Inativos</option>'+
      '</select>'+
    '</div>';

  /* ── Lista ── */
  var listaHtml = '';
  if (!lista.length) {
    listaHtml = '<div class="mb-empty"><span class="mb-empty-icon">📋</span>'+
      (total===0 ? 'Nenhum membro cadastrado ainda.' : 'Nenhum resultado encontrado.') +'</div>';
  } else {
    listaHtml = '<div class="ed-list">';
    lista.forEach(function(m){
      var ativo = m.Ativo!==false&&m.Ativo!=='FALSE';
      var bdHoje = mbIsHoje(m.Nascimento);
      listaHtml +=
        '<div class="ed-list-item" style="cursor:pointer" onclick="mbVerDetalhe(\''+mbEsc(m.ID)+'\')">'+
          '<div class="mb-avatar">'+
            (m.Foto
              ? '<img src="'+mbEsc(m.Foto)+'" alt="'+mbEsc(m.Nome)+'" style="transform:scale('+(m.FotoZoom||1)+');object-position:'+(m.FotoX||50)+'% '+(m.FotoY||50)+'%">'
              : mbEsc((m.Nome||'?')[0].toUpperCase()))+
          '</div>'+
          '<div style="flex:1;min-width:0">'+
            '<div style="font-size:14px;font-weight:700;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+
              mbEsc(m.Nome||'—')+
              (bdHoje?'&nbsp;🎂':'')+ (!m.Foto?'&nbsp;<span class="badge badge-purple" style="font-size:9px">SEM FOTO</span>':'')+
            '</div>'+
            '<div style="font-size:12px;color:var(--text-muted);margin-top:2px">ROL '+mbEsc(m.Rol||'—')+' · '+mbEsc(m.Funcao||'Membro')+' · '+mbEsc(m.Cidade||'')+'/'+mbEsc(m.Estado||'')+'</div>'+
          '</div>'+
          '<span class="badge '+( ativo?'badge-green':'badge-red')+'">'+( ativo?'Ativo':'Inativo')+'</span>'+
          '<div class="ed-item-actions" style="display:flex;gap:6px">'+
            '<button class="btn btn-ghost btn-sm" style="width:34px;padding:0" onclick="event.stopPropagation();mbEditarMembro(\''+mbEsc(m.ID)+'\')" title="Editar">'+
              '<i data-lucide="pencil" style="width:15px;height:15px"></i>'+
            '</button>'+
            '<button class="btn btn-ghost btn-sm" style="width:34px;padding:0" onclick="event.stopPropagation();mbVerCartao(\''+mbEsc(m.ID)+'\')" title="Cartão">'+
              '<i data-lucide="credit-card" style="width:15px;height:15px"></i>'+
            '</button>'+
          '</div>'+
        '</div>';
    });
    listaHtml += '</div>';
  }

  return kpis + anivHtml + toolbar + busca + listaHtml;
}

function _mbKpi(klass, icon, val, label) {
  return '<div class="ed-stat-card '+klass+'">'+
    '<div class="ed-stat-icon-wrap"><i data-lucide="'+icon+'" class="ed-stat-icon"></i></div>'+
    '<div class="ed-stat-body">'+
      '<div class="ed-stat-value">'+val+'</div>'+
      '<div class="ed-stat-label">'+label+'</div>'+
    '</div>'+
  '</div>';
}

function _mbBuildAniversariantes() {
  var lista = MB.membros.filter(function(m){ return mbNesteMes(m.Nascimento); })
    .sort(function(a,b){ return (mbDiasAniv(a.Nascimento)||999)-(mbDiasAniv(b.Nascimento)||999); });
  if (!lista.length) return '';

  var html =
    '<div style="background:var(--glass-bg-premium);border:var(--glass-border-premium);border-radius:16px;padding:16px;backdrop-filter:blur(14px);margin-bottom:20px">'+
    '<div class="ed-section-header" style="margin-bottom:12px">'+
      '<div><div class="ed-section-title">🎂 Aniversariantes do Mês</div></div>'+
      '<span class="badge badge-gold">'+lista.length+'</span>'+
    '</div>'+
    '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:8px">';

  lista.forEach(function(m){
    var dias = mbDiasAniv(m.Nascimento);
    var hoje = dias===0;
    html +=
      '<div class="mb-bdaycard'+(hoje?' hoje':'')+'" onclick="mbVerDetalhe(\''+mbEsc(m.ID)+'\')">'+
        '<div class="mb-avatar">'+
          (m.Foto
            ? '<img src="'+mbEsc(m.Foto)+'" alt="'+mbEsc(m.Nome)+'">'
            : mbEsc((m.Nome||'?')[0].toUpperCase()))+
        '</div>'+
        '<div style="flex:1;min-width:0">'+
          '<div style="font-size:13px;font-weight:700;color:var(--text)">'+mbEsc(m.Nome)+'</div>'+
          '<div style="font-size:11px;color:var(--text-muted);margin-top:2px">'+mbEsc(m.Nascimento)+' · Fará '+(( mbIdade(m.Nascimento)||0)+1)+' anos</div>'+
        '</div>'+
        '<span class="badge '+(hoje?'badge-gold':'badge-teal')+'" style="flex-shrink:0">'+
          (hoje?'🎉 HOJE!':dias+' dia'+(dias>1?'s':''))+
        '</span>'+
      '</div>';
  });

  return html + '</div></div>';
}

/* ─── helpers de navegação ─── */
function mbVerDetalhe(id) {
  MB.selected = MB.membros.filter(function(m){ return String(m.ID)===String(id); })[0]||null;
  if (!MB.selected) return;
  _mbRenderTab('detalhe');
}
function mbVerCartao(id) {
  MB.selected = MB.membros.filter(function(m){ return String(m.ID)===String(id); })[0]||null;
  if (!MB.selected) return;
  _mbRenderTab('cartao');
}
function mbEditarMembro(id) {
  MB.editId = id;
  var m = MB.membros.filter(function(m){ return String(m.ID)===String(id); })[0];
  if (!m) return;
  MB.fotoData = m.Foto||'';
  MB.fotoZoom = parseFloat(m.FotoZoom)||1;
  MB.fotoX    = parseFloat(m.FotoX)||50;
  MB.fotoY    = parseFloat(m.FotoY)||50;
  _mbRenderTab('form');
}
function _mbNovoMembro() {
  MB.editId  = null;
  MB.fotoData=''; MB.fotoZoom=1; MB.fotoX=50; MB.fotoY=50;
  _mbRenderTab('form');
}

/* ── Foto handlers ── */
function mbFotoChange(e) {
  var file = e.target.files[0]; if (!file) return;
  var reader = new FileReader();
  reader.onloadend = function(){
    MB.fotoData = reader.result;
    mbAtualizarFotoPreview();
    var zw = document.getElementById('mb-zoom-wrap');
    if (zw) zw.style.display='block';
  };
  reader.readAsDataURL(file);
}
function mbAtualizarFotoPreview() {
  var wrap = document.getElementById('mb-foto-preview-wrap');
  if (!wrap) return;
  if (MB.fotoData) {
    wrap.innerHTML =
      '<img id="mb-foto-preview-img" src="'+MB.fotoData+'" style="transform:scale('+MB.fotoZoom+');object-position:'+MB.fotoX+'% '+MB.fotoY+'%">'+
      '<button class="mb-foto-remove" onclick="event.stopPropagation();mbRemoverFoto()" title="Remover foto">✕</button>';
    wrap.style.cursor='grab';
  } else {
    wrap.innerHTML='<div class="mb-foto-preview-placeholder">👤</div>';
    wrap.style.cursor='default';
  }
}
function mbRemoverFoto() {
  MB.fotoData=''; MB.fotoZoom=1; MB.fotoX=50; MB.fotoY=50;
  mbAtualizarFotoPreview();
  var zw=document.getElementById('mb-zoom-wrap'); if(zw) zw.style.display='none';
}
function mbFotoMouseDown(e) {
  if (!MB.fotoData) return;
  MB.fotoArrastrando=true;
  MB.fotoArrastarStart={x:e.clientX,y:e.clientY};
  var wrap=document.getElementById('mb-foto-preview-wrap');
  if (wrap) wrap.style.cursor='grabbing';
  function move(ev) {
    if (!MB.fotoArrastrando) return;
    var dx=(ev.clientX-MB.fotoArrastarStart.x)*0.5;
    var dy=(ev.clientY-MB.fotoArrastarStart.y)*0.5;
    MB.fotoX=Math.max(0,Math.min(100,MB.fotoX+dx));
    MB.fotoY=Math.max(0,Math.min(100,MB.fotoY+dy));
    MB.fotoArrastarStart={x:ev.clientX,y:ev.clientY};
    var img=document.getElementById('mb-foto-preview-img');
    if (img) img.style.objectPosition=MB.fotoX+'% '+MB.fotoY+'%';
  }
  function up() {
    MB.fotoArrastrando=false;
    var w=document.getElementById('mb-foto-preview-wrap');
    if (w) w.style.cursor='grab';
    document.removeEventListener('mousemove',move);
    document.removeEventListener('mouseup',up);
  }
  document.addEventListener('mousemove',move);
  document.addEventListener('mouseup',up);
}

/* ── Salvar formulário ── */
function mbSalvarForm() {
  var req = ['nome','sexo','nascimento','nomeMae','nomePai','estadoCivil',
             'batismo','igrejaOrigen','funcao','rua','numero','bairro',
             'cidade','estado','cep','celular'];
  var ok = true;
  req.forEach(function(k){
    var el  = document.getElementById('mbf-'+k);
    var err = document.getElementById('mbfe-'+k);
    var vl  = el ? el.value.trim() : '';
    if (!vl) {
      ok = false;
      if (el)  el.closest('.field').classList.add('has-error');
      if (err) err.style.display='block';
    } else {
      if (el)  el.closest('.field').classList.remove('has-error');
      if (err) err.style.display='none';
    }
  });
  if (!ok) { showToast('Preencha todos os campos obrigatórios','warning'); return; }

  var btn = document.querySelector('button[onclick="mbSalvarForm()"]');
  if (btn) btn.classList.add('loading');

  var rol = (document.getElementById('mbf-rol')||{}).value||mbGerarRol(MB.membros);

  var membro = {
    ID:           MB.editId || (Date.now()+Math.random()),
    Rol:          rol.trim(),
    Nome:         document.getElementById('mbf-nome').value.trim(),
    Sexo:         document.getElementById('mbf-sexo').value,
    Nascimento:   document.getElementById('mbf-nascimento').value.trim(),
    NomeMae:      document.getElementById('mbf-nomeMae').value.trim(),
    NomePai:      document.getElementById('mbf-nomePai').value.trim(),
    EstadoCivil:  document.getElementById('mbf-estadoCivil').value,
    Batismo:      document.getElementById('mbf-batismo').value.trim(),
    IgrejaOrigen: document.getElementById('mbf-igrejaOrigen').value.trim(),
    Funcao:       document.getElementById('mbf-funcao').value.trim(),
    Rua:          document.getElementById('mbf-rua').value.trim(),
    Numero:       document.getElementById('mbf-numero').value.trim(),
    Bairro:       document.getElementById('mbf-bairro').value.trim(),
    Cidade:       document.getElementById('mbf-cidade').value.trim(),
    Estado:       document.getElementById('mbf-estado').value,
    CEP:          document.getElementById('mbf-cep').value.trim(),
    Celular:      document.getElementById('mbf-celular').value.trim(),
    Email:        document.getElementById('mbf-email').value.trim(),
    RG:           document.getElementById('mbf-rg').value.trim(),
    CPF:          document.getElementById('mbf-cpf').value.trim(),
    Foto:         MB.fotoData,
    FotoZoom:     MB.fotoZoom,
    FotoX:        MB.fotoX,
    FotoY:        MB.fotoY,
    Ativo:        MB.editId ? (MB.membros.filter(function(x){return String(x.ID)===String(MB.editId);})[0]||{}).Ativo!==false : true
  };

  mbSaveToSheet(membro, function(){
    if (MB.editId) {
      MB.membros = MB.membros.map(function(x){ return String(x.ID)===String(MB.editId)?membro:x; });
      showToast('Membro atualizado com sucesso','success');
    } else {
      MB.membros.push(membro);
      showToast('Membro cadastrado com sucesso','success');
      /* oferecer WhatsApp se houver celular e sem foto */
      if (membro.Celular && !membro.Foto) {
        setTimeout(function(){ mbAbrirWhatsApp(membro.ID); }, 600);
      }
    }
    MB.editId=null; MB.fotoData=''; MB.fotoZoom=1; MB.fotoX=50; MB.fotoY=50;
    _mbRenderTab('lista');
  });
}

/* ── Toggle ativo ── */
function mbToggleAtivo(id) {
  var idx = MB.membros.findIndex(function(m){ return String(m.ID)===String(id); });
  if (idx<0) return;
  var m = MB.membros[idx];
  m.Ativo = (m.Ativo===false||m.Ativo==='FALSE') ? true : false;
  MB.membros[idx] = m;
  mbSaveToSheet(m, function(){
    showToast(m.Ativo?'Membro ativado':'Membro desativado','info');
    MB.selected = m;
    _mbRenderTab('detalhe');
  });
}

/* ── Deletar ── */
function mbConfirmarDeletar(id) {
  var m = MB.membros.filter(function(x){ return String(x.ID)===String(id); })[0];
  if (!m) return;
  mbModalConfirm(
    '🗑️ Deletar membro',
    'Tem certeza que deseja excluir <strong>'+mbEsc(m.Nome)+'</strong>? Esta ação não pode ser desfeita.',
    'danger',
    function(){ mbDeletarMembro(id); }
  );
}
function mbDeletarMembro(id) {
  mbDeleteFromSheet(id, function(){
    MB.membros = MB.membros.filter(function(m){ return String(m.ID)!==String(id); });
    showToast('Membro excluído','success');
    _mbRenderTab('lista');
  });
}

            '<i data-lucide="printer" style="width:15px;height:15px"></i> Imprimir'+
          '</button>'+
        '</div>'+
      '</div>'+

      /* Dicas */
      '<div style="background:var(--gold-dim);border:1px solid var(--gold-border-high);border-radius:10px;padding:12px 16px;font-size:12px;color:var(--text-muted);margin-bottom:16px;line-height:1.6">'+
        '💡 Frente e verso ficam lado a lado automaticamente. Até 4 membros (8 cartões) por página A4. Cada cartão: 85.6mm × 53.98mm (padrão internacional).'+
      '</div>'+

      '<div style="display:flex;flex-direction:column;gap:8px" id="mb-print-lista">'+listaHtml+'</div>'+
    '</div>'+

    /* Container de impressão (gerado dinamicamente no preview) */
    '<div class="mb-print-container" id="mb-print-container-lote"></div>'
  );
}

function mbTogglePrintSel(id) {
  var idx = MB.printSelecionados.indexOf(String(id));
  if (idx===-1) MB.printSelecionados.push(String(id));
  else MB.printSelecionados.splice(idx,1);
  _mbRenderTab('lote');
}
function mbToggleTodosPrint() {
  var ativos = MB.membros.filter(function(m){ return m.Ativo!==false&&m.Ativo!=='FALSE'; });
  if (MB.printSelecionados.length===ativos.length) MB.printSelecionados=[];
  else MB.printSelecionados = ativos.map(function(m){ return String(m.ID); });
  _mbRenderTab('lote');
}
function mbPreviewImpressao() {
  var selecionados = MB.membros.filter(function(m){ return MB.printSelecionados.indexOf(String(m.ID))!==-1; });
  if (!selecionados.length) return;

  var cont = document.getElementById('mb-print-container-lote');
  if (!cont) return;

  /* 4 membros por página = 8 cartões (frente+verso) */
  var paginas = [];
  for (var i=0; i<selecionados.length; i+=4) paginas.push(selecionados.slice(i,i+4));

  var html = paginas.map(function(pag){
    return '<div class="mb-print-page">'+
      pag.map(function(m){
        return '<div class="mb-print-row">'+
          '<div class="mb-print-card">'+mbCardHtml(m,false,true)+'</div>'+
          '<div class="mb-print-card">'+mbCardHtml(m,true,true)+'</div>'+
        '</div>';
      }).join('')+
    '</div>';
  }).join('');

  cont.innerHTML = html;
  showToast('Preview pronto — clique em Imprimir','success');
  window.scrollTo({top:0,behavior:'smooth'});
}

  if (!m) return;
  var fone = (m.Celular||'').replace(/\D/g,'');
  if (!fone||fone.length<10) { showToast('Telefone inválido','error'); return; }

  var msg = '✅ *CADASTRO CONCLUÍDO COM SUCESSO!*\n\n'+
    'Olá *'+m.Nome.split(' ')[0]+'*! 👋\n\n'+
    'Seu cadastro na Igreja *AD Fonte da Salvação* foi finalizado.\n\n'+
    '🎫 *ROL Nº '+m.Rol+'*\n'+
    '👤 *Nome:* '+m.Nome+'\n'+
    '📋 *Função:* '+(m.Funcao||'Membro')+'\n\n'+
    '📸 *PENDÊNCIA: FOTO 3X4*\n\n'+
    'Para emitirmos sua carteirinha, precisamos de uma *foto 3x4 recente* com:\n'+
    '✓ Boa qualidade\n✓ Fundo claro\n✓ Rosto centralizado\n\n'+
    'Por favor, *envie sua foto respondendo esta mensagem*.\n\n'+
    'Deus abençoe! 🙏';

}

      '</div>'+
      '<div style="background:var(--gold-dim);border:1px solid var(--gold-border-high);border-radius:10px;padding:14px;text-align:center">'+

var _mbWzEnviados = 0;
function mbEnviarWZMassa(id, el) {
  var m = MB.membros.filter(function(x){ return String(x.ID)===String(id); })[0];
  if (!m) return;
  if (el && el.classList.contains('sent')) return;
  mbAbrirWhatsApp(id);
  if (el) {
    el.classList.add('sent');
    el.style.opacity='.6';
    var badge = el.querySelector('span');
    if (badge) { badge.textContent='✓ Enviado'; badge.style.color='var(--success)'; }
    _mbWzEnviados++;
    var env=document.getElementById('mbwz-enviados'); if(env) env.textContent=_mbWzEnviados;
    var total=parseInt((document.getElementById('mbwz-total')||{}).textContent||'0');
    var fat=document.getElementById('mbwz-faltam'); if(fat) fat.textContent=Math.max(0,total-_mbWzEnviados);
  }
}

/* ═══════════════════════════════════════════════════════
   IMPORTAÇÃO / EXPORTAÇÃO JSON
═══════════════════════════════════════════════════════ */
function mbExportarJSON() {
  if (!MB.membros.length) { showToast('Sem dados para exportar','warning'); return; }
  var json = JSON.stringify(MB.membros, null, 2);
  var blob = new Blob([json],{type:'application/json'});
  var url  = URL.createObjectURL(blob);
  var a    = document.createElement('a');
  a.href   = url;
  a.download = 'Backup_Membros_'+new Date().toISOString().split('T')[0]+'.json';
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
  showToast('Backup gerado com sucesso','success');
}

/* ── Normaliza registro do backup (camelCase / campos antigos) → PascalCase da sheet ── */
function _mbNormalizarRegistro(m) {
  var id = m.ID || m.id || (Date.now() + Math.random());
  return {
    ID:           id,
    Rol:          (m.Rol          || m.rol          || '').toString().trim(),
    Nome:         (m.Nome         || m.nome         || '').toString().trim(),
    Sexo:         (m.Sexo         || m.sexo         || '').toString().trim(),
    Nascimento:   (m.Nascimento   || m.nascimento   || '').toString().trim(),
    NomeMae:      (m.NomeMae      || m.nomeMae      || '').toString().trim(),
    NomePai:      (m.NomePai      || m.nomePai      || '').toString().trim(),
    EstadoCivil:  (m.EstadoCivil  || m.estadoCivil  || '').toString().trim(),
    Batismo:      (m.Batismo      || m.batismo      || '').toString().trim(),
    IgrejaOrigen: (m.IgrejaOrigen || m.igrejaOrigen || m.Igreja || m.igreja || '').toString().trim(),
    Funcao:       (m.Funcao       || m.funcao       || '').toString().trim(),
    Rua:          (m.Rua          || m.rua          || '').toString().trim(),
    Numero:       (m.Numero       || m.numero       || '').toString().trim(),
    Bairro:       (m.Bairro       || m.bairro       || '').toString().trim(),
    Cidade:       (m.Cidade       || m.cidade       || '').toString().trim(),
    Estado:       (m.Estado       || m.estado       || '').toString().trim(),
    CEP:          (m.CEP          || m.cep          || '').toString().trim(),
    Celular:      (m.Celular      || m.celular      || '').toString().trim(),
    Email:        (m.Email        || m.email        || '').toString().trim(),
    RG:           (m.RG           || m.rg           || '').toString().trim(),
    CPF:          (m.CPF          || m.cpf          || '').toString().trim(),
    Foto:         (m.Foto         || m.foto         || '').toString(),
    FotoZoom:     parseFloat(m.FotoZoom || m.fotoZoom || 1) || 1,
    FotoX:        parseFloat(m.FotoX    || m.fotoX    || 50) || 50,
    FotoY:        parseFloat(m.FotoY    || m.fotoY    || 50) || 50,
    Ativo:        (m.Ativo !== false && m.Ativo !== 'FALSE' &&
                   m.ativo !== false && m.ativo !== 'FALSE')
  };
}

/* ── Salva membros 1 a 1, mantém modal aberto com progresso e log de erros ── */
function _mbImportarSequencial(lista, idx, ok, erros) {
  var progEl = document.getElementById('mbimport-prog');
  var okEl   = document.getElementById('mbimport-ok');
  var erroEl = document.getElementById('mbimport-erro');
  var barEl  = document.getElementById('mbimport-bar');
  var logEl  = document.getElementById('mbimport-log');
  var btnEl  = document.getElementById('mbimport-fechar');

  if (progEl) progEl.textContent = idx + ' / ' + lista.length;
  if (okEl)   okEl.textContent   = ok;
  if (erroEl) erroEl.textContent = erros;
  if (barEl)  barEl.style.width  = Math.round((idx / lista.length) * 100) + '%';

  if (idx >= lista.length) {
    if (progEl) progEl.textContent = lista.length + ' / ' + lista.length;
    if (barEl)  barEl.style.width  = '100%';
    if (btnEl)  { btnEl.disabled = false; btnEl.style.opacity = '1'; btnEl.style.cursor = 'pointer'; btnEl.textContent = 'Fechar'; }
    if (logEl && erros === 0) {
      logEl.innerHTML = '<div style="color:var(--success);font-size:12px;font-weight:600;padding:8px 0">✅ Todos os registros salvos com sucesso!</div>';
    }
    showToast('Importação concluída: ' + ok + ' salvo(s)' + (erros ? ', ' + erros + ' erro(s)' : ''), ok > 0 ? 'success' : 'error');
    mbLoadFromSheet(function() { _mbRenderTab('lista'); });
    return;
  }

  var membro = lista[idx];
  mbSaveToSheet(membro, function(r) {
    var sucesso = r && r.success !== false;
    if (sucesso) {
      ok++;
      var i = MB.membros.findIndex(function(x) { return String(x.ID) === String(membro.ID); });
      if (i >= 0) MB.membros[i] = membro; else MB.membros.push(membro);
    } else {
      erros++;
      if (logEl) {
        var li = document.createElement('div');
        li.style.cssText = 'font-size:11px;color:var(--danger);padding:3px 0;border-bottom:1px solid var(--border)';
        li.textContent = '✗ ' + (membro.Nome || '(sem nome)') + ' — ' + (r && r.error ? r.error : 'erro desconhecido');
        logEl.appendChild(li);
      }
    }
    _mbImportarSequencial(lista, idx + 1, ok, erros);
  });
}

function mbImportarJSON(e) {
  var file = e.target.files[0]; if (!file) return;
  var reader = new FileReader();
  reader.onload = function(ev) {
    try {
      var data = JSON.parse(ev.target.result);
      if (!Array.isArray(data)) { showToast('Arquivo inválido — precisa ser um array JSON', 'error'); e.target.value = ''; return; }

      var maxRol = MB.membros.length
        ? Math.max.apply(null, MB.membros.map(function(m) { return parseInt(m.Rol || '0') || 0; }))
        : 0;
      var novos = data.map(function(m) {
        var norm = _mbNormalizarRegistro(m);
        if (!norm.Rol) { maxRol++; norm.Rol = String(maxRol).padStart(4, '0'); }
        return norm;
      });

      /* Modal de progresso — fica aberto até o fim */
      var id = 'mb-modal-dinamico';
      var ex = document.getElementById(id); if (ex) ex.remove();
      var el = document.createElement('div');
      el.id = id; el.className = 'modal-overlay open';
      el.innerHTML =
        '<div class="modal-box" style="max-width:480px">' +
          '<div style="font-size:16px;font-weight:800;color:var(--text);margin-bottom:16px">📥 Importando ' + novos.length + ' membros...</div>' +
          '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px">' +
            '<div style="background:var(--teal-dim);border:1px solid var(--teal-border);border-radius:8px;padding:12px;text-align:center">' +
              '<div style="font-size:20px;font-weight:800;color:var(--teal)" id="mbimport-prog">0 / ' + novos.length + '</div>' +
              '<div style="font-size:10px;font-weight:700;color:var(--text-muted);text-transform:uppercase">Progresso</div>' +
            '</div>' +
            '<div style="background:var(--success-dim);border:1px solid rgba(54,211,153,.25);border-radius:8px;padding:12px;text-align:center">' +
              '<div style="font-size:20px;font-weight:800;color:var(--success)" id="mbimport-ok">0</div>' +
              '<div style="font-size:10px;font-weight:700;color:var(--text-muted);text-transform:uppercase">Salvos</div>' +
            '</div>' +
            '<div style="background:var(--danger-dim);border:1px solid rgba(255,94,122,.25);border-radius:8px;padding:12px;text-align:center">' +
              '<div style="font-size:20px;font-weight:800;color:var(--danger)" id="mbimport-erro">0</div>' +
              '<div style="font-size:10px;font-weight:700;color:var(--text-muted);text-transform:uppercase">Erros</div>' +
            '</div>' +
          '</div>' +
          '<div style="background:var(--border);border-radius:4px;height:6px;margin-bottom:16px;overflow:hidden">' +
            '<div id="mbimport-bar" style="height:100%;width:0%;background:var(--teal);border-radius:4px;transition:width .3s"></div>' +
          '</div>' +
          '<div id="mbimport-log" style="max-height:140px;overflow-y:auto;font-size:11px;color:var(--text-muted);min-height:20px;margin-bottom:16px">' +
            '<div>Salvando registros na planilha...</div>' +
          '</div>' +
          '<button id="mbimport-fechar" disabled class="btn btn-secondary btn-sm btn-full" onclick="mbModalClose()" style="opacity:.4;cursor:not-allowed">Aguarde...</button>' +
        '</div>';
      document.body.appendChild(el);

      _mbImportarSequencial(novos, 0, 0, 0);

    } catch(err) {
      console.error(err);
      showToast('Erro ao ler arquivo JSON', 'error');
    }
    e.target.value = '';
  };
  reader.readAsText(file);
}

/* ═══════════════════════════════════════════════════════
   MODAL GENÉRICO (confirm + conteúdo)
═══════════════════════════════════════════════════════ */
function mbModalOpen(titulo, conteudoHtml, btnConfirm, maxW) {
  var id = 'mb-modal-dinamico';
  var ex = document.getElementById(id);
  if (ex) ex.remove();

  var bntHtml = btnConfirm
    ? '<div style="display:flex;gap:10px;margin-top:20px">'+
        '<button class="btn btn-secondary btn-sm" onclick="mbModalClose()">Cancelar</button>'+
        '<button class="btn btn-primary btn-sm" onclick="mbModalClose();('+btnConfirm+')()"><span class="btn-text">Confirmar</span></button>'+
      '</div>'
    : '<div style="margin-top:20px"><button class="btn btn-secondary btn-sm btn-full" onclick="mbModalClose()">Fechar</button></div>';

  var el = document.createElement('div');
  el.id = id;
  el.className = 'modal-overlay open';
  el.onclick = function(e){ if(e.target===el) mbModalClose(); };
  el.innerHTML =
    '<div class="modal-box" style="max-width:'+(maxW||480)+'px">'+
      '<div style="font-size:16px;font-weight:800;color:var(--text);margin-bottom:16px">'+titulo+'</div>'+
      conteudoHtml+
      bntHtml+
    '</div>';
  document.body.appendChild(el);
  if (window.lucide) lucide.createIcons();
}
function mbModalClose() {
  var el = document.getElementById('mb-modal-dinamico');
  if (el) el.remove();
  _mbWzEnviados = 0;
}

var _mbConfirmFn = null;
function mbModalConfirm(titulo, msg, tipo, fn) {
  _mbConfirmFn = fn;
  var icone = tipo==='danger' ? '⚠️' : '❓';
  var btnClass = tipo==='danger' ? 'btn-danger' : 'btn-primary';
  var html =
    '<div style="text-align:center;margin-bottom:16px;font-size:40px">'+icone+'</div>'+
    '<div style="font-size:14px;color:var(--text-muted);line-height:1.6;text-align:center">'+msg+'</div>';

  var id = 'mb-modal-confirm';
  var ex = document.getElementById(id);
  if (ex) ex.remove();

  var el = document.createElement('div');
  el.id = id;
  el.className = 'modal-overlay open';
  el.onclick = function(e){ if(e.target===el) el.remove(); };
  el.innerHTML =
    '<div class="modal-box">'+
      '<div style="font-size:16px;font-weight:800;color:var(--text);margin-bottom:16px;text-align:center">'+titulo+'</div>'+
      html+
      '<div style="display:flex;gap:10px;margin-top:20px">'+
        '<button class="btn btn-secondary btn-sm" style="flex:1" onclick="document.getElementById(\''+id+'\').remove()">Cancelar</button>'+
        '<button class="btn '+btnClass+' btn-sm" style="flex:1" onclick="document.getElementById(\''+id+'\').remove();if(_mbConfirmFn){_mbConfirmFn();}"><span class="btn-text">Confirmar</span></button>'+
      '</div>'+
    '</div>';
  document.body.appendChild(el);
}

</script>
