name: Fix login logo contrast

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Patch login logo contrast
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path

          p = Path('_login.html')
          s = p.read_text(encoding='utf-8')

          old_block = '\n'.join([
              '',
              '/* Contraste do logo no login em modo claro */',
              '[data-theme="light"] .login-logo-bg {',
              '  background: radial-gradient(circle at 38% 32%, #0F766E 0%, #0B4F49 72%);',
              '  border-color: rgba(15, 118, 110, 0.42);',
              '  box-shadow: 0 16px 40px rgba(15, 23, 42, 0.16), inset 0 1px 0 rgba(255,255,255,0.18);',
              '}',
              '[data-theme="light"] .login-logo-ring .app-logo-img {',
              '  filter: drop-shadow(0 2px 5px rgba(0,0,0,0.36)) contrast(1.08) saturate(1.08);',
              '}',
              '[data-theme="light"] .login-logo-ring::before,',
              '[data-theme="light"] .login-logo-ring::after {',
              '  border-color: rgba(15, 118, 110, 0.22);',
              '}',
              ''
          ])

          new_block = '\n'.join([
              '',
              '/* Contraste forte do logo no login */',
              '.login-logo-bg {',
              '  background: radial-gradient(circle at 38% 30%, #147D73 0%, #063A36 74%) !important;',
              '  border-color: rgba(6, 58, 54, 0.52) !important;',
              '  box-shadow: 0 18px 44px rgba(15, 23, 42, 0.20), 0 0 0 6px rgba(0, 217, 198, 0.08), inset 0 1px 0 rgba(255,255,255,0.18) !important;',
              '}',
              '.login-logo-ring .app-logo-img {',
              '  filter: drop-shadow(0 2px 5px rgba(0,0,0,0.45)) contrast(1.16) saturate(1.08) !important;',
              '}',
              '[data-theme="light"] .login-logo-ring::before,',
              '[data-theme="light"] .login-logo-ring::after {',
              '  border-color: rgba(6, 58, 54, 0.22) !important;',
              '}',
              ''
          ])

          if old_block in s:
              s = s.replace(old_block, new_block, 1)
          elif 'Contraste forte do logo no login' not in s:
              marker = '/* ── Ícones de input — visíveis em dark e light ── */'
              s = s.replace(marker, new_block + '\n' + marker, 1)

          p.write_text(s, encoding='utf-8')
          PY

      - name: Commit patched file
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add _login.html
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "fix: strengthen login logo contrast"
            git push
          fi
